<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set your password — Operations Director</title>
  <link rel="stylesheet" href="css/tokens.css?v=1">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{box-sizing:border-box;}
    body{margin:0;min-height:100vh;background:var(--bg-app);color:var(--text-primary);
         font-family:var(--font-family-base,'DM Sans',system-ui,sans-serif);
         display:flex;align-items:center;justify-content:center;padding:24px;}
    .card{background:var(--bg-surface);border:1px solid var(--border-default);border-radius:16px;
          padding:34px;width:400px;max-width:100%;box-shadow:0 12px 40px rgba(28,36,34,.10);}
    h1{font-size:22px;margin:0 0 4px;display:flex;align-items:center;gap:9px;}
    p.sub{font-size:14px;color:var(--text-secondary);margin:0 0 22px;}
    label{display:block;font-size:12px;font-weight:600;margin:14px 0 5px;color:var(--text-secondary);}
    input{width:100%;padding:11px 13px;border:1px solid var(--border-default);border-radius:9px;
          font-size:15px;font-family:inherit;background:var(--bg-app);}
    button{width:100%;margin-top:20px;background:var(--accent);color:#fff;border:0;padding:12px;
           border-radius:9px;font-weight:600;font-size:15px;cursor:pointer;font-family:inherit;}
    button:hover{background:var(--accent-hover);}
    button:disabled{opacity:.6;cursor:default;}
    .msg{font-size:13px;margin-top:12px;display:none;}
    .msg.err{color:var(--danger,#B42318);display:block;}
    .msg.ok{color:var(--accent-hover);display:block;}
    .state{text-align:center;color:var(--text-secondary);font-size:14px;padding:8px 0;}
    .hide{display:none;}
  </style>
</head>
<body>
  <div class="card">
    <h1>⚙️ Operations Director</h1>
    <div id="loading" class="state">Checking your invitation…</div>

    <div id="form" class="hide">
      <p class="sub">Welcome! Choose a password to finish setting up your account.</p>
      <label>New password</label>
      <input id="pw" type="password" autocomplete="new-password" placeholder="At least 8 characters">
      <label>Confirm password</label>
      <input id="pw2" type="password" autocomplete="new-password">
      <button id="go">Set password &amp; sign in</button>
      <div class="msg" id="msg"></div>
    </div>

    <div id="invalid" class="hide">
      <p class="sub">This link has expired or already been used. Ask whoever set up your account to send a fresh invitation.</p>
    </div>
  </div>

  <script>
    const SB_URL = 'https://ptkyhzlsvijcwyovgrgv.supabase.co';
    const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB0a3loemxzdmlqY3d5b3Zncmd2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzMzIxNzgsImV4cCI6MjA5MTkwODE3OH0.U5ZdIjw--_UgJlYi75JTjpb2doBTjO4W8LUZPnZzkFU';
    const APP_URL = 'supabase-app.html';
    const sb = supabase.createClient(SB_URL, SB_ANON, { auth: { persistSession: true, storageKey: '_dlr_sb_app', detectSessionInUrl: true } });

    const show = id => document.getElementById(id).classList.remove('hide');
    const hide = id => document.getElementById(id).classList.add('hide');

    async function init(){
      // supabase-js parses the invite token from the URL hash into a session.
      let session = null;
      for (let i = 0; i < 10 && !session; i++){
        const { data } = await sb.auth.getSession();
        session = data.session;
        if (!session) await new Promise(r => setTimeout(r, 200));
      }
      hide('loading');
      if (session) show('form'); else show('invalid');
    }

    document.getElementById('go').addEventListener('click', async () => {
      const pw = document.getElementById('pw').value, pw2 = document.getElementById('pw2').value;
      const msg = document.getElementById('msg'); msg.className = 'msg';
      if (pw.length < 8){ msg.textContent = 'Password must be at least 8 characters.'; msg.className = 'msg err'; return; }
      if (pw !== pw2){ msg.textContent = 'The two passwords don’t match.'; msg.className = 'msg err'; return; }
      const btn = document.getElementById('go'); btn.disabled = true; btn.textContent = 'Setting up…';
      const { error } = await sb.auth.updateUser({ password: pw });
      if (error){ msg.textContent = error.message; msg.className = 'msg err'; btn.disabled = false; btn.textContent = 'Set password & sign in'; return; }
      msg.textContent = 'Done! Taking you to your workspace…'; msg.className = 'msg ok';
      setTimeout(() => { location.href = APP_URL; }, 900);
    });

    init();
  </script>
</body>
</html>
