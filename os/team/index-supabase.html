<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Members — Supabase</title>
<link rel="stylesheet" href="../../css/tokens.css?v=1">
<!-- Supabase clone: supabase-js + shim + login gate. Shim overrides window.fetch
     before the page script runs; boot seeds _dlr_pat (if empty) + gates on session. -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="team-shim.js?v=1"></script>
<script src="team-boot.js?v=1"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{line-height:1.5;min-height:100vh;background:var(--bg-app);color:var(--text-primary)}
a{color:var(--accent);text-decoration:none}a:hover{text-decoration:underline}

.auth-bar{background:var(--bg-surface);border-bottom:1px solid var(--border-default);padding:14px 24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.auth-bar input{background:var(--bg-surface-2);border:1px solid var(--border-default);color:var(--text-primary);padding:6px 12px;border-radius:6px;font-size:var(--fs-base);width:340px}
.auth-bar button{background:var(--accent);color:#fff;border:none;padding:6px 16px;border-radius:6px;cursor:pointer;font-size:var(--fs-base);font-weight:var(--fw-semibold)}
.auth-bar button:hover{background:var(--accent-hover)}

.topbar{background:var(--bg-surface);border-bottom:1px solid var(--border-default);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;position:sticky;top:0;z-index:50;box-shadow:0 1px 0 var(--border-subtle)}
.topbar h1{font-size:20px;font-weight:var(--fw-bold);display:flex;align-items:center;gap:8px}
.topbar .subtitle{font-size:var(--fs-sm);color:var(--text-secondary)}
.topbar-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}

.btn{padding:6px 14px;border-radius:6px;border:1px solid var(--border-default);background:var(--bg-surface);color:var(--text-primary);cursor:pointer;font-size:var(--fs-sm);font-weight:var(--fw-semibold);display:inline-flex;align-items:center;gap:6px}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-hover);color:#fff}
.btn-sm{padding:4px 10px;font-size:var(--fs-xs)}
.btn-danger{border-color:var(--danger);color:var(--danger)}
.btn-danger:hover{background:var(--danger);color:#fff}
.btn:disabled{opacity:.5;cursor:not-allowed;pointer-events:none}

.main{padding:20px 24px;max-width:1400px;margin:0 auto}

.tab-bar{display:flex;gap:0;background:var(--bg-surface);border-bottom:1px solid var(--border-default);padding:0 24px}
.tab-btn{padding:12px 20px;border:none;background:none;color:var(--text-secondary);cursor:pointer;font-size:var(--fs-sm);font-weight:var(--fw-semibold);border-bottom:2px solid transparent;display:flex;align-items:center;gap:6px;white-space:nowrap}
.tab-btn:hover{color:var(--text-primary);background:var(--bg-surface-2)}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-btn .badge{background:var(--bg-subtle);color:var(--text-secondary);padding:1px 8px;border-radius:10px;font-size:var(--fs-xs);font-weight:var(--fw-bold)}
.tab-btn.active .badge{background:var(--accent-soft);color:var(--accent)}

.tab-pane{display:none}.tab-pane.active{display:block}

.controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
.search-input{background:var(--bg-surface);border:1px solid var(--border-default);color:var(--text-primary);padding:7px 12px;border-radius:6px;font-size:var(--fs-sm);width:260px}
.filter-select{background:var(--bg-surface);border:1px solid var(--border-default);color:var(--text-primary);padding:7px 10px;border-radius:6px;font-size:var(--fs-sm);cursor:pointer}

.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.member-card{background:var(--bg-surface);border:1px solid var(--border-default);border-radius:var(--radius-lg);padding:20px;cursor:pointer;transition:border-color .15s,box-shadow .15s}
.member-card:hover{border-color:var(--accent);box-shadow:var(--shadow-sm)}
.member-card-top{display:flex;align-items:center;gap:14px;margin-bottom:12px}
.avatar{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:var(--fw-bold);font-size:var(--fs-lg);color:#fff;background:var(--accent);flex-shrink:0;overflow:hidden}
.avatar img{width:100%;height:100%;object-fit:cover}
.member-name{font-weight:var(--fw-semibold);font-size:var(--fs-base)}
.member-role{font-size:var(--fs-sm);color:var(--text-secondary)}
.member-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.chip{display:inline-flex;align-items:center;gap:4px;padding:2px 10px;border-radius:12px;font-size:var(--fs-xs);font-weight:var(--fw-semibold)}
.chip-dept{background:var(--accent-soft);color:var(--accent)}
.chip-status{padding:2px 10px;border-radius:12px;font-size:var(--fs-xs);font-weight:var(--fw-semibold)}
.chip-active{background:var(--success-bg);color:var(--success)}
.chip-onboarding{background:var(--info-bg);color:var(--info)}
.chip-offboarding{background:var(--warning-bg);color:var(--warning)}
.chip-offboarded{background:var(--danger-bg);color:var(--danger)}
.member-contact{font-size:var(--fs-sm);color:var(--text-secondary);margin-top:8px;display:flex;flex-direction:column;gap:2px}

.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;display:none;opacity:0;transition:opacity .2s}
.drawer-overlay.open{display:block;opacity:1}
.drawer{position:fixed;top:0;right:-480px;width:480px;max-width:100vw;height:100vh;background:var(--bg-surface);border-left:1px solid var(--border-default);z-index:201;overflow-y:auto;transition:right .25s ease;box-shadow:var(--shadow-lg)}
.drawer.open{right:0}
.drawer-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--border-default);position:sticky;top:0;background:var(--bg-surface);z-index:1}
.drawer-header h2{font-size:var(--fs-lg);font-weight:var(--fw-bold)}
.drawer-close{background:none;border:none;font-size:24px;cursor:pointer;color:var(--text-secondary);padding:4px 8px;border-radius:4px}
.drawer-close:hover{background:var(--bg-surface-2);color:var(--text-primary)}
.drawer-body{padding:24px}
.drawer-section{margin-bottom:24px}
.drawer-section h3{font-size:var(--fs-sm);font-weight:var(--fw-bold);color:var(--text-secondary);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border-subtle)}
.drawer-field{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;gap:12px}
.drawer-field-label{font-size:var(--fs-sm);color:var(--text-secondary);min-width:120px;flex-shrink:0}
.drawer-field-value{font-size:var(--fs-sm);color:var(--text-primary);text-align:right;word-break:break-word}
.drawer-avatar{width:80px;height:80px;border-radius:50%;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-weight:var(--fw-bold);font-size:28px;color:#fff;background:var(--accent);overflow:hidden}
.drawer-avatar img{width:100%;height:100%;object-fit:cover}

.org-tree{display:flex;flex-direction:column;align-items:center;padding:24px 0;overflow-x:auto}
.org-node{display:flex;flex-direction:column;align-items:center;position:relative}
.org-card{background:var(--bg-surface);border:1px solid var(--border-default);border-radius:var(--radius-md);padding:12px 16px;text-align:center;min-width:140px;cursor:pointer;transition:border-color .15s,box-shadow .15s}
.org-card:hover{border-color:var(--accent);box-shadow:var(--shadow-sm)}
.org-card .avatar{width:40px;height:40px;margin:0 auto 6px;font-size:var(--fs-sm)}
.org-card-name{font-weight:var(--fw-semibold);font-size:var(--fs-sm)}
.org-card-role{font-size:var(--fs-xs);color:var(--text-secondary)}
.org-children{display:flex;gap:20px;padding-top:24px;position:relative}
.org-children::before{content:'';position:absolute;top:0;left:50%;width:0;height:24px;border-left:2px solid var(--border-default)}
.org-node>.org-children::before{display:none}
.org-connector{position:relative;padding-top:24px}
.org-connector::before{content:'';position:absolute;top:0;left:50%;height:24px;border-left:2px solid var(--border-default)}
.org-children-row{display:flex;gap:24px;position:relative;justify-content:center}
.org-children-row::before{content:'';position:absolute;top:0;height:2px;background:var(--border-default)}
.org-children-row>.org-connector:first-child::before,.org-children-row>.org-connector:last-child::before{height:24px}

.training-table{width:100%;border-collapse:collapse;font-size:var(--fs-sm)}
.training-table th,.training-table td{padding:8px 12px;border:1px solid var(--border-default);text-align:left}
.training-table th{background:var(--bg-subtle);font-weight:var(--fw-semibold);color:var(--text-secondary);position:sticky;top:0;z-index:1}
.training-table td:first-child{font-weight:var(--fw-semibold);white-space:nowrap;background:var(--bg-surface)}
.training-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:var(--fs-xs);font-weight:var(--fw-semibold);text-align:center}
.training-trained{background:var(--success-bg);color:var(--success)}
.training-watching{background:var(--info-bg);color:var(--info)}
.training-not{background:var(--bg-subtle);color:var(--text-muted)}
.coverage-bar{height:6px;background:var(--bg-subtle);border-radius:3px;overflow:hidden;min-width:60px}
.coverage-fill{height:100%;background:var(--accent);border-radius:3px}

.achievement-feed{display:flex;flex-direction:column;gap:12px}
.achievement-card{background:var(--bg-surface);border:1px solid var(--border-default);border-radius:var(--radius-md);padding:16px 20px}
.achievement-card-header{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.achievement-card-header .avatar{width:32px;height:32px;font-size:var(--fs-xs)}
.achievement-card-name{font-weight:var(--fw-semibold);font-size:var(--fs-sm)}
.achievement-card-date{font-size:var(--fs-xs);color:var(--text-muted)}
.achievement-card-title{font-weight:var(--fw-semibold);margin-bottom:4px}
.achievement-card-desc{font-size:var(--fs-sm);color:var(--text-secondary)}

/* HR components (Reviews, Onboarding tracker, drawer HR details) */
.hr-group{margin-bottom:28px}
.hr-group-title{font-size:var(--fs-base);font-weight:var(--fw-bold);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.hr-group-title .count{background:var(--bg-subtle);color:var(--text-secondary);padding:1px 8px;border-radius:10px;font-size:var(--fs-xs);font-weight:var(--fw-bold)}
.checklist{display:flex;flex-direction:column;gap:5px;margin-top:10px}
.checklist-item{display:flex;align-items:center;gap:8px;font-size:var(--fs-sm)}
.checklist-icon{width:16px;text-align:center;flex-shrink:0}
.check-done{color:var(--success)}
.check-missing{color:var(--text-muted)}
.lifecycle-card-meta{font-size:var(--fs-xs);color:var(--text-secondary);margin-top:8px;display:flex;flex-direction:column;gap:2px}
.review-row{display:flex;align-items:center;gap:6px}
.hr-banner{background:var(--accent-soft);border:1px solid var(--border-default);border-radius:var(--radius-lg);padding:18px 20px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.hr-banner-text h3{font-size:var(--fs-base);font-weight:var(--fw-bold);margin-bottom:2px}
.hr-banner-text p{font-size:var(--fs-sm);color:var(--text-secondary)}
.hr-note{font-size:var(--fs-xs);color:var(--text-muted);font-style:italic}
.value-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;margin-bottom:24px}
.value-card{background:var(--bg-surface);border:1px solid var(--border-default);border-radius:var(--radius-md);padding:16px 18px}
.value-card h4{font-size:var(--fs-sm);font-weight:var(--fw-bold);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.value-card p{font-size:var(--fs-sm);color:var(--text-secondary)}
.phase2-tag{display:inline-block;padding:1px 8px;border-radius:10px;font-size:var(--fs-xs);font-weight:var(--fw-semibold);background:var(--bg-subtle);color:var(--text-muted)}

.empty-state{text-align:center;padding:60px 20px;color:var(--text-muted)}
.empty-state-icon{font-size:48px;margin-bottom:12px}
.empty-state-text{font-size:var(--fs-base)}

.spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--border-default);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:12px;color:var(--text-secondary)}

.toast{position:fixed;bottom:24px;right:24px;background:var(--bg-sidebar);color:#fff;padding:12px 20px;border-radius:var(--radius-md);font-size:var(--fs-sm);z-index:300;opacity:0;transform:translateY(12px);transition:all .2s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0);pointer-events:auto}

.add-form{background:var(--bg-surface);border:1px solid var(--border-default);border-radius:var(--radius-md);padding:20px;margin-bottom:20px}
.add-form label{display:block;font-size:var(--fs-sm);font-weight:var(--fw-semibold);color:var(--text-secondary);margin-bottom:4px}
.add-form input,.add-form textarea,.add-form select{width:100%;background:var(--bg-surface-2);border:1px solid var(--border-default);color:var(--text-primary);padding:7px 12px;border-radius:6px;font-size:var(--fs-sm);margin-bottom:12px;font-family:inherit}
.add-form textarea{min-height:80px;resize:vertical}
.add-form-actions{display:flex;gap:8px;justify-content:flex-end}

@media(max-width:768px){
.card-grid{grid-template-columns:1fr}
.drawer{width:100vw}
.org-children-row{flex-direction:column;align-items:center}
}
</style>
</head>
<body>

<div class="auth-bar" id="authBar">
    <span>&#x1F511;</span>
    <input type="password" id="patInput" placeholder="Paste Airtable PAT to connect...">
    <button onclick="authenticate()">Connect</button>
    <span id="authMsg" style="font-size:var(--fs-sm);color:var(--text-secondary)"></span>
</div>

<div id="appShell" style="display:none">

<div class="topbar">
    <div>
        <h1>&#x1F465; Team Members</h1>
        <div class="subtitle" id="subtitleText">Loading...</div>
    </div>
    <div class="topbar-right">
        <span id="teamSyncStamp" style="font-size:12px;color:var(--text-muted);margin-right:4px">Not yet loaded</span>
        <a class="btn" href="workflow.html" target="_blank" title="Visual map of how the Team OS works" style="text-decoration:none;display:inline-flex;align-items:center;gap:4px">&#x1F4D6; Workflow</a>
        <button class="btn" onclick="loadAll(true)">&#x1F504; Refresh</button>

<div class="tab-bar" id="tabBar">
    <button class="tab-btn active" data-tab="directory" onclick="switchInternalTab('directory')">&#x1F4C7; Directory <span class="badge" id="dirBadge">0</span></button>
    <button class="tab-btn" data-tab="onboarding" onclick="switchInternalTab('onboarding')">&#x1F6EB; Onboarding <span class="badge" id="lifecycleBadge">0</span></button>
    <button class="tab-btn" data-tab="orgchart" onclick="switchInternalTab('orgchart')">&#x1F3D7; Org Chart</button>
    <button class="tab-btn" data-tab="training" onclick="switchInternalTab('training')">&#x1F4DA; Training <span class="badge" id="trainBadge">0</span></button>
    <button class="tab-btn" data-tab="reviews" onclick="switchInternalTab('reviews')">&#x1F4CA; Reviews <span class="badge" id="reviewBadge">0</span></button>
    <button class="tab-btn" data-tab="handbook" onclick="switchInternalTab('handbook')">&#x1F4D6; Handbook <span class="badge" id="handbookBadge">0</span></button>
    <button class="tab-btn" data-tab="achievements" onclick="switchInternalTab('achievements')">&#x1F3C6; Achievements <span class="badge" id="achieveBadge">0</span></button>

<div class="main">

<!-- TAB 1: Directory -->

<!-- TAB: Onboarding / Offboarding tracker -->

</div>

<!-- TAB 2: Org Chart -->
<div class="tab-pane" id="pane-orgchart">
    <div id="orgChartContainer" class="org-tree"></div>

<div class="tab-pane" id="pane-achievements">
    <div class="controls">
        <button class="btn btn-primary" id="addAchieveBtn" onclick="toggleAddAchievement()">+ Add Achievement</button>
        <select class="filter-select" id="achieveMemberFilter" onchange="renderAchievements()">
            <option value="">All Members</option>
        </select>
    </div>
    <div id="addAchievementForm" style="display:none"></div>
    <div id="achievementFeed" class="achievement-feed"></div>

</div><!-- .main -->
</div><!-- #appShell -->

<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
    <div class="drawer-header">
        <h2 id="drawerTitle">Team Member</h2>
        <button class="drawer-close" onclick="closeDrawer()" aria-label="Close">&times;</button>
    </div>
    <div class="drawer-body" id="drawerBody"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const BASE = BASE_ID;
var allMembers = [];
var allDepts = [];
var allRoles = [];
var allAchievements = [];
var allSOPs = [];

function escHtml(s) {
    if (s == null) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function authenticate() {
    const v = document.getElementById('patInput').value.trim();
    if (!v) return;
    PAT = v;
    try { localStorage.setItem('_dlr_pat', v); } catch(e) {/* best-effort: safe fallback */}
    document.getElementById('authBar').style.display = 'none';
    document.getElementById('appShell').style.display = '';
    loadAll();
}

function showApp() {
    document.getElementById('authBar').style.display = 'none';
    document.getElementById('appShell').style.display = '';
}

(function autoAuth() {
    try { if (window.parent && window.parent !== window && window.parent.PAT) { PAT = window.parent.PAT; showApp(); loadAll(); return; } } catch(e) {/* best-effort: safe fallback */}
    let stored = '';
    try { stored = localStorage.getItem('_dlr_pat') || ''; } catch(e) {/* best-effort: safe fallback */}
    if (stored) { PAT = stored; showApp(); loadAll(); return; }
    window.addEventListener('message', e => {
        if (e.data?.type === 'pat-broadcast' && e.data.pat) {
            PAT = e.data.pat;
            try { localStorage.setItem('_dlr_pat', PAT); } catch(ex) {/* best-effort: safe fallback */}
            showApp(); loadAll();
        }
    });
})();

async function airtableFetch(path) {
    const r = await fetch(`https://api.airtable.com/v0/${BASE}/${path}`, {
        headers: { Authorization: `Bearer ${PAT}` }
    });
    if (r.status === 429) { await new Promise(ok => setTimeout(ok, 1000)); return airtableFetch(path); }
    if (!r.ok) throw new Error(`Airtable ${r.status}`);
    return r.json();
}

async function airtablePost(path, body) {
    const r = await fetch(`https://api.airtable.com/v0/${BASE}/${path}`, {
        method: 'POST',
        headers: { Authorization: `Bearer ${PAT}`, 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
    });
    if (!r.ok) throw new Error(`Airtable POST ${r.status}`);
    return r.json();
}

async function fetchAll(tableId, params) {
    const all = [];
    let offset = '';
    do {
        const sep = params.includes('?') ? '&' : '?';
        const url = offset ? `${tableId}${params}${sep}offset=${offset}` : `${tableId}${params}`;
        const d = await airtableFetch(url);
        all.push(...(d.records || []));
        offset = d.offset || '';
    } while (offset);
    return all;
}

function showLoading(el) {
    el.innerHTML = '<div class="loading-wrap"><div class="spinner"></div><span>Loading data...</span></div>';
}

function showToast(msg, ms = 3000) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), ms);
}

function switchInternalTab(id) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === id));
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.toggle('active', p.id === `pane-${id}`));
    window.scrollTo(0, 0);
    if (id === 'onboarding') renderOnboarding();
    if (id === 'orgchart') renderOrgChart();
    if (id === 'training') renderTraining();
    if (id === 'reviews') renderReviews();
    if (id === 'handbook') renderHandbook();
    if (id === 'achievements') renderAchievements();
}

async function loadAll(force) {
    const grid = document.getElementById('directoryGrid');
    showLoading(grid);

    try {
        const teamFields = [TEAM.name, TEAM.preferredName, TEAM.fullLegalName, TEAM.role, TEAM.department,
            TEAM.manager, TEAM.workEmail, TEAM.whatsApp, TEAM.profilePhoto, TEAM.jobTitle, TEAM.status,
            TEAM.startDate, TEAM.active, TEAM.contractDocs, TEAM.achievements, TEAM.sops, TEAM.sopsTask,
            TEAM.performanceReviews, TEAM.emergencyName, TEAM.emergencyPhone, TEAM.country,
            TEAM.workingDays, TEAM.weeklyCapacity, TEAM.utilisation, TEAM.business, TEAM.slackHandle,
            TEAM.managerEmail, TEAM.constraints, TEAM.handbookLink, TEAM.member,
            TEAM.dob, TEAM.contractHR].map(f => `fields%5B%5D=${f}`).join('&');

        const achieveFields = [ACHIEVE.title, ACHIEVE.teamMember, ACHIEVE.description, ACHIEVE.date,
            ACHIEVE.type, ACHIEVE.source, ACHIEVE.status].map(f => `fields%5B%5D=${f}`).join('&');

        const deptFields = [DEPT.name, DEPT.members, DEPT.head].map(f => `fields%5B%5D=${f}`).join('&');
        const roleFields = [ROLES.role, ROLES.members, ROLES.department].map(f => `fields%5B%5D=${f}`).join('&');

        const sopFields = [SOP.title, SOP.department, SOP.teamMember, SOP.sopStatus, SOP.sopType]
            .map(f => `fields%5B%5D=${f}`).join('&');

        const [members, depts, roles, achievements, sops] = await Promise.all([
            fetchAll(TEAM_TABLE, `?returnFieldsByFieldId=true&${teamFields}`),
            fetchAll(DEPT_TABLE, `?returnFieldsByFieldId=true&${deptFields}`),
            fetchAll(ROLES_TABLE, `?returnFieldsByFieldId=true&${roleFields}`),
            fetchAll(ACHIEVE_TABLE, `?returnFieldsByFieldId=true&${achieveFields}&sort%5B0%5D%5Bfield%5D=${ACHIEVE.date}&sort%5B0%5D%5Bdirection%5D=desc`),
            fetchAll(SOP_TABLE, `?returnFieldsByFieldId=true&${sopFields}`)
        ]);

        allMembers = members;
        allDepts = depts;
        allRoles = roles;
        allAchievements = achievements;
        allSOPs = sops;

        populateFilters();
        renderDirectory();
        updateBadges();

        const activeCount = allMembers.filter(m => isActive(m)).length;
        document.getElementById('subtitleText').textContent = `${activeCount} active team member${activeCount !== 1 ? 's' : ''} across ${allDepts.length} departments`;

        const stamp = document.getElementById('teamSyncStamp');
        if (stamp) {
            stamp.textContent = `✓ Synced just now · ${allMembers.length} members · ${allDepts.length} departments`;
            stamp.style.color = 'var(--success)';
        }

    } catch (e) {
        const stamp = document.getElementById('teamSyncStamp');
        if (stamp) { stamp.textContent = '✗ Load failed'; stamp.style.color = 'var(--danger)'; }
        grid.innerHTML = `<div class="empty-state"><div class="empty-state-icon">&#x26A0;</div><div class="empty-state-text">Failed to load: ${escHtml(e.message)}</div></div>`;
        console.error('[Team] load error', e);
    }
}

function gf(rec, fid) {
    return rec.fields?.[fid] ?? '';
}

// Count items in a linked-record / attachment field, tolerant of both
// string-ID arrays and {id,name} object arrays (the API returns both shapes here).
function linkCount(rec, fid) {
    const v = gf(rec, fid);
    return Array.isArray(v) ? v.length : 0;
}

function fmtDate(d) {
    if (!d) return '';
    const dt = new Date(d);
    if (isNaN(dt)) return escHtml(String(d));
    return dt.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
}

function memberName(m) {
    return (gf(m, TEAM.preferredName) || '').trim()
        || (gf(m, TEAM.fullLegalName) || '').trim()
        || (gf(m, TEAM.name) || '').trim()
        || 'Unnamed';
}

function memberInitials(name) {
    const parts = name.trim().split(/\s+/);
    if (parts.length >= 2) return (parts[0][0] + parts[parts.length-1][0]).toUpperCase();
    return (name[0] || '?').toUpperCase();
}

function memberPhoto(m) {
    const photos = gf(m, TEAM.profilePhoto);
    if (Array.isArray(photos) && photos.length > 0) {
        const thumb = photos[0].thumbnails?.large?.url || photos[0].url;
        return thumb;
    }
    return '';
}

function avatarHtml(m, size) {
    const name = memberName(m);
    const photo = memberPhoto(m);
    const cls = size ? `avatar` : 'avatar';
    const style = size ? `width:${size}px;height:${size}px;font-size:${Math.round(size*0.4)}px` : '';
    if (photo) return `<div class="${cls}" style="${style}"><img src="${escHtml(photo)}" alt="${escHtml(name)}"></div>`;
    return `<div class="${cls}" style="${style}">${escHtml(memberInitials(name))}</div>`;
}

function statusName(m) {
    const s = gf(m, TEAM.status);
    if (typeof s === 'string' && s) return s;
    if (s?.name) return s.name;
    return gf(m, TEAM.active) ? 'Active' : 'Unknown';
}

function statusChipClass(name) {
    const n = (name || '').toLowerCase();
    if (n === 'active') return 'chip-active';
    if (n === 'onboarding') return 'chip-onboarding';
    if (n === 'offboarding') return 'chip-offboarding';
    if (n === 'offboarded') return 'chip-offboarded';
    return 'chip-active';
}

function isActive(m) {
    const s = statusName(m);
    return s === 'Active' || s === 'Onboarding';
}

function deptNames(m) {
    const d = gf(m, TEAM.department);
    if (!Array.isArray(d)) return [];
    return d.map(x => x.name || '').filter(Boolean);
}

function roleNames(m) {
    const r = gf(m, TEAM.role);
    if (!Array.isArray(r)) return [];
    return r.map(x => x.name || '').filter(Boolean);
}

function populateFilters() {
    const deptSet = new Set();
    allMembers.forEach(m => deptNames(m).forEach(d => deptSet.add(d)));
    const sorted = [...deptSet].sort();

    const deptHtml = '<option value="">All Departments</option>' + sorted.map(d => `<option value="${escHtml(d)}">${escHtml(d)}</option>`).join('');
    document.getElementById('dirDeptFilter').innerHTML = deptHtml;
    document.getElementById('trainDeptFilter').innerHTML = deptHtml;
    document.getElementById('reviewDeptFilter').innerHTML = deptHtml;

    const memberOpts = allMembers.filter(m => isActive(m)).sort((a,b) => memberName(a).localeCompare(memberName(b)));
    document.getElementById('achieveMemberFilter').innerHTML = '<option value="">All Members</option>' +
        memberOpts.map(m => `<option value="${m.id}">${escHtml(memberName(m))}</option>`).join('');
}

function updateBadges() {
    const active = allMembers.filter(m => isActive(m));
    document.getElementById('dirBadge').textContent = active.length;
    document.getElementById('achieveBadge').textContent = allAchievements.length;

    const inLifecycle = allMembers.filter(m => {
        const s = statusName(m);
        return s === 'Onboarding' || s === 'Offboarding';
    }).length;
    document.getElementById('lifecycleBadge').textContent = inLifecycle;

    const dueReviews = active.filter(m => linkCount(m, TEAM.performanceReviews) === 0).length;
    document.getElementById('reviewBadge').textContent = dueReviews;

    // Handbook outstanding = active members with no handbook link issued
    const handbookOutstanding = active.filter(m => !gf(m, TEAM.handbookLink)).length;
    document.getElementById('handbookBadge').textContent = handbookOutstanding;

    const sopCount = allSOPs.filter(s => {
        const tm = gf(s, SOP.teamMember);
        return Array.isArray(tm) && tm.length > 0;
    }).length;
    document.getElementById('trainBadge').textContent = sopCount;
}

function renderDirectory() {
    const grid = document.getElementById('directoryGrid');
    const search = (document.getElementById('dirSearch').value || '').toLowerCase();
    const statusFilter = document.getElementById('dirStatusFilter').value;
    const deptFilter = document.getElementById('dirDeptFilter').value;

    let filtered = allMembers.filter(m => {
        if (statusFilter === 'active') {
            if (!isActive(m)) return false;
        } else if (statusFilter !== 'all') {
            if (statusName(m) !== statusFilter) return false;
        }
        if (deptFilter && !deptNames(m).includes(deptFilter)) return false;
        if (search) {
            const hay = [memberName(m), gf(m, TEAM.workEmail), gf(m, TEAM.jobTitle), ...deptNames(m), ...roleNames(m)].join(' ').toLowerCase();
            if (!hay.includes(search)) return false;
        }
        return true;
    });

    filtered.sort((a, b) => memberName(a).localeCompare(memberName(b)));

    if (filtered.length === 0) {
        grid.innerHTML = '<div class="empty-state"><div class="empty-state-icon">&#x1F465;</div><div class="empty-state-text">No team members match your filters.</div></div>';
        return;
    }

    grid.innerHTML = filtered.map(m => {
        const name = memberName(m);
        const roles = roleNames(m);
        const depts = deptNames(m);
        const email = gf(m, TEAM.workEmail);
        const phone = gf(m, TEAM.whatsApp);
        const status = statusName(m);
        const jobTitle = gf(m, TEAM.jobTitle);

        return `<div class="member-card" onclick="openDrawer('${m.id}')">
            <div class="member-card-top">
                ${avatarHtml(m)}
                <div>
                    <div class="member-name">${escHtml(name)}</div>
                    <div class="member-role">${escHtml(jobTitle || roles.join(', ') || 'No role assigned')}</div>
                </div>
            </div>
            <div class="member-meta">
                <span class="chip chip-status ${statusChipClass(status)}">${escHtml(status)}</span>
                ${depts.map(d => `<span class="chip chip-dept">${escHtml(d)}</span>`).join('')}
            </div>
            ${email ? `<div class="member-contact">${escHtml(email)}</div>` : ''}
        </div>`;
    }).join('');
}

function openDrawer(recId) {
    const m = allMembers.find(x => x.id === recId);
    if (!m) return;

    const name = memberName(m);
    const roles = roleNames(m);
    const depts = deptNames(m);
    const manager = gf(m, TEAM.manager);
    const managerName = Array.isArray(manager) && manager.length > 0 ? manager[0].name : '';
    const email = gf(m, TEAM.workEmail);
    const phone = gf(m, TEAM.whatsApp);
    const status = statusName(m);
    const jobTitle = gf(m, TEAM.jobTitle);
    const startDate = gf(m, TEAM.startDate);
    const country = gf(m, TEAM.country);
    const slack = gf(m, TEAM.slackHandle);
    const capacity = gf(m, TEAM.weeklyCapacity);
    const workingDays = gf(m, TEAM.workingDays);
    const constraints = gf(m, TEAM.constraints);
    const emergName = gf(m, TEAM.emergencyName);
    const emergPhone = gf(m, TEAM.emergencyPhone);
    const handbook = gf(m, TEAM.handbookLink);
    const contractDocs = gf(m, TEAM.contractDocs);
    const achievements = gf(m, TEAM.achievements);
    const sops = gf(m, TEAM.sops);

    document.getElementById('drawerTitle').textContent = name;

    let html = `<div style="text-align:center;margin-bottom:20px">${avatarHtml(m, 80)}
        <div style="font-size:var(--fs-lg);font-weight:var(--fw-bold);margin-top:8px">${escHtml(name)}</div>
        <div style="font-size:var(--fs-sm);color:var(--text-secondary)">${escHtml(jobTitle || roles.join(', '))}</div>
        <div style="margin-top:6px"><span class="chip chip-status ${statusChipClass(status)}">${escHtml(status)}</span></div>
    </div>`;

    html += `<div class="drawer-section"><h3>Contact</h3>`;
    if (email) html += `<div class="drawer-field"><span class="drawer-field-label">Email</span><span class="drawer-field-value"><a href="mailto:${escHtml(email)}">${escHtml(email)}</a></span></div>`;
    if (phone) html += `<div class="drawer-field"><span class="drawer-field-label">WhatsApp</span><span class="drawer-field-value">${escHtml(phone)}</span></div>`;
    if (slack) html += `<div class="drawer-field"><span class="drawer-field-label">Slack</span><span class="drawer-field-value">${escHtml(slack)}</span></div>`;
    if (country) html += `<div class="drawer-field"><span class="drawer-field-label">Country</span><span class="drawer-field-value">${escHtml(country)}</span></div>`;
    html += `</div>`;

    html += `<div class="drawer-section"><h3>Role &amp; Organisation</h3>`;
    if (depts.length) html += `<div class="drawer-field"><span class="drawer-field-label">Department</span><span class="drawer-field-value">${depts.map(d => escHtml(d)).join(', ')}</span></div>`;
    if (roles.length) html += `<div class="drawer-field"><span class="drawer-field-label">Role</span><span class="drawer-field-value">${roles.map(r => escHtml(r)).join(', ')}</span></div>`;
    if (managerName) html += `<div class="drawer-field"><span class="drawer-field-label">Reports To</span><span class="drawer-field-value">${escHtml(managerName)}</span></div>`;
    if (startDate) html += `<div class="drawer-field"><span class="drawer-field-label">Start Date</span><span class="drawer-field-value">${escHtml(startDate)}</span></div>`;
    html += `</div>`;

    const dob = gf(m, TEAM.dob);
    const utilisation = gf(m, TEAM.utilisation);
    const contractHRCount = linkCount(m, TEAM.contractHR);
    const reviewCount = linkCount(m, TEAM.performanceReviews);
    if (dob || utilisation !== '' || contractHRCount || reviewCount) {
        html += `<div class="drawer-section"><h3>HR Details</h3>`;
        if (dob) html += `<div class="drawer-field"><span class="drawer-field-label">Date of Birth</span><span class="drawer-field-value">${fmtDate(dob)}</span></div>`;
        if (utilisation !== '' && utilisation != null) {
            const pct = Math.round(Number(utilisation) * (Number(utilisation) <= 1 ? 100 : 1));
            html += `<div class="drawer-field"><span class="drawer-field-label">Utilisation</span><span class="drawer-field-value">${escHtml(pct)}%</span></div>`;
        }
        html += `<div class="drawer-field"><span class="drawer-field-label">Performance Reviews</span><span class="drawer-field-value">${reviewCount ? escHtml(reviewCount) + ' on record' : 'None on record'}</span></div>`;
        if (contractHRCount) html += `<div class="drawer-field"><span class="drawer-field-label">HR Contract</span><span class="drawer-field-value">${escHtml(contractHRCount)} linked</span></div>`;
        html += `</div>`;
    }

    if (capacity || (Array.isArray(workingDays) && workingDays.length)) {
        html += `<div class="drawer-section"><h3>Availability</h3>`;
        if (Array.isArray(workingDays) && workingDays.length) {
            const days = workingDays.map(d => typeof d === 'object' ? d.name : d).filter(Boolean);
            html += `<div class="drawer-field"><span class="drawer-field-label">Working Days</span><span class="drawer-field-value">${days.map(d => escHtml(d)).join(', ')}</span></div>`;
        }
        if (capacity) html += `<div class="drawer-field"><span class="drawer-field-label">Weekly Hours</span><span class="drawer-field-value">${escHtml(capacity)}h</span></div>`;
        if (constraints) html += `<div class="drawer-field"><span class="drawer-field-label">Constraints</span><span class="drawer-field-value">${escHtml(constraints)}</span></div>`;
        html += `</div>`;
    }

    if (emergName || emergPhone) {
        html += `<div class="drawer-section"><h3>Emergency Contact</h3>`;
        if (emergName) html += `<div class="drawer-field"><span class="drawer-field-label">Name</span><span class="drawer-field-value">${escHtml(emergName)}</span></div>`;
        if (emergPhone) html += `<div class="drawer-field"><span class="drawer-field-label">Phone</span><span class="drawer-field-value">${escHtml(emergPhone)}</span></div>`;
        html += `</div>`;
    }

    if ((Array.isArray(contractDocs) && contractDocs.length) || handbook) {
        html += `<div class="drawer-section"><h3>Documents</h3>`;
        if (handbook) html += `<div class="drawer-field"><span class="drawer-field-label">Handbook</span><span class="drawer-field-value"><a href="${escHtml(handbook)}" target="_blank">View</a></span></div>`;
        if (Array.isArray(contractDocs)) {
            contractDocs.forEach(doc => {
                html += `<div class="drawer-field"><span class="drawer-field-label">Contract</span><span class="drawer-field-value"><a href="${escHtml(doc.url)}" target="_blank">${escHtml(doc.filename || 'Download')}</a></span></div>`;
            });
        }
        html += `</div>`;
    }

    if (Array.isArray(achievements) && achievements.length) {
        html += `<div class="drawer-section"><h3>Achievements (${achievements.length})</h3>`;
        achievements.forEach(aId => {
            const rec = allAchievements.find(r => r.id === aId);
            const title = rec ? (gf(rec, ACHIEVE.title) || 'Achievement') : 'Achievement';
            html += `<div style="padding:4px 0;font-size:var(--fs-sm);color:var(--text-secondary)">&#x1F3C6; ${escHtml(title)}</div>`;
        });

    if (Array.isArray(sops) && sops.length) {

        sops.forEach(sId => {
            const rec = allSOPs.find(r => r.id === sId);
            const title = rec ? (gf(rec, SOP.title) || 'SOP') : 'SOP';
            html += `<div style="padding:4px 0;font-size:var(--fs-sm);color:var(--text-secondary)">&#x1F4CB; ${escHtml(title)}</div>`;
        });
        html += `</div>`;
    }

    document.getElementById('drawerBody').innerHTML = html;
    document.getElementById('drawerOverlay').classList.add('open');
    document.getElementById('drawer').classList.add('open');
}

function closeDrawer() {
    document.getElementById('drawerOverlay').classList.remove('open');
    document.getElementById('drawer').classList.remove('open');
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDrawer(); });

function renderOrgChart() {
    const container = document.getElementById('orgChartContainer');
    const active = allMembers.filter(m => isActive(m));
    if (active.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">&#x1F3D7;</div><div class="empty-state-text">No active team members to display.</div></div>';
        return;
    }

    const byId = {};
    active.forEach(m => { byId[m.id] = m; });

    const childrenOf = {};
    const hasManager = new Set();
    active.forEach(m => {
        const mgr = gf(m, TEAM.manager);
        if (Array.isArray(mgr) && mgr.length > 0) {
            const mgrId = mgr[0].id;
            if (mgrId !== m.id && byId[mgrId]) {
                if (!childrenOf[mgrId]) childrenOf[mgrId] = [];
                childrenOf[mgrId].push(m.id);
                hasManager.add(m.id);
            }
        }
    });

    const roots = active.filter(m => !hasManager.has(m.id)).map(m => m.id);

    function buildNode(id, depth) {
        const m = byId[id];
        if (!m) return '';
        const name = memberName(m);
        const roles = roleNames(m);
        const jobTitle = gf(m, TEAM.jobTitle);
        const children = childrenOf[id] || [];

        let html = `<div class="org-connector">
            <div class="org-card" onclick="openDrawer('${id}')">
                ${avatarHtml(m)}
                <div class="org-card-name">${escHtml(name)}</div>
                <div class="org-card-role">${escHtml(jobTitle || roles.join(', ') || '')}</div>
            </div>`;

        if (children.length > 0 && depth < 5) {
            html += `<div class="org-children-row" style="margin-top:24px;position:relative">`;
            children.sort((a,b) => memberName(byId[a]).localeCompare(memberName(byId[b])));
            children.forEach(cid => { html += buildNode(cid, depth + 1); });
            html += `</div>`;
        }
        html += `</div>`;
        return html;
    }

    let treeHtml = '<div style="display:flex;flex-direction:column;align-items:center;gap:24px">';
    roots.sort((a,b) => {
        const ac = (childrenOf[a] || []).length;
        const bc = (childrenOf[b] || []).length;
        return bc - ac;
    });
    roots.forEach(rid => { treeHtml += buildNode(rid, 0); });
    treeHtml += '</div>';

    container.innerHTML = treeHtml;
}

function renderTraining() {
    const container = document.getElementById('trainingContainer');
    const deptFilter = document.getElementById('trainDeptFilter').value;

    let activeMembers = allMembers.filter(m => isActive(m));
    if (deptFilter) activeMembers = activeMembers.filter(m => deptNames(m).includes(deptFilter));
    activeMembers.sort((a,b) => memberName(a).localeCompare(memberName(b)));

    const assignedSOPs = allSOPs.filter(s => {
        const tm = gf(s, SOP.teamMember);
        return Array.isArray(tm) && tm.length > 0;
    });

    if (activeMembers.length === 0 || assignedSOPs.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">&#x1F4DA;</div><div class="empty-state-text">No training data available.</div></div>';
        return;
    }

    const memberSops = {};
    activeMembers.forEach(m => {
        const linked = gf(m, TEAM.sops);
        const linkedTask = gf(m, TEAM.sopsTask);
        const sopIds = new Set();
        if (Array.isArray(linked)) linked.forEach(s => sopIds.add(s.id));
        if (Array.isArray(linkedTask)) linkedTask.forEach(s => sopIds.add(s.id));
        memberSops[m.id] = sopIds;
    });

    const uniqueSOPs = [];
    const seen = new Set();
    assignedSOPs.forEach(s => {
        if (!seen.has(s.id)) { seen.add(s.id); uniqueSOPs.push(s); }
    });
    uniqueSOPs.sort((a,b) => (gf(a, SOP.title)||'').localeCompare(gf(b, SOP.title)||''));

    const displaySOPs = uniqueSOPs.slice(0, 30);

    let html = '<table class="training-table"><thead><tr><th>Team Member</th>';
    displaySOPs.forEach(s => {
        const title = gf(s, SOP.title) || 'Untitled';
        const short = title.length > 25 ? title.slice(0,22) + '...' : title;
        html += `<th title="${escHtml(title)}" style="writing-mode:vertical-lr;text-orientation:mixed;max-width:40px;font-size:var(--fs-xs)">${escHtml(short)}</th>`;
    });
    html += '<th>Coverage</th></tr></thead><tbody>';

    activeMembers.forEach(m => {
        const sops = memberSops[m.id] || new Set();
        let trained = 0;
        html += `<tr><td>${escHtml(memberName(m))}</td>`;
        displaySOPs.forEach(s => {
            if (sops.has(s.id)) {
                trained++;
                html += `<td style="text-align:center"><span class="training-badge training-trained">&#x2713;</span></td>`;
            } else {
                html += `<td style="text-align:center"><span class="training-badge training-not">-</span></td>`;
            }
        });
        const pct = displaySOPs.length > 0 ? Math.round((trained / displaySOPs.length) * 100) : 0;
        html += `<td><div style="display:flex;align-items:center;gap:6px"><div class="coverage-bar"><div class="coverage-fill" style="width:${pct}%"></div></div><span style="font-size:var(--fs-xs);color:var(--text-secondary)">${pct}%</span></div></td>`;
        html += '</tr>';
    });

    html += '<tr style="font-weight:var(--fw-bold);background:var(--bg-subtle)"><td>Coverage</td>';
    displaySOPs.forEach(s => {
        let count = 0;
        activeMembers.forEach(m => {
            if ((memberSops[m.id] || new Set()).has(s.id)) count++;
        });
        const pct = activeMembers.length > 0 ? Math.round((count / activeMembers.length) * 100) : 0;
        html += `<td style="text-align:center;font-size:var(--fs-xs)">${pct}%</td>`;
    });
    html += '<td></td></tr>';

    html += '</tbody></table>';
    if (uniqueSOPs.length > 30) {
        html += `<div style="padding:8px;font-size:var(--fs-sm);color:var(--text-muted)">Showing first 30 of ${uniqueSOPs.length} SOPs</div>`;
    }
    container.innerHTML = html;
}

function renderAchievements() {
    const feed = document.getElementById('achievementFeed');
    const memberFilter = document.getElementById('achieveMemberFilter').value;

    let filtered = [...allAchievements];
    if (memberFilter) {
        filtered = filtered.filter(a => {
            const tm = gf(a, ACHIEVE.teamMember);
            return Array.isArray(tm) && tm.some(t => t.id === memberFilter);
        });
    }

    if (filtered.length === 0) {
        feed.innerHTML = '<div class="empty-state"><div class="empty-state-icon">&#x1F3C6;</div><div class="empty-state-text">No achievements recorded yet.</div></div>';
        return;
    }

    feed.innerHTML = filtered.map(a => {
        const title = gf(a, ACHIEVE.title) || 'Achievement';
        const desc = gf(a, ACHIEVE.description) || '';
        const date = gf(a, ACHIEVE.date) || '';
        const tm = gf(a, ACHIEVE.teamMember);
        const tmName = Array.isArray(tm) && tm.length > 0 ? tm[0].name : 'Unknown';
        const member = allMembers.find(m => Array.isArray(tm) && tm.some(t => t.id === m.id));
        const source = gf(a, ACHIEVE.source);
        const sourceName = typeof source === 'string' ? source : (source?.name || '');

        const formattedDate = date ? new Date(date).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' }) : '';

        return `<div class="achievement-card">
            <div class="achievement-card-header">
                ${member ? avatarHtml(member, 32) : '<div class="avatar" style="width:32px;height:32px;font-size:var(--fs-xs)">?</div>'}
                <div>
                    <div class="achievement-card-name">${escHtml(tmName)}</div>
                    <div class="achievement-card-date">${escHtml(formattedDate)}${sourceName ? ` &middot; ${escHtml(sourceName)}` : ''}</div>
                </div>
            </div>
            <div class="achievement-card-title">${escHtml(title)}</div>
            <div class="achievement-card-desc">${escHtml(desc)}</div>
        </div>`;
    }).join('');
}

function renderReviews() {
    const grid = document.getElementById('reviewsGrid');
    const search = (document.getElementById('reviewSearch').value || '').toLowerCase();
    const deptFilter = document.getElementById('reviewDeptFilter').value;
    const stateFilter = document.getElementById('reviewStateFilter').value;

    let filtered = allMembers.filter(m => isActive(m));
    filtered = filtered.filter(m => {
        const count = linkCount(m, TEAM.performanceReviews);
        if (stateFilter === 'due' && count !== 0) return false;
        if (stateFilter === 'onrecord' && count === 0) return false;
        if (deptFilter && !deptNames(m).includes(deptFilter)) return false;
        if (search) {
            const hay = [memberName(m), gf(m, TEAM.jobTitle), ...deptNames(m), ...roleNames(m)].join(' ').toLowerCase();
            if (!hay.includes(search)) return false;
        }
        return true;
    });

    filtered.sort((a, b) => {
        const ca = linkCount(a, TEAM.performanceReviews);
        const cb = linkCount(b, TEAM.performanceReviews);
        if (ca !== cb) return ca - cb; // members needing a review first
        return memberName(a).localeCompare(memberName(b));
    });

    if (filtered.length === 0) {
        grid.innerHTML = '<div class="empty-state"><div class="empty-state-icon">&#x1F4CA;</div><div class="empty-state-text">No team members match your filters.</div></div>';
        return;
    }

    grid.innerHTML = filtered.map(m => {
        const name = memberName(m);
        const roles = roleNames(m);
        const depts = deptNames(m);
        const jobTitle = gf(m, TEAM.jobTitle);
        const count = linkCount(m, TEAM.performanceReviews);
        const chip = count > 0
            ? `<span class="chip chip-status chip-active">${escHtml(count)} review${count !== 1 ? 's' : ''} on record</span>`
            : `<span class="chip chip-status chip-offboarded">No reviews on record</span>`;

        return `<div class="member-card" onclick="openDrawer('${m.id}')">
            <div class="member-card-top">
                ${avatarHtml(m)}
                <div>
                    <div class="member-name">${escHtml(name)}</div>
                    <div class="member-role">${escHtml(jobTitle || roles.join(', ') || 'No role assigned')}</div>
                </div>
            </div>
            <div class="member-meta">
                ${chip}
                ${depts.map(d => `<span class="chip chip-dept">${escHtml(d)}</span>`).join('')}
            </div>
        </div>`;
    }).join('');
}

// Lightweight onboarding completeness derived from data already on the record.
const ONBOARD_CHECKS = [
    { label: 'Work email', test: m => !!gf(m, TEAM.workEmail) },
    { label: 'Manager assigned', test: m => linkCount(m, TEAM.manager) > 0 },
    { label: 'Contract on file', test: m => linkCount(m, TEAM.contractDocs) > 0 },
    { label: 'SOPs assigned', test: m => linkCount(m, TEAM.sops) > 0 || linkCount(m, TEAM.sopsTask) > 0 },
    { label: 'Profile photo', test: m => linkCount(m, TEAM.profilePhoto) > 0 },
];

function lifecycleCard(m, withChecklist) {
    const name = memberName(m);
    const roles = roleNames(m);
    const jobTitle = gf(m, TEAM.jobTitle);
    const startDate = gf(m, TEAM.startDate);
    const depts = deptNames(m);

    let checklistHtml = '';
    if (withChecklist) {
        const done = ONBOARD_CHECKS.filter(c => c.test(m)).length;
        const pct = Math.round((done / ONBOARD_CHECKS.length) * 100);
        checklistHtml = `<div style="display:flex;align-items:center;gap:6px;margin-top:10px">
            <div class="coverage-bar" style="flex:1"><div class="coverage-fill" style="width:${pct}%"></div></div>
            <span style="font-size:var(--fs-xs);color:var(--text-secondary);white-space:nowrap">${done}/${ONBOARD_CHECKS.length}</span>
        </div>
        <div class="checklist">${ONBOARD_CHECKS.map(c => {
            const ok = c.test(m);
            return `<div class="checklist-item ${ok ? 'check-done' : 'check-missing'}"><span class="checklist-icon">${ok ? '&#x2713;' : '&#x25CB;'}</span>${escHtml(c.label)}</div>`;
        }).join('')}</div>`;
    }

    return `<div class="member-card" onclick="openDrawer('${m.id}')">
        <div class="member-card-top">
            ${avatarHtml(m)}
            <div>
                <div class="member-name">${escHtml(name)}</div>
                <div class="member-role">${escHtml(jobTitle || roles.join(', ') || 'No role assigned')}</div>
            </div>
        </div>
        <div class="member-meta">
            ${depts.map(d => `<span class="chip chip-dept">${escHtml(d)}</span>`).join('')}
        </div>
        <div class="lifecycle-card-meta">${startDate ? `Start date: ${fmtDate(startDate)}` : 'No start date set'}</div>
        ${checklistHtml}
    </div>`;
}

function renderOnboarding() {
    const container = document.getElementById('onboardingContainer');
    const onboarding = allMembers.filter(m => statusName(m) === 'Onboarding')
        .sort((a, b) => memberName(a).localeCompare(memberName(b)));
    const offboarding = allMembers.filter(m => statusName(m) === 'Offboarding')
        .sort((a, b) => memberName(a).localeCompare(memberName(b)));

    if (onboarding.length === 0 && offboarding.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">&#x1F6EB;</div><div class="empty-state-text">No team members are currently onboarding or offboarding.</div></div>';
        return;
    }

    let html = '';
    html += `<div class="hr-group">
        <div class="hr-group-title">&#x1F6EB; Onboarding <span class="count">${onboarding.length}</span></div>`;
    html += onboarding.length
        ? `<div class="card-grid">${onboarding.map(m => lifecycleCard(m, true)).join('')}</div>`
        : `<div style="color:var(--text-muted);font-size:var(--fs-sm)">No one is currently onboarding.</div>`;
    html += `</div>`;

    html += `<div class="hr-group">
        <div class="hr-group-title">&#x1F6EC; Offboarding <span class="count">${offboarding.length}</span></div>`;
    html += offboarding.length
        ? `<div class="card-grid">${offboarding.map(m => lifecycleCard(m, false)).join('')}</div>`
        : `<div style="color:var(--text-muted);font-size:var(--fs-sm)">No one is currently offboarding.</div>`;
    html += `</div>`;

    container.innerHTML = html;
}

function renderHandbook() {
    const container = document.getElementById('handbookContainer');
    const active = allMembers.filter(m => isActive(m)).sort((a, b) => memberName(a).localeCompare(memberName(b)));

    // Canonical handbook link derives from the existing per-member handbookLink field (no new fields added).
    const links = active.map(m => gf(m, TEAM.handbookLink)).filter(Boolean);
    const canonical = [...new Set(links)][0] || '';
    const issued = links.length;

    let html = `<div class="hr-banner">
        <div class="hr-banner-text">
            <h3>&#x1F4D6; Team Member Handbook</h3>
            <p>Core values and onboarding information in one place, issued at onboarding so every new starter reads it.</p>
            <div class="hr-note">Issued to ${issued} of ${active.length} active member${active.length !== 1 ? 's' : ''}. Watch-and-acknowledge tracking arrives in phase two.</div>
        </div>
        <div>${canonical
            ? `<a class="btn btn-primary" href="${escHtml(canonical)}" target="_blank" rel="noopener">Open handbook</a>`
            : `<span class="phase2-tag">No handbook link set</span>`}</div>
    </div>`;

    // Handbook contents — structure only; HR content populated at integration (no field to store it yet).
    const sections = [
        { icon: '&#x2B50;', title: 'Core Values', body: 'Company core values — to be populated by HR.' },
        { icon: '&#x1F9ED;', title: 'Mission &amp; Vision', body: 'Mission and vision statement — to be populated by HR.' },
        { icon: '&#x1F91D;', title: 'Ways of Working', body: 'Standards, communication norms and expectations — to be populated by HR.' },
        { icon: '&#x1F4CB;', title: 'Onboarding Essentials', body: 'First-week checklist, tools access and key contacts — to be populated by HR.' }
    ];
    html += `<div class="hr-group-title">Handbook contents <span class="phase2-tag">content to be populated</span></div>`;
    html += `<div class="value-grid">${sections.map(s => `<div class="value-card"><h4>${s.icon} ${s.title}</h4><p>${escHtml(s.body)}</p></div>`).join('')}</div>`;

    html += `<div class="hr-group-title">Issued status <span class="count">${active.length}</span></div>`;
    if (active.length === 0) {
        html += '<div class="empty-state"><div class="empty-state-icon">&#x1F4D6;</div><div class="empty-state-text">No active team members.</div></div>';
    } else {
        html += `<table class="training-table"><thead><tr><th>Team Member</th><th>Handbook issued</th><th>Acknowledged</th></tr></thead><tbody>`;
        active.forEach(m => {
            const has = !!gf(m, TEAM.handbookLink);
            html += `<tr><td>${escHtml(memberName(m))}</td>`
                + `<td><span class="training-badge ${has ? 'training-trained' : 'training-not'}">${has ? 'Issued' : 'Not issued'}</span></td>`
                + `<td><span class="phase2-tag">Phase two</span></td></tr>`;
        });
        html += `</tbody></table>`;
    }

    container.innerHTML = html;
}

function toggleAddAchievement() {
    const form = document.getElementById('addAchievementForm');
    if (form.style.display === 'none') {
        const activeMembers = allMembers.filter(m => isActive(m)).sort((a,b) => memberName(a).localeCompare(memberName(b)));
        form.style.display = 'block';
        form.innerHTML = `<div class="add-form">
            <label>Team Member</label>
            <select id="achMember">
                <option value="">Select team member...</option>
                ${activeMembers.map(m => `<option value="${m.id}">${escHtml(memberName(m))}</option>`).join('')}
            </select>
            <label>Date</label>
            <input type="date" id="achDate" value="${new Date().toISOString().slice(0,10)}">
            <label>Description</label>
            <textarea id="achDesc" placeholder="What was achieved?"></textarea>
            <div class="add-form-actions">
                <button class="btn" onclick="toggleAddAchievement()">Cancel</button>
                <button class="btn btn-primary" id="achSubmitBtn" onclick="submitAchievement()">Save Achievement</button>
            </div>
        </div>`;
    } else {
        form.style.display = 'none';
        form.innerHTML = '';
    }
}

async function submitAchievement() {
    const memberId = document.getElementById('achMember').value;
    const date = document.getElementById('achDate').value;
    const desc = document.getElementById('achDesc').value.trim();

    if (!memberId || !desc) { showToast('Please select a team member and enter a description.'); return; }

    const btn = document.getElementById('achSubmitBtn');
    btn.disabled = true;
    btn.textContent = 'Saving...';

    try {
        const fields = {};
        fields[ACHIEVE.teamMember] = [{ id: memberId }];
        fields[ACHIEVE.date] = date;
        fields[ACHIEVE.description] = desc;

        await airtablePost(ACHIEVE_TABLE, { records: [{ fields }] });
        showToast('Achievement saved!');
        toggleAddAchievement();
        await loadAll(true);
        switchInternalTab('achievements');
    } catch (e) {
        showToast('Failed to save: ' + e.message);
        btn.disabled = false;
        btn.textContent = 'Save Achievement';
    }
}
</script>

</html>
