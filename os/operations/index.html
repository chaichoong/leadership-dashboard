function renderPropertyKpis(){
  const sch = SCHEMA_RESOLVED?.properties; if (!sch) return;
  const total = DATA.properties.length;
  const sumNum = (arr, fieldId) => arr.reduce((s,r)=>{
    const v = r.fields[fieldId]; const n = typeof v==='number'?v:parseFloat(v); return s + (isNaN(n)?0:n);
  },0);
  const sumDerived = (arr, fn) => arr.reduce((s,r)=>{ const n = fn(r); return s + ((n==null||isNaN(n))?0:n); },0);
  const totalValue    = sumNum(DATA.properties, sch.byKey.marketValue?.id);
  const totalDebt     = sumNum(DATA.properties, sch.byKey.mortgageBal?.id);
  const totalRent     = sumDerived(DATA.properties, derivePropertyGrossRent);
  const totalMortgage = sumDerived(DATA.properties, deriveMortgagePay);
  const totalBeds     = sumNum(DATA.properties, sch.byKey.beds?.id);
  const totalPurchase = sumNum(DATA.properties, sch.byKey._purchPrice?.id);
  const equity     = totalValue - totalDebt;
  const annualRent = totalRent * 12;
  const annualNet  = (totalRent - totalMortgage) * 12;
  const portfolioYield = totalValue > 0 ? (annualRent / totalValue * 100) : 0;
  const cashOnCash     = equity > 0 ? (annualNet / equity * 100) : 0;
  const capGrowth      = totalPurchase > 0 ? totalValue - totalPurchase : null;
  const avgLTV         = totalValue > 0 ? (totalDebt / totalValue * 100) : 0;

  // Occupancy across all units
  const unitSch = SCHEMA_RESOLVED?.units;
  let occupied = 0, totalUnits = DATA.units.length;
  if (unitSch?.byKey?.status?.id) {
    for (const u of DATA.units) {
      const v = u.fields[unitSch.byKey.status.id];
      const name = Array.isArray(v) ? (v[0]?.name||v[0]) : (typeof v==='object'?v?.name:v);
      if (/occupied|active/i.test(String(name||''))) occupied++;
    }
  }
  const occRate = totalUnits ? (occupied/totalUnits*100) : 0;

  document.getElementById('propertyKpis').innerHTML = `
    <div class="kpi"><div class="label">Properties</div><div class="value">${total}</div><div class="sub">${totalUnits} units · ${totalBeds||'—'} beds</div></div>
    <div class="kpi"><div class="label">Portfolio Value</div><div class="value">${fmtMoneyShort(totalValue)}</div><div class="sub">market value</div></div>
    <div class="kpi"><div class="label">Total Debt</div><div class="value">${fmtMoneyShort(totalDebt)}</div><div class="sub">avg LTV ${avgLTV.toFixed(1)}%</div></div>
    <div class="kpi"><div class="label">Equity</div><div class="value" style="color:var(--success)">${fmtMoneyShort(equity)}</div><div class="sub">${totalValue?(equity/totalValue*100).toFixed(0):0}% of value</div></div>
    ${capGrowth!=null?`<div class="kpi"><div class="label">Capital Growth</div><div class="value" style="color:${capGrowth>=0?'var(--success)':'var(--danger)'}">${fmtMoneyShort(capGrowth)}</div><div class="sub">${(capGrowth/totalPurchase*100).toFixed(1)}% since purchase</div></div>`:''}
    <div class="kpi"><div class="label">Gross Rent / mo</div><div class="value">${fmtMoneyShort(totalRent)}</div><div class="sub">${fmtMoneyShort(annualRent)} / yr</div></div>
    <div class="kpi"><div class="label">Mortgage / mo</div><div class="value">${fmtMoneyShort(totalMortgage)}</div><div class="sub">total debt service</div></div>
    <div class="kpi"><div class="label">Net Rent / mo</div><div class="value" style="color:${(totalRent-totalMortgage)>=0?'var(--success)':'var(--danger)'}">${fmtMoneyShort(totalRent-totalMortgage)}</div><div class="sub">before opex</div></div>
    <div class="kpi"><div class="label">Gross Yield</div><div class="value">${portfolioYield.toFixed(2)}%</div><div class="sub">annual rent / value</div></div>
    <div class="kpi"><div class="label">Cash on Cash</div><div class="value" style="color:${cashOnCash>=8?'var(--success)':cashOnCash>=4?'var(--warning)':'var(--danger)'}">${cashOnCash.toFixed(2)}%</div><div class="sub">net rent / equity</div></div>
    <div class="kpi"><div class="label">Occupancy</div><div class="value" style="color:${occRate>=90?'var(--success)':occRate>=75?'var(--warning)':'var(--danger)'}">${occRate.toFixed(0)}%</div><div class="sub">${occupied} / ${totalUnits} units</div></div>
  `;
}

// ═══════════════════════════════════════════════════════════════════════
// Generic table renderer
// ═══════════════════════════════════════════════════════════════════════
function renderTable(entityKey, sch, rows){
  if (!rows.length) {
    return `<div class="empty"><div class="icon">📭</div><div class="msg">No ${SCHEMA[entityKey].label.toLowerCase()} match the current filters.</div></div>`;
  }
  const cols = SCHEMA[entityKey].fields.map(def => sch.byKey[def.key]).filter(c => c && !c.missing);
  const sort = sortState[entityKey];

  // Per-column class for body-cell styling. Money/percent/moneyBig right-align;
  // plain `number` (small integers like Beds, Unit #, Due Day) center so single
  // digits don't sit on the column border.
  const colCls = (c) => {
    const a = [];
    if (c.type === 'money' || c.type === 'moneyBig' || c.type === 'percent') a.push('money');
    else if (c.type === 'number') a.push('num-center');
    if (c.type === 'link' || c.type === 'select') a.push('wrap-cell');
    return a.join(' ');
  };

  // <colgroup> defines widths once for both head and body — no need to repeat
  // them per-cell, and table-layout:fixed honours them strictly so the table
  // never overflows beyond the sum of declared widths.
  const colgroup = '<colgroup>'
    + cols.map(c => `<col${c.width?` style="width:${c.width}"`:''}>`).join('')
    + '<col style="width:36px">'
    + '</colgroup>';

  const head = '<tr>' + cols.map(c => {
    const isSorted = sort && sort.key === c.key;
    const arrow = isSorted ? (sort.dir==='asc'?'▲':'▼') : '↕';
    const cls = [colCls(c), isSorted?'sorted':''].filter(Boolean).join(' ');
    return `<th class="${cls}" data-col="${c.key}" onclick="toggleSort('${entityKey}','${c.key}')"><span class="th-inner"><span class="th-label">${escapeHtml(c.label)}</span><span class="th-sort">${arrow}</span></span></th>`;
  }).join('') + '<th></th></tr>';

  const body = rows.map(r => {
    const tds = cols.map(c => `<td class="${colCls(c)}">${renderCell(r, c, entityKey)}</td>`).join('');
    return `<tr data-rec="${r.id}" data-entity="${entityKey}">${tds}<td><button class="row-open" onclick="event.stopPropagation();openDrawer('${entityKey}','${r.id}')" title="Open detail">↗</button></td></tr>`;
  }).join('');

  return `<div class="table-wrap"><table class="dt">${colgroup}<thead>${head}</thead><tbody>${body}</tbody></table></div>`;
}

function applySort(rows, entityKey, sch){
  const s = sortState[entityKey];
  if (!s) return rows;
  const col = sch.byKey[s.key];
  if (!col) return rows;
  const dir = s.dir === 'asc' ? 1 : -1;

  // Compute a sortable key per record. For link fields we need the linked
  // record's display NAME, not its raw `recXXX` id (which sorts as if random).
  // Virtual fields use their compute(). Numbers fall through unchanged.
  const sortKey = (rec) => {
    if (col.virtual && col.compute) return col.compute(rec);
    if (!col.id) return null;
    let v = rec.fields[col.id];
    if (Array.isArray(v)) {
      if (col.type === 'link' && col.link && v.length) {
        const linked = INDEX[col.link] && INDEX[col.link][v[0]];
        return linked ? displayName(linked, col.link) : v[0];
      }
      v = v[0];
    }
    if (typeof v === 'object' && v) v = v.name || v.id;
    return v;
  };

  return [...rows].sort((a,b) => {
    const av = sortKey(a); const bv = sortKey(b);
    if (av == null && bv == null) return 0;
    if (av == null) return 1;
    if (bv == null) return -1;
    if (typeof av === 'number' && typeof bv === 'number') return (av-bv)*dir;
    // numeric:true gives natural sort so "23 Viola Street" < "30 Burnbank" < "282 X"
    return String(av).localeCompare(String(bv), undefined, { numeric:true, sensitivity:'base' }) * dir;
  });
}

function toggleSort(entityKey, key){
  const cur = sortState[entityKey];
  if (cur && cur.key === key) {
    sortState[entityKey] = cur.dir === 'asc' ? {key, dir:'desc'} : null;
  } else {
    sortState[entityKey] = {key, dir:'asc'};
  }
  renderActiveTab();
}

// ═══════════════════════════════════════════════════════════════════════
// Inline editing
// ═══════════════════════════════════════════════════════════════════════
document.addEventListener('click', e => {
  const editEl = e.target.closest('.editable');
  if (!editEl || editEl.dataset._editing) return;
  if (e.target.closest('.chip')) return; // don't trigger from chip clicks
  startEdit(editEl);
});

function startEdit(el){
  if (el.dataset._editing) return;
  el.dataset._editing = '1';
  const type = el.dataset.type;
  const fieldId = el.dataset.edit;
  const recId = el.dataset.rec;
  const entityKey = el.dataset.entity;
  const sch = SCHEMA_RESOLVED[entityKey];
  const fieldDef = sch.byId[fieldId];
  const record = INDEX[entityKey][recId];
  const raw = record.fields[fieldId];

  if (type === 'select') {
    const sel = document.createElement('select');
    sel.className = 'inline-select';
    const cur = typeof raw === 'object' ? raw?.name : raw;
    sel.innerHTML = '<option value="">—</option>' + (fieldDef.options?.choices||[]).map(c=>`<option value="${escapeHtml(c.name)}" ${c.name===cur?'selected':''}>${escapeHtml(c.name)}</option>`).join('');
    replaceWithEditor(el, sel, async () => {
      const newVal = sel.value || null;
      if (newVal === cur) { finishEdit(el, record, entityKey); return; }
      await saveField(entityKey, recId, fieldId, newVal === null ? null : { name: newVal }, el);
    });
    sel.focus(); return;
  }

  if (type === 'date') {
    const inp = document.createElement('input');
    inp.type = 'date'; inp.className = 'inline-input';
    if (raw) inp.value = String(raw).slice(0,10);
    replaceWithEditor(el, inp, async () => {
      const v = inp.value || null;
      if (v === (raw ? String(raw).slice(0,10) : null)) { finishEdit(el, record, entityKey); return; }
      await saveField(entityKey, recId, fieldId, v, el);
    });
    inp.focus(); return;
  }

  if (type === 'number' || type === 'money' || type === 'moneyBig' || type === 'percent') {
    const inp = document.createElement('input');
    inp.type = 'number'; inp.className = 'inline-input';
    inp.step = type === 'percent' ? '0.001' : (type === 'money' ? '0.01' : (type === 'moneyBig' ? '100' : '1'));
    inp.value = raw == null ? '' : (type === 'percent' && typeof raw === 'number' ? raw : raw);
    replaceWithEditor(el, inp, async () => {
      const v = inp.value === '' ? null : parseFloat(inp.value);
      if (v === raw) { finishEdit(el, record, entityKey); return; }
      await saveField(entityKey, recId, fieldId, v, el);
    });
    inp.focus(); inp.select(); return;
  }

  // text / long
  const tag = type === 'long' ? 'textarea' : 'input';
  const inp = document.createElement(tag);
  inp.className = 'inline-input';
  if (tag === 'input') inp.type = 'text';
  else inp.rows = 4;
  inp.style.width = '100%';
  inp.value = raw == null ? '' : String(raw);
  replaceWithEditor(el, inp, async () => {
    const v = inp.value;
    if (v === (raw == null ? '' : String(raw))) { finishEdit(el, record, entityKey); return; }
    await saveField(entityKey, recId, fieldId, v === '' ? null : v, el);
  });
  inp.focus();
  if (tag === 'input') inp.select();
}

function replaceWithEditor(el, editor, commit){
  const original = el.outerHTML;
  el.dataset._original = original;
  el.style.display = 'none';
  el.parentNode.insertBefore(editor, el.nextSibling);
  let committed = false;
  const commitOnce = async () => {
    if (committed) return; committed = true;
    editor.disabled = true;
    try { await commit(); } catch (e) { console.error(e); }
  };
  editor.addEventListener('blur', commitOnce);
  editor.addEventListener('keydown', e => {
    if (e.key === 'Enter' && editor.tagName !== 'TEXTAREA') { e.preventDefault(); editor.blur(); }
    else if (e.key === 'Escape') {
      committed = true;
      editor.remove();
      el.style.display = '';
      delete el.dataset._editing;
    }
  });
}

function finishEdit(el, record, entityKey){
  // Re-render the cell fresh
  const fieldId = el.dataset.edit;
  const sch = SCHEMA_RESOLVED[entityKey];
  const fieldDef = sch.byId[fieldId];
  const html = renderCell(record, fieldDef, entityKey);
  // Replace the editor + the hidden span
  const next = el.nextSibling;
  if (next && next !== el) next.remove();
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  el.replaceWith(tmp.firstChild || document.createTextNode(''));
}

async function saveField(entityKey, recId, fieldId, value, el){
  const tableId = TABLE[entityKey === 'units' ? 'rentalUnits' : entityKey];
  el.classList.add('cell-saving');
  try {
    const body = { fields: { [fieldId]: value }, returnFieldsByFieldId: true };
    const res = await airtableFetch(`${BASE_ID}/${tableId}/${recId}`, { method:'PATCH', body: JSON.stringify(body) });
    // Update local record
    const rec = INDEX[entityKey][recId];
    if (rec && res.fields) {
      rec.fields = { ...rec.fields, ...res.fields };
    }
    el.classList.remove('cell-saving');
    el.classList.remove('cell-error');
    finishEdit(el, rec, entityKey);
    toast('Saved', 'success');
  } catch (e) {
    console.error('save failed', e);
    el.classList.remove('cell-saving');
    el.classList.add('cell-error');
    delete el.dataset._editing;
    el.style.display = '';
    const next = el.nextSibling;
    if (next && next.tagName && /input|select|textarea/i.test(next.tagName)) next.remove();
    toast('Save failed: ' + (e.message||'unknown'), 'error');
  }
}

async function saveCheckbox(input, recId, fieldId, entityKey){
  const v = input.checked;
  const tableId = TABLE[entityKey === 'units' ? 'rentalUnits' : entityKey];
  try {
    const res = await airtableFetch(`${BASE_ID}/${tableId}/${recId}`, { method:'PATCH', body: JSON.stringify({ fields: { [fieldId]: v }, returnFieldsByFieldId:true }) });
    const rec = INDEX[entityKey][recId];
    if (rec && res.fields) rec.fields = { ...rec.fields, ...res.fields };
    toast('Saved', 'success');
  } catch (e) {
    input.checked = !v;
    toast('Save failed: '+e.message, 'error');
  }
}

// ═══════════════════════════════════════════════════════════════════════
// Detail drawer
// ═══════════════════════════════════════════════════════════════════════
function openDrawer(entityKey, recId){
  const sch = SCHEMA_RESOLVED[entityKey];
  const rec = INDEX[entityKey][recId]; if (!rec) return;
  const title = displayName(rec, entityKey);
  // Use the explicit `singular` label so "Tenancies" → "Tenancy" (not "Tenancie")
  const subtitle = (SCHEMA[entityKey].singular || SCHEMA[entityKey].label.replace(/s$/,'')) + ' · ' + recId;

  // Main fields (curated)
  const mainRows = SCHEMA[entityKey].fields
    .map(def => sch.byKey[def.key])
    .filter(c => c && !c.missing)
    .map(c => fieldRow(c, rec, entityKey))
    .join('');

  // Drawer extras (Properties only)
  const extraRows = (sch.drawerExtras||[])
    .map(c => fieldRow(c, rec, entityKey))
    .join('');

  // Computed financial sections for Properties
  let computedSection = '';
  let valuationSection = '';
  let rentBreakdownSection = '';
  let mortgageBreakdownSection = '';
  if (entityKey === 'properties') {
    computedSection         = renderPropertyDetailMetrics(rec);
    valuationSection        = renderPropertyValuationHistory(rec);
    rentBreakdownSection    = renderPropertyRentBreakdown(rec);
    mortgageBreakdownSection= renderPropertyMortgageBreakdown(rec);
  }

  // Linked units list for properties
  let linkedSection = '';
  if (entityKey === 'properties') {
    const unitSch = SCHEMA_RESOLVED.units;
    const linkedUnits = DATA.units.filter(u => {
      const v = u.fields[unitSch?.byKey?.property?.id];
      return Array.isArray(v) && v.includes(recId);
    });
    if (linkedUnits.length) {
      linkedSection = `<div class="drawer-section"><h3>Rental Units (${linkedUnits.length})</h3>` +
        linkedUnits.map(u => {
          const status = u.fields[unitSch.byKey.status?.id];
          const statusName = Array.isArray(status) ? (status[0]?.name||status[0]) : (typeof status==='object'?status?.name:status);
          const tenant = u.fields[unitSch.byKey.tenant?.id];
          const tenantName = Array.isArray(tenant) && tenant[0] ? (INDEX.tenants[tenant[0]] ? displayName(INDEX.tenants[tenant[0]],'tenants') : tenant[0]) : '—';
          return `<div class="field-row" style="grid-template-columns:1fr 100px 1fr;cursor:pointer" onclick="closeDrawer();crossNav('units','${u.id}')">
            <div><strong>${escapeHtml(displayName(u,'units'))}</strong></div>
            <div><span class="badge ${badgeClass(statusName||'')}">${escapeHtml(statusName||'—')}</span></div>
            <div style="color:var(--text-secondary)">${escapeHtml(tenantName)}</div>
          </div>`;
        }).join('') + '</div>';
    }
  }

  const html = `
    <div class="drawer-overlay" onclick="if(event.target===this)closeDrawer()">
      <div class="drawer">
        <div class="drawer-header">
          <div class="hdr-main">
            <h2>${escapeHtml(title)}</h2>
            <div class="hdr-sub">${escapeHtml(subtitle)}</div>
          </div>
          <button class="drawer-close" onclick="closeDrawer()">×</button>
        </div>
        <div class="drawer-body">
          ${computedSection}
          ${valuationSection}
          ${rentBreakdownSection}
          ${mortgageBreakdownSection}
          <div class="drawer-section">
            <h3>Details</h3>
            ${mainRows}
            ${extraRows}
          </div>
          ${linkedSection}
        </div>
      </div>
    </div>
  `;
  document.getElementById('drawerOverlay').innerHTML = html;
}

function closeDrawer(){
  document.getElementById('drawerOverlay').innerHTML = '';
}

function fieldRow(fieldDef, record, entityKey){
  const cellHtml = renderCell(record, fieldDef, entityKey);
  return `<div class="field-row"><div class="field-label">${escapeHtml(fieldDef.label || fieldDef.name)}</div><div class="field-value">${cellHtml}</div></div>`;
}

// Mortgage Cost Breakdown — list every cost record linked to this property
// with its amount and active flag. Lets the user verify which cost records
// the Mortgage / mo column is summing.
function renderPropertyMortgageBreakdown(rec){
  const linkId = fid('properties','_mortCostLink');
  if (!linkId) return '';
  const linked = rec.fields[linkId];
  if (!Array.isArray(linked) || !linked.length) {
    return `<div class="drawer-section">
      <h3>Mortgage Cost Breakdown</h3>
      <div style="font-size:12px;color:var(--text-muted)">No mortgage cost is linked to this property in Airtable. Mortgage / mo therefore shows blank. Link a Cost record on the Properties table to fix.</div>
    </div>`;
  }
  const expFid      = fid('costs','expected');
  const inactiveFid = fid('costs','inactive');
  if (!expFid) return '';
  const rows = linked.map(id => {
    const cost = INDEX.costs[id];
    if (!cost) return { id, name:id, amount:null, active:false, missing:true };
    const amt = parseFloat(cost.fields[expFid]);
    return {
      id,
      name: displayName(cost,'costs'),
      amount: isNaN(amt) ? null : amt,
      active: !inactiveFid || !cost.fields[inactiveFid],
    };
  });
  const active   = rows.filter(r => r.active);
  const inactive = rows.filter(r => !r.active);
  const total    = active.reduce((s,r) => s + (r.amount||0), 0);
  return `<div class="drawer-section">
    <h3>Mortgage Cost Breakdown</h3>
    <div style="font-size:11px;color:var(--text-secondary);margin-bottom:8px">The Mortgage / mo column sums the active rows below. If a value here looks wrong, fix the link or the cost record in Airtable.</div>
    <table class="breakdown-table">
      <thead><tr><th>Cost record</th><th style="text-align:right">Monthly</th><th style="width:80px">Status</th></tr></thead>
      <tbody>
        ${active.map(r => `<tr><td>${escapeHtml(r.name)}</td><td class="money">${r.amount!=null?fmtMoney(r.amount):'—'}</td><td><span class="badge badge-active">active</span></td></tr>`).join('')}
        ${inactive.map(r => `<tr style="color:var(--text-muted)"><td>${escapeHtml(r.name)}</td><td class="money">${r.amount!=null?fmtMoney(r.amount):'—'}</td><td><span class="badge badge-former">inactive</span></td></tr>`).join('')}
        <tr class="total"><td>Total (active)</td><td class="money">${fmtMoney(total)}</td><td></td></tr>
      </tbody>
    </table>
  </div>`;
}

// Rent Breakdown — list units belonging to this property and the active
// tenancy / rent on each. Lets the user verify what Rent / mo is summing.
function renderPropertyRentBreakdown(rec){
  const unitSch = SCHEMA_RESOLVED?.units;
  const tenSch  = SCHEMA_RESOLVED?.tenancies;
  if (!unitSch || !tenSch) return '';
  const propLinkOnUnits = unitSch.byKey.property?.id;
  const unitLinkOnTen   = tenSch.byKey.unit?.id;
  const rentFid         = tenSch.byKey.rent?.id;
  const tenantLinkFid   = tenSch.byKey.tenant?.id;
  if (!propLinkOnUnits || !unitLinkOnTen || !rentFid) return '';
  const units = DATA.units.filter(u => {
    const v = u.fields[propLinkOnUnits];
    return Array.isArray(v) && v.includes(rec.id);
  });
  if (!units.length) return '';
  let total = 0;
  const rows = [];
  for (const u of units) {
    const unitName = displayName(u,'units');
    const activeTen = DATA.tenancies.filter(t => {
      const v = t.fields[unitLinkOnTen];
      return Array.isArray(v) && v.includes(u.id) && isActiveStatus(t,'tenancies');
    });
    if (!activeTen.length) {
      rows.push({ unit:unitName, tenant:null, rent:null, void:true });
      continue;
    }
    for (const t of activeTen) {
      const tlink = tenantLinkFid ? t.fields[tenantLinkFid] : null;
      const tid   = Array.isArray(tlink) ? tlink[0] : null;
      const tname = (tid && INDEX.tenants[tid]) ? displayName(INDEX.tenants[tid],'tenants') : '—';
      const r = parseFloat(t.fields[rentFid]);
      const rent = isNaN(r) ? null : r;
      if (rent != null) total += rent;
      rows.push({ unit:unitName, tenant:tname, rent });
    }
  }
  return `<div class="drawer-section">
    <h3>Rent Breakdown</h3>
    <div style="font-size:11px;color:var(--text-secondary);margin-bottom:8px">Expected monthly rent on active tenancies, per unit. Void units contribute nothing.</div>
    <table class="breakdown-table">
      <thead><tr><th>Unit</th><th>Tenant</th><th style="text-align:right">Rent / mo</th></tr></thead>
      <tbody>
        ${rows.map(r => `<tr>
          <td>${escapeHtml(r.unit)}</td>
          <td>${r.void ? '<span class="badge badge-void">void</span>' : escapeHtml(r.tenant)}</td>
          <td class="money">${r.rent!=null?fmtMoney(r.rent):'—'}</td>
        </tr>`).join('')}
        <tr class="total"><td colspan="2">Total</td><td class="money">${fmtMoney(total)}</td></tr>
      </tbody>
    </table>
  </div>`;
}

// ═══════════════════════════════════════════════════════════════════════
// Valuation History — per-property historical estimates with trend chart.
// Approved valuations update Property.Current Market Value. The chart
// plots Approved valuations only so the trend line reflects accepted truth.
// ═══════════════════════════════════════════════════════════════════════
function getPropertyValuations(propRec){
  const sch = SCHEMA_RESOLVED.valuations; if (!sch) return [];
  const propLink = sch.byKey.property?.id; if (!propLink) return [];
  return DATA.valuations
    .filter(v => Array.isArray(v.fields[propLink]) && v.fields[propLink].includes(propRec.id))
    .map(v => ({
      id: v.id,
      date: v.fields[sch.byKey.date?.id] || null,
      value: parseFloat(v.fields[sch.byKey.value?.id]) || 0,
      source: ((v.fields[sch.byKey.source?.id])||{}).name || '',
      status: ((v.fields[sch.byKey.status?.id])||{}).name || '',
      confidence: ((v.fields[sch.byKey.confidence?.id])||{}).name || '',
      methodology: v.fields[sch.byKey.methodology?.id] || '',
      previousValue: parseFloat(v.fields[sch.byKey.previousValue?.id]) || null,
      raw: v,
    }))
    .sort((a,b) => String(a.date||'').localeCompare(String(b.date||'')));
}

function renderPropertyValuationHistory(propRec){
  const all = getPropertyValuations(propRec);
  const approved = all.filter(v => /approved/i.test(v.status));
  const pending  = all.filter(v => /pending/i.test(v.status));
  const sch = SCHEMA_RESOLVED.properties;
  const currentValue = parseFloat(propRec.fields[sch.byKey.marketValue?.id]) || 0;
  const purchPrice   = parseFloat(propRec.fields[sch.byKey._purchPrice?.id]) || null;

  // Headline tiles: current, change since first approved, change since purchase
  const first = approved[0];
  const sinceFirst = (first && currentValue) ? currentValue - first.value : null;
  const sinceFirstPct = (first && first.value) ? ((currentValue - first.value) / first.value * 100) : null;
  const sincePurch = (purchPrice && currentValue) ? currentValue - purchPrice : null;
  const sincePurchPct = (purchPrice) ? ((currentValue - purchPrice) / purchPrice * 100) : null;

  const tiles = `
    <div class="valuation-summary">
      <div class="val-tile"><div class="lbl">Current Value</div><div class="val">${fmtMoneyShort(currentValue)}</div><div class="sub">latest approved</div></div>
      ${sincePurch != null ? `<div class="val-tile"><div class="lbl">vs Purchase</div><div class="val" style="color:${sincePurch>=0?'var(--success)':'var(--danger)'}">${sincePurch>=0?'+':''}${fmtMoneyShort(sincePurch)}</div><div class="sub">${sincePurchPct.toFixed(1)}% since ${fmtMoneyShort(purchPrice)}</div></div>` : ''}
      ${sinceFirst != null ? `<div class="val-tile"><div class="lbl">vs First Valuation</div><div class="val" style="color:${sinceFirst>=0?'var(--success)':'var(--danger)'}">${sinceFirst>=0?'+':''}${fmtMoneyShort(sinceFirst)}</div><div class="sub">${sinceFirstPct.toFixed(1)}% since ${fmtDate(first.date)}</div></div>` : ''}
      <div class="val-tile"><div class="lbl">Total Valuations</div><div class="val">${all.length}</div><div class="sub">${approved.length} approved · ${pending.length} pending</div></div>
    </div>`;

  // Chart canvas (approved valuations as a line)
  const chartId = 'valChart_' + propRec.id;
  const chartHtml = approved.length >= 2
    ? `<div class="val-chart-wrap"><canvas id="${chartId}"></canvas></div>`
    : (approved.length === 1
        ? `<div class="val-empty">One approved valuation logged. Run another to start the trend.</div>`
        : `<div class="val-empty">No approved valuations yet. Run an AI valuation below to add the first one.</div>`);

  // Pending review banner
  const pendingHtml = pending.length ? `
    <div style="background:var(--warning-bg);border:1px solid var(--warning);border-radius:8px;padding:10px 12px;margin-bottom:12px;font-size:12px;color:var(--warning)">
      <strong>${pending.length} valuation${pending.length>1?'s':''} pending review</strong>
      — open the most recent below to approve or reject.
    </div>` : '';

  // History table — most recent first
  const historyRows = [...all].reverse().map(v => {
    const isPending = /pending/i.test(v.status);
    return `<tr style="${isPending?'background:var(--warning-bg)':''}${/rejected/i.test(v.status)?';opacity:.5':''}">
      <td>${escapeHtml(fmtDate(v.date)||'—')}</td>
      <td class="money">${fmtMoneyShort(v.value)}</td>
      <td><span class="schema-tag">${escapeHtml(v.source||'—')}</span></td>
      <td><span class="badge ${badgeClass(v.status)}">${escapeHtml(v.status||'—')}</span></td>
      <td>${escapeHtml(v.confidence||'—')}</td>
      <td><button class="btn-secondary btn-sm" style="padding:3px 8px;font-size:11px" onclick="event.stopPropagation();openValuationModal('${propRec.id}','${v.id}')">${isPending?'Review':'View'}</button></td>
    </tr>`;
  }).join('');

  const historyTable = all.length ? `
    <table class="breakdown-table">
      <thead><tr><th>Date</th><th style="text-align:right">Value</th><th>Source</th><th>Status</th><th>Confidence</th><th></th></tr></thead>
      <tbody>${historyRows}</tbody>
    </table>` : '';

  // Render the chart on next tick (canvas needs to be in DOM first)
  if (approved.length >= 2) {
    setTimeout(() => renderValuationChart(chartId, approved), 50);
  }

  return `<div class="drawer-section">
    <h3>Valuation History</h3>
    ${tiles}
    ${pendingHtml}
    ${chartHtml}
    <div class="val-actions">
      <button class="btn-ai" onclick="runAIValuation('${propRec.id}')">✨ Run AI Valuation</button>
    </div>
    ${historyTable}
  </div>`;
}

function renderValuationChart(canvasId, approvedValuations){
  if (typeof Chart === 'undefined') return;
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  // Tear down any prior instance on this canvas
  if (canvas._chart) { try { canvas._chart.destroy(); } catch(e){} }
  // Resolve token colours so the chart matches the design system
  const css = getComputedStyle(document.body);
  const accent = css.getPropertyValue('--accent').trim() || '#2C6E49';
  const textMuted = css.getPropertyValue('--text-muted').trim() || '#8A928C';
  const borderSubtle = css.getPropertyValue('--border-subtle').trim() || '#E5E8E1';
  canvas._chart = new Chart(canvas, {
    type: 'line',
    data: {
      labels: approvedValuations.map(v => fmtDate(v.date)),
      datasets: [{
        label: 'Approved Valuation',
        data: approvedValuations.map(v => v.value),
        borderColor: accent,
        backgroundColor: accent + '22',
        tension: 0.2,
        fill: true,
        pointRadius: 4,
        pointHoverRadius: 6,
      }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: (ctx) => '£' + ctx.parsed.y.toLocaleString('en-GB') } },
      },
      scales: {
        y: { ticks: { callback: (v) => '£' + Number(v).toLocaleString('en-GB'), color: textMuted, font:{ size: 10 } }, grid: { color: borderSubtle } },
        x: { ticks: { color: textMuted, font:{ size: 10 } }, grid: { display: false } },
      },
    },
  });
}

// ═══════════════════════════════════════════════════════════════════════
// AI Valuation flow — Anthropic API with web search
// 1. Confirm or capture API key
// 2. Send Claude a structured prompt with the property details
// 3. Claude does up to 6 web searches for comparable sales
// 4. Parse the <output> JSON block from the response
// 5. Show review modal with comparables + estimated value
// 6. On Approve: persist a Pending → Approved valuation + PATCH Market Value
// ═══════════════════════════════════════════════════════════════════════
const ANTHROPIC_KEY_LS = '_anthropic_key';
function getAnthropicKey(){ return localStorage.getItem(ANTHROPIC_KEY_LS) || ''; }
function setAnthropicKey(k){ localStorage.setItem(ANTHROPIC_KEY_LS, k); }

function showAIModal(html, opts={}){
  const close = opts.closable !== false;
  const wrap = document.getElementById('drawerOverlay');
  // Render on top of the drawer; we use a separate stacking container
  let host = document.getElementById('aiModalHost');
  if (!host) { host = document.createElement('div'); host.id='aiModalHost'; document.body.appendChild(host); }
  host.innerHTML = `
    <div class="modal-overlay" style="z-index:10001" ${close?'onclick="if(event.target===this)closeAIModal()"':''}>
      <div class="modal-card" style="max-width:780px">
        <div class="modal-header">
          <h2>${opts.title || 'AI Valuation'}</h2>
          ${close ? '<button class="modal-close" onclick="closeAIModal()">×</button>' : ''}
        </div>
        <div class="modal-body" id="aiModalBody">${html}</div>
      </div>
    </div>`;
}
function closeAIModal(){ const h=document.getElementById('aiModalHost'); if (h) h.innerHTML=''; }

async function ensureAnthropicKey(){
  let key = getAnthropicKey();
  if (key) return key;
  return new Promise((resolve) => {
    showAIModal(`
      <div class="ai-key-prompt">
        <p style="font-size:13px;color:var(--text-secondary);line-height:1.5">Connect your Anthropic API key so the page can run web-search-backed property valuations. The key is stored in this browser's localStorage only — same place as your Airtable PAT.</p>
        <input id="aiKeyInput" type="password" placeholder="sk-ant-..." autocomplete="off">
        <div style="display:flex;gap:8px;margin-top:6px">
          <button class="btn-ai" onclick="(()=>{const v=document.getElementById('aiKeyInput').value.trim();if(!v)return;setAnthropicKey(v);window.__aiKeyResolve(v);closeAIModal();})()">Save & Continue</button>
          <button class="btn-secondary" onclick="window.__aiKeyResolve(null);closeAIModal()">Cancel</button>
        </div>
        <div style="font-size:11px;color:var(--text-muted);margin-top:6px">Get a key at <a href="https://console.anthropic.com/" target="_blank" rel="noopener" style="color:var(--accent)">console.anthropic.com</a></div>
      </div>
    `, { title: 'Connect Anthropic API key' });
    window.__aiKeyResolve = resolve;
  });
}

async function callClaudeForValuation(property){
  const sch = SCHEMA_RESOLVED.properties;
  const name = displayName(property, 'properties');
  const typeRaw = property.fields[sch.byKey.type?.id];
  const type = typeRaw ? (Array.isArray(typeRaw)?(typeRaw[0]?.name||typeRaw[0]):(typeRaw.name||typeRaw)) : 'Unknown';
  const beds = property.fields[sch.byKey.beds?.id] || '?';
  const currentValue = parseFloat(property.fields[sch.byKey.marketValue?.id]) || 0;
  const postcode = property.fields[sch.byKey._postcode?.id] || '';
  const address  = property.fields[sch.byKey._address?.id] || '';

  const prompt = `You are a UK property valuation analyst. Research recent comparable sales and produce an estimated current market value.

PROPERTY UNDER VALUATION
- Name / Address: ${name}${address?` — ${address}`:''}
- Postcode: ${postcode || 'not provided — infer from name'}
- Property Type: ${type}
- Bedrooms: ${beds}
- Currently recorded value: £${currentValue.toLocaleString('en-GB')}

TASK
Search the web (Rightmove, Zoopla, Land Registry, OnTheMarket, etc.) for 3–5 RECENT (within the last 6 months, ideally last 3 months) sale prices of comparable properties. Comparable means:
1. Same property type (${type})
2. Same number of bedrooms (${beds})
3. Within ~1 mile of the subject property
4. Genuinely sold (Sold STC or Sold Subject To Contract is acceptable, but actual completed sales preferred)

For each comparable capture: full address, sale price, sale date, beds, type, distance from subject (in miles, your best estimate), and the source URL.

Then estimate the subject property's CURRENT market value as the median (or weighted average where you can justify it) of the comps. Note any positive or negative adjustments needed (e.g. subject has been refurbished, comp has a bigger garden, etc.).

OUTPUT FORMAT — respond with a brief plain-English explanation, then this exact JSON inside <output>...</output> tags. No other JSON in the response.

<output>
{
  "estimated_value": 195000,
  "confidence": "Medium",
  "comparables": [
    { "address": "...", "sale_price": 198000, "sale_date": "2024-09-15", "beds": ${beds}, "type": "${type}", "url": "https://...", "distance_miles": 0.4 }
  ],
  "methodology": "Brief 2-3 sentence summary of how you arrived at the estimate."
}
</output>

Confidence guide: High = 4+ very-similar recent comps, all consistent. Medium = 3 comps with mild variance. Low = fewer than 3 comps, or wide variance, or stale data.`;

  const r = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'x-api-key': getAnthropicKey(),
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
      'content-type': 'application/json',
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-5',
      max_tokens: 8192,
      tools: [{ type: 'web_search_20250305', name: 'web_search', max_uses: 6 }],
      messages: [{ role: 'user', content: prompt }],
    }),
  });
  if (!r.ok) {
    const err = await r.json().catch(()=>({}));
    throw new Error(`Anthropic ${r.status}: ${err.error?.message || 'request failed'}`);
  }
  const data = await r.json();
  // Concatenate every text block (web search produces interleaved blocks)
  const finalText = (data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n');
  const m = finalText.match(/<output>\s*([\s\S]*?)\s*<\/output>/);
  if (!m) throw new Error('AI response did not contain <output> JSON. Raw: ' + finalText.slice(0, 200));
  let parsed;
  try { parsed = JSON.parse(m[1]); }
  catch(e) { throw new Error('AI response JSON failed to parse: ' + e.message); }
  return { result: parsed, rawText: finalText, usage: data.usage };
}

async function runAIValuation(propertyId){
  const property = INDEX.properties[propertyId];
  if (!property) { toast('Property not found', 'error'); return; }
  const key = await ensureAnthropicKey();
  if (!key) return; // user cancelled

  const propName = displayName(property, 'properties');
  showAIModal(`
    <div class="ai-status">
      <div class="spin"></div>
      <div>
        <div style="font-weight:600;color:var(--text-primary);margin-bottom:2px">Researching ${escapeHtml(propName)}…</div>
        <div>Claude is searching Rightmove, Zoopla and Land Registry for recent comparable sales. Usually takes 30–90 seconds.</div>
      </div>
    </div>`, { title: 'AI Valuation', closable: false });

  try {
    const { result } = await callClaudeForValuation(property);
    showValuationReviewModal(property, result);
  } catch (e) {
    console.error('AI valuation failed', e);
    showAIModal(`
      <div class="ai-error"><strong>Valuation failed.</strong><br>${escapeHtml(e.message)}</div>
      <button class="btn-secondary" onclick="closeAIModal()">Close</button>
      <button class="btn-ai" onclick="closeAIModal();runAIValuation('${propertyId}')" style="margin-left:8px">Try again</button>`, { title: 'AI Valuation' });
  }
}

function showValuationReviewModal(property, result){
  const sch = SCHEMA_RESOLVED.properties;
  const currentValue = parseFloat(property.fields[sch.byKey.marketValue?.id]) || 0;
  const newValue = parseFloat(result.estimated_value) || 0;
  const diff = newValue - currentValue;
  const diffPct = currentValue ? (diff / currentValue * 100) : 0;
  const comps = Array.isArray(result.comparables) ? result.comparables : [];
  const compsRows = comps.map(c => `
    <tr>
      <td>${escapeHtml(c.address || '—')}</td>
      <td class="money">${fmtMoneyShort(c.sale_price)}</td>
      <td>${escapeHtml(c.sale_date || '—')}</td>
      <td>${c.distance_miles != null ? c.distance_miles.toFixed(1) + ' mi' : '—'}</td>
      <td>${c.url ? `<a class="ai-comp-link" href="${escapeHtml(c.url)}" target="_blank" rel="noopener">view ↗</a>` : ''}</td>
    </tr>`).join('');
  const html = `
    <div style="font-size:12px;color:var(--text-secondary);margin-bottom:14px">${escapeHtml(displayName(property,'properties'))}</div>
    <div class="ai-headline">
      <div class="val-tile"><div class="lbl">Current</div><div class="val">${fmtMoneyShort(currentValue)}</div></div>
      <div class="val-tile primary"><div class="lbl">AI Estimate</div><div class="val">${fmtMoneyShort(newValue)}</div><div class="sub">confidence: ${escapeHtml(result.confidence||'—')}</div></div>
      <div class="val-tile"><div class="lbl">Change</div><div class="val" style="color:${diff>=0?'var(--success)':'var(--danger)'}">${diff>=0?'+':''}${fmtMoneyShort(diff)}</div><div class="sub">${diffPct.toFixed(1)}%</div></div>
    </div>
    <h3 style="font-size:12px;text-transform:uppercase;color:var(--text-secondary);margin-bottom:6px;letter-spacing:.5px">Comparables (${comps.length})</h3>
    <table class="breakdown-table">
      <thead><tr><th>Address</th><th style="text-align:right">Sale Price</th><th>Date</th><th>Distance</th><th></th></tr></thead>
      <tbody>${compsRows || '<tr><td colspan="5" style="color:var(--text-muted);text-align:center;padding:14px">No comparables returned</td></tr>'}</tbody>
    </table>
    ${result.methodology ? `<div class="ai-methodology"><strong>Methodology.</strong> ${escapeHtml(result.methodology)}</div>` : ''}
    <div style="display:flex;gap:8px;margin-top:18px;justify-content:flex-end">
      <button class="btn-secondary" onclick="closeAIModal()">Cancel</button>
      <button class="btn-secondary" onclick="rejectValuation('${property.id}')" style="border-color:var(--danger);color:var(--danger)">Reject</button>
      <button class="btn-ai" onclick='approveValuation(${JSON.stringify(JSON.stringify({propertyId:property.id, currentValue, result}))})'>Approve & Update Market Value</button>
    </div>`;
  showAIModal(html, { title: 'Review AI Valuation' });
}

async function approveValuation(payloadJSON){
  // payloadJSON arrives double-encoded: a JSON string of a JSON string. Inner parse, then real parse.
  const payload = JSON.parse(JSON.parse(payloadJSON));
  const { propertyId, currentValue, result } = payload;
  const property = INDEX.properties[propertyId]; if (!property) { toast('Property gone','error'); return; }
  const propName = displayName(property,'properties');
  const sch = SCHEMA_RESOLVED.properties;
  const valSch = SCHEMA_RESOLVED.valuations;
  // Disable buttons + show spinner
  const body = document.getElementById('aiModalBody');
  if (body) body.innerHTML = `<div class="ai-status"><div class="spin"></div><div>Saving valuation and updating Market Value…</div></div>`;
  try {
    const today = new Date().toISOString().slice(0,10);
    const dateLabel = fmtDate(today);
    // 1. Create the valuation record
    const valFields = {
      [valSch.byKey.title.id]:        `${propName} — ${dateLabel}`,
      [valSch.byKey.property.id]:     [propertyId],
      [valSch.byKey.date.id]:         today,
      [valSch.byKey.value.id]:        Math.round(result.estimated_value),
      [valSch.byKey.source.id]:       { name: 'AI Estimate' },
      [valSch.byKey.status.id]:       { name: 'Approved' },
      [valSch.byKey.confidence.id]:   { name: result.confidence || 'Medium' },
      [valSch.byKey.comparables.id]:  JSON.stringify(result.comparables||[], null, 2),
      [valSch.byKey.methodology.id]:  result.methodology || '',
      [valSch.byKey.previousValue.id]:Math.round(currentValue),
      [valSch.byKey.approvedOn.id]:   today,
    };
    await airtableFetch(`${BASE_ID}/${TABLE.valuations}`, {
      method: 'POST',
      body: JSON.stringify({ fields: valFields, returnFieldsByFieldId: true }),
    });
    // 2. Update the property's Market Value
    const marketValueFid = sch.byKey.marketValue.id;
    await airtableFetch(`${BASE_ID}/${TABLE.properties}/${propertyId}`, {
      method: 'PATCH',
      body: JSON.stringify({ fields: { [marketValueFid]: Math.round(result.estimated_value) }, returnFieldsByFieldId: true }),
    });
    // 3. Refresh local data + UI
    await refreshAll();
    closeAIModal();
    // Re-open the property drawer so the new valuation shows
    openDrawer('properties', propertyId);
    toast('Valuation approved · Market Value updated', 'success');
  } catch (e) {
    console.error('approve failed', e);
    if (body) body.innerHTML = `<div class="ai-error"><strong>Couldn't save.</strong><br>${escapeHtml(e.message)}</div><button class="btn-secondary" onclick="closeAIModal()">Close</button>`;
  }
}

function rejectValuation(propertyId){
  // We don't persist rejected AI estimates — keeps the table clean.
  closeAIModal();
  toast('Valuation discarded', 'success');
}

// Open an existing valuation record (Pending → review/approve, Approved/Rejected → read-only)
function openValuationModal(propertyId, valuationId){
  const property = INDEX.properties[propertyId];
  const val      = INDEX.valuations[valuationId];
  if (!property || !val) return;
  const sch = SCHEMA_RESOLVED.valuations;
  const result = {
    estimated_value: parseFloat(val.fields[sch.byKey.value?.id]) || 0,
    confidence:      ((val.fields[sch.byKey.confidence?.id])||{}).name || '',
    methodology:     val.fields[sch.byKey.methodology?.id] || '',
    comparables:     (() => { try { return JSON.parse(val.fields[sch.byKey.comparables?.id] || '[]'); } catch(e){ return []; } })(),
  };
  showValuationReviewModal(property, result);
}

function renderPropertyDetailMetrics(rec){
  const sch = SCHEMA_RESOLVED.properties;
  const numF = (k) => { const id = sch.byKey[k]?.id; if (!id) return null; const v = rec.fields[id]; const n = typeof v==='number'?v:parseFloat(v); return isNaN(n)?null:n; };
  const value = numF('marketValue') || 0;
  const debt  = numF('mortgageBal')  || 0;
  const rent  = derivePropertyGrossRent(rec) || 0;
  const mort  = deriveMortgagePay(rec) || 0;
  const beds  = numF('beds') || 0;
  const purchPrice = numF('_purchPrice');
  const purchDate  = sch.byKey._purchDate?.id ? rec.fields[sch.byKey._purchDate.id] : null;
  const equity = value - debt;
  const annualRent = rent * 12;
  const annualNet  = annualRent - (mort * 12);
  const grossYield = value > 0 ? annualRent / value * 100 : 0;
  const netYield   = value > 0 ? annualNet   / value * 100 : 0;
  const ltv        = value > 0 ? debt / value * 100 : 0;
  const rate       = (mort && debt) ? (mort * 12) / debt * 100 : 0;
  const cashOnCash = equity > 0 ? annualNet / equity * 100 : 0;
  const rentPerBed = beds > 0 ? rent / beds : null;
  // Capital growth
  let yearsHeld = null, growthGBP = null, growthPct = null, cagr = null;
  if (purchPrice && value) {
    growthGBP = value - purchPrice;
    growthPct = (growthGBP / purchPrice) * 100;
    if (purchDate) {
      const ms = Date.now() - new Date(purchDate).getTime();
      yearsHeld = ms / (365.25 * 24 * 3600 * 1000);
      if (yearsHeld > 0.25) cagr = (Math.pow(value/purchPrice, 1/yearsHeld) - 1) * 100;
    }
  }
  const totalROI = (purchPrice && value) ? (((value - purchPrice) + (annualNet * (yearsHeld||1))) / purchPrice) * 100 : null;

  return `
  <div class="drawer-section">
    <h3>Cashflow Performance</h3>
    <div class="kpi-grid" style="margin-bottom:0">
      <div class="kpi"><div class="label">Gross Rent / mo</div><div class="value">${fmtMoneyShort(rent)}</div><div class="sub">${fmtMoneyShort(annualRent)} / yr</div></div>
      <div class="kpi"><div class="label">Mortgage / mo</div><div class="value">${fmtMoneyShort(mort)}</div><div class="sub">${rate?rate.toFixed(2)+'% rate':'no link to cost'}</div></div>
      <div class="kpi"><div class="label">Net Rent / mo</div><div class="value" style="color:${(rent-mort)>=0?'var(--success)':'var(--danger)'}">${fmtMoneyShort(rent-mort)}</div><div class="sub">before opex</div></div>
      ${rentPerBed!=null?`<div class="kpi"><div class="label">Rent / bed</div><div class="value">${fmtMoneyShort(rentPerBed)}</div><div class="sub">${beds} beds</div></div>`:''}
    </div>
  </div>
  <div class="drawer-section">
    <h3>Capital Position</h3>
    <div class="kpi-grid" style="margin-bottom:0">
      <div class="kpi"><div class="label">Equity</div><div class="value" style="color:var(--success)">${fmtMoneyShort(equity)}</div><div class="sub">${value?(equity/value*100).toFixed(0):0}% of value</div></div>
      <div class="kpi"><div class="label">LTV</div><div class="value">${ltv.toFixed(2)}%</div></div>
      ${growthGBP!=null?`<div class="kpi"><div class="label">Capital Growth</div><div class="value" style="color:${growthGBP>=0?'var(--success)':'var(--danger)'}">${fmtMoneyShort(growthGBP)}</div><div class="sub">${growthPct.toFixed(1)}% since ${purchPrice?fmtMoneyShort(purchPrice):'—'}</div></div>`:''}
      ${cagr!=null?`<div class="kpi"><div class="label">CAGR</div><div class="value">${cagr.toFixed(2)}%</div><div class="sub">over ${yearsHeld.toFixed(1)} years</div></div>`:''}
    </div>
  </div>
  <div class="drawer-section">
    <h3>Returns</h3>
    <div class="kpi-grid" style="margin-bottom:0">
      <div class="kpi"><div class="label">Gross Yield</div><div class="value">${grossYield.toFixed(2)}%</div><div class="sub">rent / value</div></div>
      <div class="kpi"><div class="label">Net Yield</div><div class="value">${netYield.toFixed(2)}%</div><div class="sub">after mortgage / value</div></div>
      <div class="kpi"><div class="label">Cash on Cash</div><div class="value" style="color:${cashOnCash>=8?'var(--success)':cashOnCash>=4?'var(--warning)':'var(--danger)'}">${cashOnCash.toFixed(2)}%</div><div class="sub">net rent / equity</div></div>
      ${totalROI!=null?`<div class="kpi"><div class="label">Total ROI</div><div class="value">${totalROI.toFixed(1)}%</div><div class="sub">income + capital growth on cost</div></div>`:''}
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════════════════════
// Schema Inspector — shows what's mapped, what's missing, what's unused
// Opens via the 🔍 Schema button. Use this to diagnose any column showing
// as "—" everywhere — the unmapped fields are flagged in amber here.
// ═══════════════════════════════════════════════════════════════════════
function openSchemaInspector(){
  if (!SCHEMA_RESOLVED) { toast('Schema not loaded yet', 'error'); return; }
  const sections = Object.entries(SCHEMA_RESOLVED).map(([entityKey, sch]) => {
    const curated = Object.entries(sch.byKey).map(([key, def]) => ({
      key,
      label: def.label,
      mapped: !def.missing,
      airtableName: def.name || '',
      atType: def.atType || '',
      readOnly: def.readOnly,
    }));
    const drawerExtras = (sch.drawerExtras||[]).map(def => ({
      key: def.key, label: def.label, mapped: true,
      airtableName: def.name || '', atType: def.atType || '', readOnly: def.readOnly,
    }));
    const allRows = [...curated, ...drawerExtras];
    const unusedFields = sch.allFields
      .filter(f => !sch.usedFieldIds.has(f.id))
      .map(f => ({ name:f.name, type:f.type, id:f.id }))
      .sort((a,b) => a.name.localeCompare(b.name));

    const mappedCount = allRows.filter(r => r.mapped).length;
    const totalCurated = allRows.length;

    const curatedTable = `
      <table class="schema-table">
        <thead><tr><th>Curated key</th><th>Label</th><th>Airtable field</th><th>Type</th><th>Status</th></tr></thead>
        <tbody>
          ${allRows.map(r => `
            <tr class="${r.mapped?'':'unmapped'}">
              <td class="col-name">${escapeHtml(r.key)}</td>
              <td>${escapeHtml(r.label)}</td>
              <td class="col-name">${r.mapped?escapeHtml(r.airtableName):'<span style="color:var(--warning)">— NOT FOUND —</span>'}</td>
              <td class="col-type">${escapeHtml(r.atType)}</td>
              <td>${r.mapped ? (r.readOnly?'<span class="schema-tag">read-only</span>':'<span class="schema-tag ok">editable</span>') : '<span class="schema-tag warn">missing</span>'}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
    const unusedTable = unusedFields.length ? `
      <details style="margin-bottom:24px">
        <summary style="cursor:pointer;font-size:12px;color:var(--text-secondary);margin-bottom:8px">▸ ${unusedFields.length} other fields on this table (not currently shown)</summary>
        <table class="schema-table">
          <thead><tr><th>Airtable field</th><th>Type</th></tr></thead>
          <tbody>
            ${unusedFields.map(f => `<tr class="unused"><td class="col-name">${escapeHtml(f.name)}</td><td class="col-type">${escapeHtml(f.type)}</td></tr>`).join('')}
          </tbody>
        </table>
      </details>
    ` : '';

    return `
      <div class="schema-section">
        <h3>${escapeHtml(sch.tableName)} <span class="pill">${entityKey}</span> <span style="font-size:11px;color:var(--text-muted);font-weight:400;margin-left:auto">${mappedCount} / ${totalCurated} mapped · ${sch.allFields.length} fields total</span></h3>
        ${curatedTable}
        ${unusedTable}
      </div>
    `;
  }).join('');

  const html = `
    <div class="modal-overlay" onclick="if(event.target===this)closeSchemaInspector()">
      <div class="modal-card">
        <div class="modal-header">
          <div>
            <h2>🔍 Schema Inspector</h2>
            <div style="font-size:11px;color:var(--text-secondary);margin-top:2px">Anything in <span class="schema-tag warn">missing</span> means the page can't find that field. Tell me what it's actually called in Airtable and I'll remap.</div>
          </div>
          <button class="modal-close" onclick="closeSchemaInspector()">×</button>
        </div>
        <div class="modal-body">${sections}</div>
      </div>
    </div>
  `;
  let host = document.getElementById('schemaModalHost');
  if (!host) { host = document.createElement('div'); host.id = 'schemaModalHost'; document.body.appendChild(host); }
  host.innerHTML = html;
}
function closeSchemaInspector(){
  const host = document.getElementById('schemaModalHost');
  if (host) host.innerHTML = '';
}

// ═══════════════════════════════════════════════════════════════════════
// Toast
// ═══════════════════════════════════════════════════════════════════════
function toast(msg, kind){
  const el = document.createElement('div');
  el.className = 'toast' + (kind?' '+kind:'');
  el.textContent = msg;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(() => el.remove(), 2400);
}

// Boot
// ═══════════════════════════════════════════════════════════════════════
if (bootAuth()) {
  start();
} else {
  document.getElementById('authBar').style.display = 'flex';
}
