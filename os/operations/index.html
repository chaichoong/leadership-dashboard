<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Operations OS — Tenants, Tenancies, Units, Properties</title>
<link rel="stylesheet" href="../../css/tokens.css?v=1">
<link rel="stylesheet" href="../../css/sync-bar.css?v=2">
<!-- Chart.js — used for the Valuation History trend chart -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{line-height:1.5;min-height:100vh;background:var(--bg-app);color:var(--text-primary)}
a{color:var(--accent);text-decoration:none}a:hover{text-decoration:underline}

/* Auth bar */
.auth-bar{background:var(--bg-surface);border-bottom:1px solid var(--border-default);padding:14px 24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.auth-bar input{background:var(--bg-surface-2);border:1px solid var(--border-default);color:var(--text-primary);padding:6px 12px;border-radius:6px;font-size:13px;width:340px}
.auth-bar button{background:var(--accent);color:#fff;border:none;padding:6px 16px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600}
.auth-bar button:hover{background:var(--accent-hover)}

/* Topbar */
.topbar{background:var(--bg-surface);border-bottom:1px solid var(--border-default);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;position:sticky;top:0;z-index:50;box-shadow:0 1px 0 var(--border-subtle)}
.topbar h1{font-size:20px;font-weight:700;display:flex;align-items:center;gap:8px}
.topbar .subtitle{font-size:12px;color:var(--text-secondary)}
.topbar-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.btn{padding:6px 14px;border-radius:6px;border:1px solid var(--border-default);background:var(--bg-surface);color:var(--text-primary);cursor:pointer;font-size:12px;font-weight:600}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-hover);color:#fff}
.btn-sm{padding:4px 10px;font-size:11px}

/* Sub-tabs */
.view-tabs{display:flex;gap:4px;border-bottom:1px solid var(--border-default);overflow-x:auto;background:var(--bg-app);padding:8px 24px 0}
.view-tab{padding:10px 18px;border:none;background:none;color:var(--text-secondary);cursor:pointer;font-size:13px;font-weight:600;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;display:flex;align-items:center;gap:6px}
.view-tab:hover{color:var(--text-primary)}
.view-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.view-tab .count{background:var(--bg-subtle);color:var(--text-secondary);padding:1px 8px;border-radius:10px;font-size:11px;font-weight:700}
.view-tab.active .count{background:var(--accent-soft);color:var(--accent)}

/* Main */
.main{padding:20px 24px;max-width:1600px;margin:0 auto}
.tab-pane{display:none}
.tab-pane.active{display:block}

/* Controls */
.controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
.search-box{background:var(--bg-surface);border:1px solid var(--border-default);color:var(--text-primary);padding:7px 12px;border-radius:6px;font-size:13px;width:280px}
.search-box:focus{outline:none;border-color:var(--accent)}
.filter-select{background:var(--bg-surface);border:1px solid var(--border-default);color:var(--text-primary);padding:7px 10px;border-radius:6px;font-size:13px;cursor:pointer}
.filter-select:focus{outline:none;border-color:var(--accent)}
.controls .meta{margin-left:auto;font-size:11px;color:var(--text-muted)}

/* KPI grid (Properties portfolio overview) */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:20px}
.kpi{background:var(--bg-surface);border:1px solid var(--border-default);border-radius:10px;padding:14px 16px}
.kpi .label{font-size:11px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.kpi .value{font-size:22px;font-weight:700;margin-top:4px;color:var(--text-primary)}
.kpi .sub{font-size:11px;color:var(--text-muted);margin-top:2px}

/* Data table */
.table-wrap{overflow-x:auto;border:1px solid var(--border-default);border-radius:10px;background:var(--bg-surface)}
.dt{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
/* Headers — flex layout pins the sort arrow at the right edge no matter how
   the label wraps. word-break:normal + overflow-wrap:normal stop mid-word
   breaks; per-column widths give every label enough room for two lines. */
.dt th{background:var(--bg-surface-2);padding:0;text-align:left;font-weight:700;color:var(--text-secondary);font-size:11px;text-transform:uppercase;letter-spacing:.4px;vertical-align:middle;height:48px;position:sticky;top:0;z-index:1;border-bottom:2px solid var(--border-default);border-right:1px solid var(--border-subtle);cursor:pointer;user-select:none}
.dt th:last-child{border-right:none}
.dt th:hover{background:var(--bg-subtle)}
.dt th .th-inner{display:flex;align-items:center;gap:6px;height:100%;padding:6px 10px}
.dt th .th-label{flex:1;min-width:0;white-space:normal;word-break:normal;overflow-wrap:normal;hyphens:none;line-height:1.25}
.dt th .th-sort{flex-shrink:0;font-size:9px;color:var(--text-muted);font-weight:400}
.dt th.sorted .th-sort{color:var(--accent)}
.dt th.money .th-inner{justify-content:space-between}
.dt th.money .th-label{text-align:right}
/* Center small integer columns (Beds, Unit #, Due Day) so single digits don't sit against the column border */
.dt th.num-center .th-label{text-align:center}
.dt td.num-center{text-align:center}
.dt td{padding:7px 10px;border-top:1px solid var(--border-subtle);border-right:1px solid var(--border-subtle);vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dt td:last-child{border-right:none}
/* Cells with stacked content (chips, multi-line) opt out of single-line ellipsis,
   but still clip horizontally — chips inside size themselves to fit the cell. */
.dt td.wrap-cell{white-space:normal;text-overflow:clip}
.dt td:has(.chips-cell),.dt td:has(.badge){white-space:normal;text-overflow:clip}
.dt tbody tr:nth-child(even) td{background:var(--bg-surface-2)}
.dt tbody tr:hover td{background:var(--accent-soft)}
.dt tbody tr.row-flash td{animation:flash 1.6s ease-out}
@keyframes flash{0%{background:var(--accent-soft);box-shadow:inset 0 0 0 2px var(--accent)}100%{background:transparent;box-shadow:none}}

/* Editable cells */
.editable{cursor:text;padding:3px 6px;border-radius:4px;display:inline-block;min-width:60px;min-height:20px}
.editable:hover{background:var(--bg-surface);outline:1px solid var(--border-default)}
.editable[contenteditable=true]:focus{background:var(--bg-surface);outline:2px solid var(--accent);box-shadow:0 0 0 1px var(--accent)}
.inline-input,.inline-select{background:var(--bg-surface);border:1px solid var(--accent);color:var(--text-primary);padding:3px 6px;border-radius:4px;font-size:13px;font-family:inherit}
.inline-select{cursor:pointer}
.cell-saving{opacity:.55}
.cell-error{outline:2px solid var(--danger)!important;background:var(--danger-bg)!important}

/* Linked record chip — must fit within its cell, never overflow into the next column. */
.chip{display:inline-flex;align-items:center;gap:4px;background:var(--accent-soft);color:var(--accent);padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid transparent;max-width:100%;box-sizing:border-box;min-width:0}
.chip:hover{border-color:var(--accent);background:var(--bg-surface)}
.chip-readonly{cursor:default;background:var(--bg-subtle);color:var(--text-secondary)}
.chip-readonly:hover{border-color:transparent;background:var(--bg-subtle)}
.chip-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chips-cell{display:flex;flex-wrap:wrap;gap:4px;max-width:100%;min-width:0}

/* Status badges */
.badge{display:inline-block;padding:3px 9px;border-radius:11px;font-size:11px;font-weight:600;white-space:nowrap}
.badge-active,.badge-occupied,.badge-current,.badge-in-payment{background:var(--success-bg);color:var(--success)}
/* Void / vacant — red so they jump out from the green Occupied rows */
.badge-void,.badge-vacant{background:var(--danger-bg);color:var(--danger)}
/* Former / inactive — grey, historical state, not actionable */
.badge-former,.badge-inactive,.badge-ended{background:var(--bg-subtle);color:var(--text-secondary)}
.badge-overdue,.badge-cfv{background:var(--danger-bg);color:var(--danger)}
.badge-warning{background:var(--warning-bg);color:var(--warning)}
.badge-info{background:var(--info-bg);color:var(--info)}

/* Drawer */
.drawer-overlay{position:fixed;inset:0;background:rgba(28,36,34,0.45);z-index:9998;display:flex;justify-content:flex-end}
.drawer{background:var(--bg-surface);width:640px;max-width:95vw;height:100vh;display:flex;flex-direction:column;box-shadow:var(--shadow-lg)}
.drawer-header{position:sticky;top:0;background:var(--bg-surface);border-bottom:1px solid var(--border-default);padding:16px 24px;z-index:2;display:flex;align-items:flex-start;gap:10px}
.drawer-header .hdr-main{flex:1;min-width:0}
.drawer-header h2{font-size:18px;margin:0;word-break:break-word}
.drawer-header .hdr-sub{font-size:12px;color:var(--text-secondary);margin-top:2px}
.drawer-body{flex:1;overflow-y:auto;padding:20px 24px}
.drawer-close{background:none;border:none;color:var(--text-secondary);cursor:pointer;font-size:22px;line-height:1;padding:0 4px}
.drawer-section{margin-bottom:24px}
.drawer-section h3{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-secondary);margin-bottom:10px;font-weight:700}
.field-row{display:grid;grid-template-columns:160px 1fr;gap:12px;padding:8px 0;border-bottom:1px solid var(--border-subtle);font-size:13px;align-items:center}
.field-row:last-child{border-bottom:none}
.field-label{color:var(--text-secondary);font-weight:500;font-size:12px}
.field-value{color:var(--text-primary);word-break:break-word}
.field-value .editable{display:block;min-height:28px;padding:6px 10px}

/* Toast */
.toast{position:fixed;bottom:20px;right:20px;background:var(--bg-sidebar);color:#fff;padding:12px 20px;border-radius:8px;font-size:13px;font-weight:500;z-index:10000;box-shadow:var(--shadow-lg);max-width:340px;animation:slideUp .3s ease-out}
.toast.error{background:var(--danger)}
.toast.success{background:var(--success)}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}

/* Empty state */
.empty{text-align:center;padding:60px 20px;color:var(--text-muted)}
.empty .icon{font-size:48px;margin-bottom:12px;opacity:.4}
.empty .msg{font-size:14px}

/* Loading */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:12px;color:var(--text-muted)}
.spinner{width:36px;height:36px;border:3px solid var(--border-default);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Checkbox cell */
.cb-cell{text-align:center}
.cb-cell input[type=checkbox]{width:15px;height:15px;cursor:pointer;accent-color:var(--accent)}

/* Money cell */
.money{font-variant-numeric:tabular-nums;text-align:right}
.dt th.money,.dt td.money{text-align:right}

/* Detail link button */
.row-open{background:transparent;border:none;color:var(--text-muted);cursor:pointer;font-size:14px;padding:2px 6px;border-radius:4px}
.row-open:hover{background:var(--bg-surface);color:var(--accent)}

/* Drilldown cell — value is calculated, click opens drawer to see how */
.cell-drilldown{cursor:pointer;border-bottom:1px dotted var(--text-muted);padding-bottom:1px}
.cell-drilldown:hover{color:var(--accent);border-bottom-color:var(--accent)}

/* Breakdown table — used inside drawer for mortgage / rent breakdowns */
.breakdown-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:4px}
.breakdown-table th{text-align:left;padding:6px 8px;background:var(--bg-surface-2);border-bottom:1px solid var(--border-default);font-size:10px;text-transform:uppercase;color:var(--text-secondary);font-weight:700;letter-spacing:.5px}
.breakdown-table td{padding:6px 8px;border-bottom:1px solid var(--border-subtle)}
.breakdown-table td.money{text-align:right;font-variant-numeric:tabular-nums}
.breakdown-table tr.total td{border-top:2px solid var(--border-default);border-bottom:none;font-weight:700;background:var(--bg-surface-2)}

/* Schema inspector modal */
.modal-overlay{position:fixed;inset:0;background:rgba(28,36,34,0.5);z-index:9997;display:flex;align-items:center;justify-content:center;padding:24px}
.modal-card{background:var(--bg-surface);border-radius:12px;max-width:1100px;width:100%;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:var(--shadow-lg)}
.modal-header{padding:18px 24px;border-bottom:1px solid var(--border-default);display:flex;align-items:center;justify-content:space-between}
.modal-header h2{font-size:17px}
.modal-body{flex:1;overflow-y:auto;padding:18px 24px}
.modal-close{background:none;border:none;color:var(--text-secondary);cursor:pointer;font-size:22px;line-height:1;padding:0 4px}
.schema-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:24px}
.schema-table th{text-align:left;padding:6px 8px;background:var(--bg-surface-2);border-bottom:1px solid var(--border-default);font-size:10px;text-transform:uppercase;color:var(--text-secondary);font-weight:700;letter-spacing:.5px}
.schema-table td{padding:5px 8px;border-bottom:1px solid var(--border-subtle);vertical-align:top}
.schema-table tr.unmapped td{background:var(--warning-bg)}
.schema-table tr.unused td{color:var(--text-muted)}
.schema-table .col-name{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:11px}
.schema-table .col-type{color:var(--text-muted);font-size:11px}
.schema-section h3{font-size:13px;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.schema-section h3 .pill{font-size:10px;padding:1px 7px;border-radius:10px;background:var(--accent-soft);color:var(--accent);font-weight:700}
.schema-tag{display:inline-block;font-size:10px;padding:1px 6px;border-radius:4px;background:var(--bg-subtle);color:var(--text-secondary);font-weight:600}
.schema-tag.warn{background:var(--warning-bg);color:var(--warning)}
.schema-tag.ok{background:var(--success-bg);color:var(--success)}

/* Valuation history (in property drawer) */
.valuation-summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-bottom:12px}
.val-tile{background:var(--bg-surface-2);border:1px solid var(--border-default);border-radius:8px;padding:10px 12px}
.val-tile .lbl{font-size:10px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.4px;font-weight:700}
.val-tile .val{font-size:16px;font-weight:700;margin-top:2px;color:var(--text-primary);font-variant-numeric:tabular-nums}
.val-tile .sub{font-size:10px;color:var(--text-muted);margin-top:2px}
.val-chart-wrap{height:180px;background:var(--bg-surface-2);border:1px solid var(--border-default);border-radius:8px;padding:8px;margin-bottom:12px;position:relative}
.val-chart-wrap canvas{display:block}
.val-empty{padding:20px;text-align:center;color:var(--text-muted);font-size:12px;background:var(--bg-surface-2);border:1px dashed var(--border-default);border-radius:8px;margin-bottom:12px}
.val-actions{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.btn-ai{background:linear-gradient(135deg,var(--accent),var(--accent-hover));color:#fff;border:none;padding:7px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:6px}
.btn-ai:hover{filter:brightness(1.06)}
.btn-ai:disabled{opacity:.5;cursor:not-allowed}
.btn-secondary{background:var(--bg-surface);color:var(--text-primary);border:1px solid var(--border-default);padding:7px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent)}

/* AI valuation modal */
.ai-status{display:flex;align-items:center;gap:10px;padding:14px;background:var(--bg-surface-2);border-radius:8px;font-size:13px;color:var(--text-secondary);margin-bottom:14px}
.ai-status .spin{width:18px;height:18px;border:2px solid var(--border-default);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
.ai-error{background:var(--danger-bg);color:var(--danger);padding:12px 14px;border-radius:8px;font-size:12px;margin-bottom:14px;line-height:1.5}
.ai-headline{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px}
.ai-headline .val-tile{background:var(--bg-surface);border-color:var(--accent-soft)}
.ai-headline .val-tile.primary{background:var(--accent-soft);border-color:var(--accent)}
.ai-comp-link{color:var(--accent);font-size:11px;text-decoration:none}
.ai-comp-link:hover{text-decoration:underline}
.ai-methodology{padding:12px;background:var(--bg-surface-2);border-radius:8px;font-size:12px;color:var(--text-secondary);line-height:1.5;margin-top:14px;white-space:pre-wrap}
.ai-key-prompt{display:flex;flex-direction:column;gap:8px}
.ai-key-prompt input{padding:8px 12px;border:1px solid var(--border-default);border-radius:6px;font-size:13px;background:var(--bg-surface)}
.ai-key-prompt input:focus{outline:none;border-color:var(--accent)}
</style>
</head>
<body>

<!-- Auth bar (only if no PAT yet) -->
<div class="auth-bar" id="authBar" style="display:none">
  <span style="font-size:13px;color:var(--text-secondary)">Airtable PAT:</span>
  <input id="patInput" type="password" placeholder="pat_xxxxxxxxxx..." autocomplete="off">
  <button onclick="saveAuth()">Connect</button>
  <span id="authError" style="font-size:12px;color:var(--danger);display:none">Invalid token — please check and try again.</span>
</div>

<!-- Topbar -->
<div class="topbar" id="topbar" style="display:none">
  <div>
    <h1>🏢 Operations OS</h1>
    <div class="subtitle">Tenants · Tenancies · Rental Units · Properties — synced live with Airtable</div>
  </div>
  <div class="topbar-right">
    <span id="syncStatus" style="font-size:11px;color:var(--text-muted)"></span>
    <button class="btn btn-sm" onclick="openSchemaInspector()" title="Show every field across the four tables and what's mapped">🔍 Schema</button>
    <button class="btn btn-sm" onclick="refreshAll()">↻ Refresh</button>
  </div>
</div>

<!-- Sub-tabs -->
<div class="view-tabs" id="viewTabs" style="display:none">
  <button class="view-tab active" data-tab="tenants" onclick="switchSubTab('tenants')">👤 Tenants <span class="count" id="cntTenants">·</span></button>
  <button class="view-tab" data-tab="tenancies" onclick="switchSubTab('tenancies')">📄 Tenancies <span class="count" id="cntTenancies">·</span></button>
  <button class="view-tab" data-tab="units" onclick="switchSubTab('units')">🚪 Rental Units <span class="count" id="cntUnits">·</span></button>
  <button class="view-tab" data-tab="properties" onclick="switchSubTab('properties')">🏠 Properties <span class="count" id="cntProperties">·</span></button>
</div>

<!-- Main -->
<div class="main" id="main" style="display:none">

  <div data-sync-bar="operations" style="margin:12px 0"></div>

  <!-- Tenants -->
  <div class="tab-pane active" id="pane-tenants">
    <div class="controls">
      <input class="search-box" id="searchTenants" placeholder="Search tenants..." oninput="renderTenants()">
      <select class="filter-select" id="filterTenantStatus" onchange="renderTenants()">
        <option value="">All statuses</option>
      </select>
      <span class="meta" id="metaTenants"></span>
    </div>
    <div id="contentTenants"><div class="loading"><div class="spinner"></div><div>Loading tenants...</div></div></div>
  </div>

  <!-- Tenancies -->
  <div class="tab-pane" id="pane-tenancies">
    <div class="controls">
      <input class="search-box" id="searchTenancies" placeholder="Search tenancies..." oninput="renderTenancies()">
      <select class="filter-select" id="filterTenancyPayStatus" onchange="renderTenancies()">
        <option value="">All payment statuses</option>
      </select>
      <select class="filter-select" id="filterTenancyActive" onchange="renderTenancies()">
        <option value="active">Active only</option>
        <option value="">Show all</option>
      </select>
      <span class="meta" id="metaTenancies"></span>
    </div>
    <div id="contentTenancies"><div class="loading"><div class="spinner"></div><div>Loading tenancies...</div></div></div>
  </div>

  <!-- Rental Units -->
  <div class="tab-pane" id="pane-units">
    <div class="controls">
      <input class="search-box" id="searchUnits" placeholder="Search rental units..." oninput="renderUnits()">
      <select class="filter-select" id="filterUnitStatus" onchange="renderUnits()">
        <option value="">All statuses</option>
      </select>
      <select class="filter-select" id="filterUnitProperty" onchange="renderUnits()">
        <option value="">All properties</option>
      </select>
      <span class="meta" id="metaUnits"></span>
    </div>
    <div id="contentUnits"><div class="loading"><div class="spinner"></div><div>Loading rental units...</div></div></div>
  </div>

  <!-- Properties -->
  <div class="tab-pane" id="pane-properties">
    <div id="propertyKpis" class="kpi-grid"></div>
    <div class="controls">
      <input class="search-box" id="searchProperties" placeholder="Search properties..." oninput="renderProperties()">
      <select class="filter-select" id="filterPropertyType" onchange="renderProperties()">
        <option value="">All property types</option>
      </select>
      <select class="filter-select" id="filterPropertyOwnership" onchange="renderProperties()">
        <option value="">All ownerships</option>
      </select>
      <span class="meta" id="metaProperties"></span>
    </div>
    <div id="contentProperties"><div class="loading"><div class="spinner"></div><div>Loading properties...</div></div></div>
  </div>

</div>

<!-- Drawer -->
<div id="drawerOverlay"></div>

<!-- Toast -->
<div id="toastContainer"></div>

<script src="../../js/sync-bar.js?v=4"></script>

// ═══════════════════════════════════════════════════════════════════════
// State
// ═══════════════════════════════════════════════════════════════════════
let PAT = '';
let SCHEMA_RESOLVED = null;
let DATA  = { tenants:[], tenancies:[], units:[], properties:[], costs:[], valuations:[] };
let INDEX = { tenants:{}, tenancies:{}, units:{}, properties:{}, costs:{}, valuations:{} };
let activeTab = 'tenants';
let sortState = { tenants:null, tenancies:null, units:null, properties:null };

// ═══════════════════════════════════════════════════════════════════════
// Derived metrics — compute helpers used by virtual fields on Properties.
// All computes return JS numbers (or null when prerequisites are missing).
// Percent-typed virtuals return DECIMALS (0.05 = 5%) to match Airtable's
// percent convention so fmtPercent renders consistently.
// ═══════════════════════════════════════════════════════════════════════
function fid(entityKey, fieldKey){
  return SCHEMA_RESOLVED?.[entityKey]?.byKey?.[fieldKey]?.id || null;
}
function numField(record, entityKey, fieldKey){
  const id = fid(entityKey, fieldKey);
  if (!id) return null;
  const v = record.fields[id];
  if (v == null || v === '') return null;
  const n = typeof v === 'number' ? v : parseFloat(v);
  return isNaN(n) ? null : n;
}
function deriveMortgagePay(propRec){
  const linkId = fid('properties','_mortCostLink');
  if (!linkId) return null;
  const linked = propRec.fields[linkId];
  if (!Array.isArray(linked) || !linked.length) return null;
  const expFid      = fid('costs','expected');
  const inactiveFid = fid('costs','inactive');
  if (!expFid) return null;
  // Sum every linked cost (skip ones flagged Inactive). When properties have
  // multiple linked mortgage costs (eg. main + product fee, or refinanced
  // loans where the old cost was kept linked), summing gives the right total.
  let total = 0; let found = false;
  for (const id of linked) {
    const cost = INDEX.costs[id]; if (!cost) continue;
    if (inactiveFid && cost.fields[inactiveFid]) continue;
    const v = parseFloat(cost.fields[expFid]);
    if (!isNaN(v)) { total += v; found = true; }
  }
  return found ? total : null;
}

// Sum expected monthly rent across all ACTIVE tenancies whose Rental-Unit
// link includes this unit. Returns null if no active tenancies exist —
// that way an unoccupied unit shows "—" rather than £0.
function deriveUnitRent(unitRec){
  const sch = SCHEMA_RESOLVED?.tenancies; if (!sch) return null;
  const unitFid = sch.byKey.unit?.id;
  const rentFid = sch.byKey.rent?.id;
  if (!unitFid || !rentFid) return null;
  let total = 0; let found = false;
  for (const t of DATA.tenancies) {
    const linked = t.fields[unitFid];
    if (!Array.isArray(linked) || !linked.includes(unitRec.id)) continue;
    if (!isActiveStatus(t,'tenancies')) continue;
    const v = parseFloat(t.fields[rentFid]);
    if (!isNaN(v)) { total += v; found = true; }
  }
  return found ? total : null;
}

// Property-level gross rent = sum of unit-level expected rent across every
// rental unit linked to this property. Going via units keeps us consistent
// with whatever Rental Unit rent shows.
function derivePropertyGrossRent(propRec){
  const unitSch = SCHEMA_RESOLVED?.units; if (!unitSch) return null;
  const propFid = unitSch.byKey.property?.id;
  if (!propFid) return null;
  let total = 0; let found = false;
  for (const u of DATA.units) {
    const v = u.fields[propFid];
    if (!Array.isArray(v) || !v.includes(propRec.id)) continue;
    const r = deriveUnitRent(u);
    if (r != null) { total += r; found = true; }
  }
  return found ? total : null;
}
function deriveEquity(p){
  const v = numField(p,'properties','marketValue'); const m = numField(p,'properties','mortgageBal');
  if (v == null) return null; return v - (m||0);
}
function deriveLTV(p){
  const v = numField(p,'properties','marketValue'); const m = numField(p,'properties','mortgageBal');
  if (!v || !m) return null; return m / v; // decimal
}
function deriveInterestRate(p){
  // User's spec: (monthly mortgage × 12) / mortgage balance → decimal
  const m = deriveMortgagePay(p); const b = numField(p,'properties','mortgageBal');
  if (!m || !b) return null; return (m * 12) / b;
}
function deriveGrossYield(p){
  // grossRent is now virtual — must call the derive helper, not look it up by field id
  const r = derivePropertyGrossRent(p); const v = numField(p,'properties','marketValue');
  if (!r || !v) return null; return (r * 12) / v;
}
function deriveNetRent(p){
  const r = derivePropertyGrossRent(p); const m = deriveMortgagePay(p);
  if (r == null) return null; return r - (m||0);
}
function deriveCashOnCash(p){
  const net = deriveNetRent(p); const eq = deriveEquity(p);
  if (net == null || !eq || eq <= 0) return null; return (net * 12) / eq;
}

// Status-based link filter — used on Rental Units to keep "Current Tenant /
// Tenancy" cells from listing historical Former rows alongside the active one.
function isActiveStatus(rec, entityKey){
  const sch = SCHEMA_RESOLVED && SCHEMA_RESOLVED[entityKey];
  const sid = sch?.byKey?.status?.id;
  if (!sid) return true; // can't filter — show everything
  const v = rec.fields[sid];
  const name = Array.isArray(v) ? (v[0]?.name || v[0]) : (typeof v === 'object' ? v?.name : v);
  return /active/i.test(String(name||''));
}

// Auth — try parent window first, then localStorage, then prompt
// ═══════════════════════════════════════════════════════════════════════
function bootAuth(){
  try { if (window.parent && window.parent !== window && window.parent.PAT) { PAT = window.parent.PAT; return true; } } catch(e){}
  const stored = localStorage.getItem('_dlr_pat');
  if (stored) { PAT = stored; return true; }
  return false;
}
function saveAuth(){
  const v = document.getElementById('patInput').value.trim();
  if (!v) return;
  PAT = v;
  localStorage.setItem('_dlr_pat', v);
  document.getElementById('authError').style.display = 'none';
  start();
}

// ═══════════════════════════════════════════════════════════════════════
// Airtable API helpers
// ═══════════════════════════════════════════════════════════════════════
async function airtableFetch(path, opts={}){
  const url = path.startsWith('http') ? path : `https://api.airtable.com/v0/${path}`;
  const res = await fetch(url, {
    ...opts,
    headers: { 'Authorization': `Bearer ${PAT}`, 'Content-Type': 'application/json', ...(opts.headers||{}) },
  });
  if (res.status === 401 || res.status === 403) {
    PAT = ''; localStorage.removeItem('_dlr_pat');
    document.getElementById('authBar').style.display = 'flex';
    document.getElementById('authError').style.display = 'inline';
    document.getElementById('topbar').style.display = 'none';
    document.getElementById('viewTabs').style.display = 'none';
    document.getElementById('main').style.display = 'none';
    throw new Error('Auth failed');
  }
  if (!res.ok) {
    const text = await res.text();
    throw new Error(`Airtable ${res.status}: ${text}`);
  }
  return res.json();
}

async function fetchAllRecords(tableId, opts={}){
  const out = [];
  let offset = '';
  do {
    const params = new URLSearchParams({ pageSize: '100', returnFieldsByFieldId: 'true', ...(opts.params||{}) });
    if (offset) params.set('offset', offset);
    const data = await airtableFetch(`${BASE_ID}/${tableId}?${params}`);
    out.push(...(data.records||[]));
    offset = data.offset || '';
  } while (offset);
  return out;
}

// Resolve a single curated field def against an Airtable table's field list.
// Returns the matched Airtable field or null.
//
// When `def.type==='link'`, we restrict the search to multipleRecordLinks
// fields only — otherwise a money column literally named "Monthly Mortgage
// Payment" can outrank the actual link field that points at the cost record.
function resolveField(def, allFields, primaryFieldId){
  if (def.primary) {
    return allFields.find(f => f.id === primaryFieldId) || null;
  }
  const norm = s => String(s||'').toLowerCase().trim();
  const wantLink = def.type === 'link';
  const candidates = wantLink ? allFields.filter(f => f.type === 'multipleRecordLinks') : allFields;
  const byName = new Map(candidates.map(f => [norm(f.name), f]));
  for (const want of (def.exact || [])) {
    const f = byName.get(norm(want));
    if (f) return f;
  }
  if (def.keywords && def.keywords.length) {
    const kw = def.keywords.map(norm);
    const f = candidates.find(f => {
      const n = norm(f.name);
      return kw.every(k => n.includes(k));
    });
    if (f) return f;
  }
  return null;
}

async function fetchSchema(){
  const data = await airtableFetch(`meta/bases/${BASE_ID}/tables`);
  const result = {};
  // entity-key → Airtable table-id mapping (entity keys don't always match TABLE keys)
  const tableIdFor = (k) => TABLE[k === 'units' ? 'rentalUnits' : k];
  for (const entityKey of Object.keys(SCHEMA)) {
    const tableId = tableIdFor(entityKey);
    const meta = data.tables.find(t => t.id === tableId);
    if (!meta) { console.warn('table not found in metadata:', entityKey, tableId); continue; }
    const byKey = {}; const byId = {};
    const usedFieldIds = new Set();
    const resolveOne = (def) => {
      // Virtual fields have no Airtable backing — they're computed on render
      if (def.virtual) {
        return { ...def, id:null, name:def.label||def.key, atType:'virtual', options:null, readOnly:true, missing:false };
      }
      const f = resolveField(def, meta.fields, meta.primaryFieldId);
      if (f) {
        return { ...def, id:f.id, name:f.name, atType:f.type, options:f.options || null, readOnly: !def.edit || isReadOnlyAirtable(f.type) };
      }
      return { ...def, id:null, name:null, atType:null, options:null, readOnly:true, missing:true };
    };
    // Curated columns
    for (const def of SCHEMA[entityKey].fields) {
      const r = resolveOne(def);
      byKey[def.key] = r;
      if (r.id) { byId[r.id] = r; usedFieldIds.add(r.id); }
    }
    // Drawer extras — also indexed in byKey so computes can reference them
    const extras = [];
    for (const def of (SCHEMA[entityKey].drawerExtras || [])) {
      const r = resolveOne(def);
      if (!r.missing) {
        extras.push(r);
        byKey[def.key] = r;
        if (r.id) { byId[r.id] = r; usedFieldIds.add(r.id); }
      }
    }
    result[entityKey] = {
      tableId,
      tableName: meta.name,
      primaryFieldId: meta.primaryFieldId,
      hidden: !!SCHEMA[entityKey].hidden,
      byKey,
      byId,
      drawerExtras: extras,
      allFields: meta.fields,
      usedFieldIds,
    };
  }
  // Expose for debugging / Schema Inspector
  window.__OPS_SCHEMA__ = result;
  // Console-friendly summary so the user can paste it back to me if anything's still off
  try {
    console.groupCollapsed('[OPS] Schema resolution');
    for (const k of Object.keys(result)) {
      const r = result[k];
      const mapped = Object.entries(r.byKey).filter(([,v])=>!v.missing).map(([key,v])=>({key, label:v.label, '→ Airtable':v.name, type:v.atType}));
      const missing = Object.entries(r.byKey).filter(([,v])=>v.missing).map(([key,v])=>({key, label:v.label}));
      console.log(`-- ${r.tableName} (${k}) --  ${r.allFields.length} fields total`);
      console.table(mapped);
      if (missing.length) { console.warn('Unmapped curated fields:', missing); }
    }
    console.groupEnd();
  } catch(e){}
  return result;
}

function isReadOnlyAirtable(atType){
  return ['formula','rollup','count','lookup','autoNumber','createdTime','lastModifiedTime','createdBy','lastModifiedBy','externalSyncSource','aiText','button','barcode'].includes(atType);
}

// ═══════════════════════════════════════════════════════════════════════
// Data loading
// ═══════════════════════════════════════════════════════════════════════
async function start(){
  document.getElementById('authBar').style.display = 'none';
  document.getElementById('topbar').style.display = 'flex';
  document.getElementById('viewTabs').style.display = 'flex';
  document.getElementById('main').style.display = 'block';
  setSync('Loading schema...');
  try {
    SCHEMA_RESOLVED = await fetchSchema();
    setSync('Loading records...');
    await refreshAll(true);
    bindHashRouting();
  } catch(e) {
    console.error(e);
    setSync('Error: ' + e.message, true);
  }
}

async function refreshAll(initial=false){
  setSync('Refreshing...');
  try {
    const [tn, tc, un, pr, cs, vl] = await Promise.all([
      fetchAllRecords(TABLE.tenants),
      fetchAllRecords(TABLE.tenancies),
      fetchAllRecords(TABLE.rentalUnits),
      fetchAllRecords(TABLE.properties),
      fetchAllRecords(TABLE.costs),
      fetchAllRecords(TABLE.valuations),
    ]);
    DATA.tenants    = tn;
    DATA.tenancies  = tc;
    DATA.units      = un;
    DATA.properties = pr;
    DATA.costs      = cs;
    DATA.valuations = vl;
    INDEX.tenants    = Object.fromEntries(tn.map(r=>[r.id,r]));
    INDEX.tenancies  = Object.fromEntries(tc.map(r=>[r.id,r]));
    INDEX.units      = Object.fromEntries(un.map(r=>[r.id,r]));
    INDEX.properties = Object.fromEntries(pr.map(r=>[r.id,r]));
    INDEX.costs      = Object.fromEntries(cs.map(r=>[r.id,r]));
    INDEX.valuations = Object.fromEntries(vl.map(r=>[r.id,r]));
    document.getElementById('cntTenants').textContent    = tn.length;
    document.getElementById('cntTenancies').textContent  = tc.length;
    document.getElementById('cntUnits').textContent      = un.length;
    document.getElementById('cntProperties').textContent = pr.length;
    populateFilters();
    renderActiveTab();
    setSync(`Synced — ${new Date().toLocaleTimeString()}`);

    // ── Sync Bar + Health Checks ──
    if (typeof registerSyncBar === 'function') {
      registerSyncBar('operations', {
        refreshFn: () => refreshAll(),
        checks: [
          {
            name: 'Tenants table fetched', kind: 'sync', run: () => {
              const n = (DATA.tenants||[]).length;
              if (n === 0) return { status: 'fail', detail: 'No tenants returned' };
              return { status: 'pass', detail: `${n} tenant records loaded` };
            }
          },
          {
            name: 'Tenancies table fetched', kind: 'sync', run: () => {
              const n = (DATA.tenancies||[]).length;
              if (n === 0) return { status: 'fail', detail: 'No tenancies returned' };
              return { status: 'pass', detail: `${n} tenancy records loaded` };
            }
          },
          {
            name: 'Rental Units table fetched', kind: 'sync', run: () => {
              const n = (DATA.units||[]).length;
              if (n === 0) return { status: 'fail', detail: 'No units returned' };
              return { status: 'pass', detail: `${n} rental units loaded` };
            }
          },
          {
            name: 'Properties table fetched', kind: 'sync', run: () => {
              const n = (DATA.properties||[]).length;
              if (n === 0) return { status: 'fail', detail: 'No properties returned' };
              return { status: 'pass', detail: `${n} property records loaded` };
            }
          },
          {
            name: 'Costs table fetched (used by mortgage derive)', kind: 'sync', run: () => {
              const n = (DATA.costs||[]).length;
              if (n === 0) return { status: 'warn', detail: 'No costs loaded — mortgage rate / yield derives will be blank' };
              return { status: 'pass', detail: `${n} cost records loaded` };
            }
          },
          {
            name: 'Indexes built for fast linked-record lookup', kind: 'automation', run: () => {
              const expected = ['tenants','tenancies','units','properties','costs'];
              const missing = expected.filter(k => !INDEX[k] || Object.keys(INDEX[k]).length === 0);
              if (missing.length) return { status: 'fail', detail: `Missing indexes: ${missing.join(', ')}` };
              return { status: 'pass', detail: 'All five tables indexed by record ID' };
            }
          },
          {
            name: 'Tenancies link to a known tenant', kind: 'sync', run: () => {
              const tcs = DATA.tenancies || [];
              const tenIdx = INDEX.tenants || {};
              const orphans = tcs.filter(r => {
                const f = r.fields || {};
                const tenLink = f['fld1i5bDoHL3B6rUf'];
                if (!Array.isArray(tenLink) || !tenLink.length) return false;
                const id = typeof tenLink[0] === 'object' ? tenLink[0].id : tenLink[0];
                return !tenIdx[id];
              });
              if (orphans.length) return { status: 'warn', detail: `${orphans.length} tenancy record(s) link to a tenant that wasn't fetched` };
              return { status: 'pass', detail: 'All tenancies link to a tenant present in the dataset' };
            }
          },
          {
            name: 'Active count badges match table data', kind: 'automation', run: () => {
              const expected = {
                tenants: (DATA.tenants||[]).length,
                tenancies: (DATA.tenancies||[]).length,
                units: (DATA.units||[]).length,
                properties: (DATA.properties||[]).length,
              };
              for (const [k, n] of Object.entries(expected)) {
                const el = document.getElementById('cnt' + k.charAt(0).toUpperCase() + k.slice(1));
                if (!el || parseInt(el.textContent, 10) !== n) {
                  return { status: 'warn', detail: `Sub-tab badge for ${k} doesn't match data length` };
                }
              }
              return { status: 'pass', detail: 'All four sub-tab badges match the loaded record counts' };
            }
          },
          // ── Cross-table integrity: the deeper kind of check that catches
          // dangling links before they cause display bugs ──
          {
            name: 'Tenancies → Rental Unit links resolve', kind: 'sync', run: () => {
              const tcs = DATA.tenancies || [];
              const unitIdx = INDEX.units || {};
              const orphans = tcs.filter(r => {
                const f = r.fields || {};
                const link = f['fld7cjLLEHKAx49OK']; // tenUnit
                if (!Array.isArray(link) || !link.length) return false;
                const id = typeof link[0] === 'object' ? link[0].id : link[0];
                return !unitIdx[id];
              });
              if (orphans.length) return { status: 'fail', detail: `${orphans.length} tenancy(ies) link to a unit that wasn't fetched — display will show '-' in the Unit column` };
              return { status: 'pass', detail: 'All tenancies link to a unit present in the dataset' };
            }
          },
          {
            name: 'Rental Units → Property links resolve', kind: 'sync', run: () => {
              const units = DATA.units || [];
              const propIdx = INDEX.properties || {};
              const orphans = units.filter(r => {
                const f = r.fields || {};
                const link = f['fldUJNRGgzgyAwwjt']; // unitProperty
                if (!Array.isArray(link) || !link.length) return false;
                const id = typeof link[0] === 'object' ? link[0].id : link[0];
                return !propIdx[id];
              });
              if (orphans.length) return { status: 'fail', detail: `${orphans.length} unit(s) link to a property that wasn't fetched` };
              return { status: 'pass', detail: 'All units link to a property present in the dataset' };
            }
          },
          {
            name: 'No duplicate tenancies for the same unit', kind: 'sync', run: () => {
              // Two ACTIVE tenancies on the same unit means somewhere a tenant move-out
              // wasn't recorded. Catches data-quality drift after onboarding.
              const tcs = DATA.tenancies || [];
              const activeByUnit = {};
              tcs.forEach(r => {
                const f = r.fields || {};
                const status = f['fldxU3dPUnbK0SCDq']; // tenPayStatus
                const statusName = (status && status.name) || status;
                if (statusName !== 'In Payment' && statusName !== 'CFV' && statusName !== 'CFV Actioned') return;
                const link = f['fld7cjLLEHKAx49OK'];
                if (!Array.isArray(link) || !link.length) return;
                const unitId = typeof link[0] === 'object' ? link[0].id : link[0];
                if (!unitId) return;
                activeByUnit[unitId] = (activeByUnit[unitId] || 0) + 1;
              });
              const dupes = Object.entries(activeByUnit).filter(([_, n]) => n > 1);
              if (dupes.length) return { status: 'warn', detail: `${dupes.length} unit(s) have multiple active tenancies — likely a missed move-out` };
              return { status: 'pass', detail: 'Each unit has at most one active tenancy' };
            }
          },
        ],
      });
      markTabSynced('operations');
    }
  } catch(e) {
    console.error(e);
    setSync('Refresh failed: '+e.message, true);
  }
}

function setSync(msg, isErr){
  const el = document.getElementById('syncStatus');
  el.textContent = msg;
  el.style.color = isErr ? 'var(--danger)' : 'var(--text-muted)';
}

// ═══════════════════════════════════════════════════════════════════════
// Filters — populate select dropdowns from data
// ═══════════════════════════════════════════════════════════════════════
function populateFilters(){
  const sel = (id, vals) => {
    const el = document.getElementById(id); if (!el) return;
    const cur = el.value;
    const first = el.querySelector('option').outerHTML;
    el.innerHTML = first + vals.filter(Boolean).map(v=>`<option value="${escapeHtml(v)}">${escapeHtml(v)}</option>`).join('');
    el.value = cur;
  };
  // Status filter values from data
  sel('filterTenantStatus',     uniqVals(DATA.tenants,    SCHEMA_RESOLVED.tenants?.byKey?.status?.id));
  sel('filterTenancyPayStatus', uniqVals(DATA.tenancies,  SCHEMA_RESOLVED.tenancies?.byKey?.payStatus?.id));
  sel('filterUnitStatus',       uniqVals(DATA.units,      SCHEMA_RESOLVED.units?.byKey?.status?.id));
  sel('filterPropertyType',     uniqVals(DATA.properties, SCHEMA_RESOLVED.properties?.byKey?.type?.id));
  sel('filterPropertyOwnership',uniqVals(DATA.properties, SCHEMA_RESOLVED.properties?.byKey?.ownership?.id));
  // Property filter for units
  const propEl = document.getElementById('filterUnitProperty');
  if (propEl) {
    const cur = propEl.value;
    const opts = DATA.properties.map(p => {
      const nm = getCellRaw(p, SCHEMA_RESOLVED.properties?.byKey?.name);
      return `<option value="${p.id}">${escapeHtml(displayName(p, 'properties'))}</option>`;
    }).join('');
    propEl.innerHTML = '<option value="">All properties</option>' + opts;
    propEl.value = cur;
  }
}

function uniqVals(records, fieldId){
  if (!fieldId) return [];
  const set = new Set();
  for (const r of records) {
    const v = r.fields[fieldId];
    if (v == null) continue;
    if (Array.isArray(v)) v.forEach(x => set.add(typeof x === 'object' ? (x.name||x.id) : x));
    else if (typeof v === 'object') set.add(v.name || v.id);
    else set.add(String(v));
  }
  return [...set].sort();
}

// ═══════════════════════════════════════════════════════════════════════
// Sub-tab switching
// ═══════════════════════════════════════════════════════════════════════
function switchSubTab(tab){
  activeTab = tab;
  document.querySelectorAll('.view-tab').forEach(b=>b.classList.toggle('active', b.dataset.tab===tab));
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  document.getElementById('pane-'+tab).classList.add('active');
  if (history.replaceState) history.replaceState(null, '', '#'+tab);
  renderActiveTab();
}

function renderActiveTab(){
  if (activeTab === 'tenants')    renderTenants();
  if (activeTab === 'tenancies')  renderTenancies();
  if (activeTab === 'units')      renderUnits();
  if (activeTab === 'properties') renderProperties();
}

function bindHashRouting(){
  const apply = () => {
    const h = window.location.hash.replace('#','').split('/')[0];
    if (['tenants','tenancies','units','properties'].includes(h) && h !== activeTab) switchSubTab(h);
  };
  window.addEventListener('hashchange', apply);
  apply();
}

// ═══════════════════════════════════════════════════════════════════════
// Cell helpers — read raw value, render display, link cross-nav
// ═══════════════════════════════════════════════════════════════════════
function getCellRaw(record, fieldDef){
  if (!fieldDef) return null;
  if (fieldDef.virtual && typeof fieldDef.compute === 'function') return fieldDef.compute(record);
  if (!fieldDef.id) return null;
  return record.fields[fieldDef.id];
}

function displayName(record, entityKey){
  const sch = SCHEMA_RESOLVED[entityKey];
  if (!sch) return record.id;
  // Always use Airtable's primaryFieldId — survives field renames + name guesses
  let v = sch.primaryFieldId ? record.fields[sch.primaryFieldId] : null;
  if (v == null) {
    // Fallback: first non-empty scalar value across resolved fields
    for (const f of Object.values(sch.byKey)) {
      if (!f.id) continue;
      const x = record.fields[f.id];
      if (x != null && typeof x !== 'object') { v = x; break; }
    }
  }
  if (Array.isArray(v)) v = v.length ? (typeof v[0] === 'object' ? (v[0].name||v[0].id) : v[0]) : '';
  if (typeof v === 'object' && v !== null) v = v.name || v.id;
  return String(v ?? '(no name)');
}

function fmtMoney(n){
  if (n == null || n === '') return '';
  const num = typeof n === 'number' ? n : parseFloat(String(n).replace(/[£,]/g,''));
  if (isNaN(num)) return '';
  return '£' + num.toLocaleString('en-GB', { minimumFractionDigits:2, maximumFractionDigits:2 });
}
function fmtMoneyShort(n){
  // Compact form for KPI tiles where 2dp adds noise
  if (n == null || n === '') return '';
  const num = typeof n === 'number' ? n : parseFloat(String(n).replace(/[£,]/g,''));
  if (isNaN(num)) return '';
  return '£' + num.toLocaleString('en-GB', { maximumFractionDigits:0 });
}
function fmtPercent(n){
  if (n == null || n === '') return '';
  const num = typeof n === 'number' ? n : parseFloat(n);
  if (isNaN(num)) return '';
  // Convention: percent values are stored as decimals (0.05 = 5%), matching
  // both Airtable's percent type and our virtual-field output.
  return (num*100).toFixed(2) + '%';
}
function fmtDate(s){
  if (!s) return '';
  const d = new Date(s);
  if (isNaN(d)) return s;
  return d.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });
}
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function renderCell(record, fieldDef, entityKey){
  const v = getCellRaw(record, fieldDef);
  if (v == null || v === '') {
    if (fieldDef.edit && !fieldDef.readOnly) return `<span class="editable" data-edit="${fieldDef.id}" data-type="${fieldDef.type}" data-rec="${record.id}" data-entity="${entityKey}">—</span>`;
    return '<span style="color:var(--text-muted)">—</span>';
  }

  // Linked records → chips
  if (fieldDef.type === 'link' || (Array.isArray(v) && v.length && typeof v[0] === 'string' && v[0].startsWith('rec'))) {
    let ids = Array.isArray(v) ? v : [v];
    const targetEntity = fieldDef.link;
    // Optional per-record filter (eg. only Active tenancies under "Current Tenancy")
    if (typeof fieldDef.linkFilter === 'function' && targetEntity) {
      ids = ids.filter(id => {
        const rec = INDEX[targetEntity] && INDEX[targetEntity][id];
        if (!rec) return true; // unresolved — keep so user can still see it
        try { return fieldDef.linkFilter(rec, targetEntity); } catch(e){ return true; }
      });
      if (!ids.length) return '<span style="color:var(--text-muted)">—</span>';
    }
    // Sort chips by linked-record display name with natural numeric ordering so
    // eg. property "Units" comes out as 1, 2, 3, 10 rather than the random
    // record-id order Airtable returns. Unresolved IDs sink to the end.
    if (targetEntity && INDEX[targetEntity]) {
      ids = [...ids].sort((a,b) => {
        const ra = INDEX[targetEntity][a]; const rb = INDEX[targetEntity][b];
        if (!ra && !rb) return 0;
        if (!ra) return 1;
        if (!rb) return -1;
        return String(displayName(ra, targetEntity)).localeCompare(String(displayName(rb, targetEntity)), undefined, { numeric:true, sensitivity:'base' });
      });
    }
    const chips = ids.map(id => {
      const rec = INDEX[targetEntity] && INDEX[targetEntity][id];
      const nm = rec ? displayName(rec, targetEntity) : id;
      const cls = targetEntity ? 'chip' : 'chip chip-readonly';
      const onClick = targetEntity ? `onclick="event.stopPropagation();crossNav('${targetEntity}','${id}')"` : '';
      return `<span class="${cls}" ${onClick}><span class="chip-name">${escapeHtml(nm)}</span></span>`;
    }).join('');
    return `<div class="chips-cell">${chips}</div>`;
  }

  // Status badges for select fields
  if (fieldDef.type === 'select') {
    // Rollups of singleSelect fields come back as ARRAYS of choice objects,
    // not a single object. Unwrap before pulling .name/.id — otherwise we
    // render the literal string "undefined".
    let val = v;
    if (Array.isArray(val)) val = val[0];
    const name = (typeof val === 'object' && val !== null) ? (val.name || val.id || '') : (val == null ? '' : String(val));
    if (!name) return '<span style="color:var(--text-muted)">—</span>';
    const cls = badgeClass(name);
    const inner = fieldDef.edit && !fieldDef.readOnly
      ? `<span class="editable" data-edit="${fieldDef.id}" data-type="select" data-rec="${record.id}" data-entity="${entityKey}">${escapeHtml(name)}</span>`
      : escapeHtml(name);
    return `<span class="badge ${cls}">${inner}</span>`;
  }

  // Money / percent / date
  if (fieldDef.type === 'money')    return wrapEditable(fmtMoney(v),      fieldDef, record, entityKey, 'money');
  // moneyBig: capital amounts (property value, mortgage balance, equity).
  // Drops the trailing .00 so "£195,000.00" doesn't truncate to "£195,000.00 ..".
  if (fieldDef.type === 'moneyBig') return wrapEditable(fmtMoneyShort(v), fieldDef, record, entityKey, 'moneyBig');
  if (fieldDef.type === 'percent')  return wrapEditable(fmtPercent(v),    fieldDef, record, entityKey, 'percent');
  if (fieldDef.type === 'date')    return wrapEditable(fmtDate(v),     fieldDef, record, entityKey, 'date', v);
  if (fieldDef.type === 'number')  return wrapEditable(String(v),      fieldDef, record, entityKey, 'number');
  if (fieldDef.type === 'check')   return `<input type="checkbox" ${v?'checked':''} ${fieldDef.edit&&!fieldDef.readOnly?`onchange="saveCheckbox(this,'${record.id}','${fieldDef.id}','${entityKey}')"`:'disabled'}>`;
  if (fieldDef.type === 'long') {
    const trimmed = String(v).length > 80 ? String(v).slice(0,80)+'…' : String(v);
    return wrapEditable(escapeHtml(trimmed), fieldDef, record, entityKey, 'long', v);
  }

  // text / formula / fallback
  let display = '';
  if (Array.isArray(v)) display = v.map(x => typeof x === 'object' ? (x.name||x.id) : x).join(', ');
  else if (typeof v === 'object') display = v.name || v.id || JSON.stringify(v);
  else display = String(v);
  // Pass the human-readable display string as `raw` so the tooltip shows the
  // full value (not the underlying object/array shape) when the cell ellipses.
  return wrapEditable(escapeHtml(display), fieldDef, record, entityKey, 'text', display);
}

function wrapEditable(html, fieldDef, record, entityKey, type, raw){
  // clickToDrawer: not editable but clickable — opens the drawer to show how
  // the value was derived (eg. mortgage cost breakdown, rent per unit).
  if (fieldDef.clickToDrawer) {
    return `<span class="cell-drilldown" onclick="event.stopPropagation();openDrawer('${entityKey}','${record.id}')" title="Click to see breakdown">${html}</span>`;
  }
  // Long text/long fields can truncate via the td's text-overflow:ellipsis.
  // Stash the full value as a native browser tooltip so hover reveals it.
  const fullText = (type === 'text' || type === 'long') && raw != null ? String(raw) : '';
  const titleAttr = fullText ? ` title="${escapeHtml(fullText)}"` : '';
  if (!fieldDef.edit || fieldDef.readOnly) return `<span${titleAttr}>${html}</span>`;
  return `<span class="editable" data-edit="${fieldDef.id}" data-type="${type}" data-rec="${record.id}" data-entity="${entityKey}" data-raw="${escapeHtml(raw==null?'':String(raw))}"${titleAttr}>${html}</span>`;
}

function badgeClass(name){
  const n = String(name).toLowerCase();
  if (/(active|occupied|current|in payment|paid)/.test(n)) return 'badge-active';
  // Order matters — match void/vacant BEFORE former/inactive so a status
  // like "Inactive Void" still gets the red treatment.
  if (/(void|vacant)/.test(n)) return 'badge-void';
  if (/(former|inactive|ended)/.test(n)) return 'badge-former';
  // `actioned` MUST be checked before `cfv` — "CFV Actioned" goes gold
  // (in-progress) not red (open void). Matches the Cash Flow Voids OS.
  if (/actioned/.test(n)) return 'badge-warning';
  if (/(cfv|overdue|arrears)/.test(n)) return 'badge-overdue';
  if (/(warning|due)/.test(n)) return 'badge-warning';
  return 'badge-info';
}

// ═══════════════════════════════════════════════════════════════════════
// Cross-tab navigation
// ═══════════════════════════════════════════════════════════════════════
function crossNav(entity, recordId){
  switchSubTab(entity);
  // Wait for render then scroll + flash the row
  setTimeout(() => {
    const row = document.querySelector(`tr[data-rec="${recordId}"]`);
    if (row) {
      row.scrollIntoView({behavior:'smooth', block:'center'});
      row.classList.add('row-flash');
      setTimeout(()=>row.classList.remove('row-flash'), 1700);
    } else {
      // The row may be filtered out — clear filters and try again
      if (entity === 'tenancies') {
        const f = document.getElementById('filterTenancyActive'); if (f) { f.value=''; renderTenancies(); }
        setTimeout(()=>crossNav(entity, recordId), 60);
      }
    }
  }, 80);
}

// ═══════════════════════════════════════════════════════════════════════
// Render — Tenants
// ═══════════════════════════════════════════════════════════════════════
function renderTenants(){
  const sch = SCHEMA_RESOLVED?.tenants; if (!sch) return;
  const search = document.getElementById('searchTenants').value.toLowerCase().trim();
  const status = document.getElementById('filterTenantStatus').value;
  let rows = DATA.tenants.filter(r => {
    if (search) {
      const blob = JSON.stringify(r.fields).toLowerCase();
      if (!blob.includes(search)) return false;
    }
    if (status) {
      const v = r.fields[sch.byKey.status?.id];
      const name = Array.isArray(v) ? v[0]?.name || v[0] : (typeof v === 'object' ? v?.name : v);
      if (name !== status) return false;
    }
    return true;
  });
  rows = applySort(rows, 'tenants', sch);
  document.getElementById('metaTenants').textContent = `${rows.length} of ${DATA.tenants.length}`;
  document.getElementById('contentTenants').innerHTML = renderTable('tenants', sch, rows);
}

// ═══════════════════════════════════════════════════════════════════════
// Render — Tenancies
// ═══════════════════════════════════════════════════════════════════════
function renderTenancies(){
  const sch = SCHEMA_RESOLVED?.tenancies; if (!sch) return;
  const search = document.getElementById('searchTenancies').value.toLowerCase().trim();
  const payStatus = document.getElementById('filterTenancyPayStatus').value;
  const activeOnly = document.getElementById('filterTenancyActive').value === 'active';
  let rows = DATA.tenancies.filter(r => {
    if (search && !JSON.stringify(r.fields).toLowerCase().includes(search)) return false;
    if (payStatus) {
      const v = r.fields[sch.byKey.payStatus?.id];
      const name = Array.isArray(v) ? v[0]?.name || v[0] : (typeof v === 'object' ? v?.name : v);
      if (name !== payStatus) return false;
    }
    if (activeOnly) {
      const sv = r.fields[sch.byKey.status?.id];
      const sn = Array.isArray(sv) ? (sv[0]?.name || sv[0]) : (typeof sv === 'object' ? sv?.name : sv);
      if (sn && /former|ended|inactive/i.test(String(sn))) return false;
    }
    return true;
  });
  rows = applySort(rows, 'tenancies', sch);
  document.getElementById('metaTenancies').textContent = `${rows.length} of ${DATA.tenancies.length}`;
  document.getElementById('contentTenancies').innerHTML = renderTable('tenancies', sch, rows);
}

function renderUnits(){

  const status = document.getElementById('filterUnitStatus').value;
  const propId = document.getElementById('filterUnitProperty').value;
  let rows = DATA.units.filter(r => {

      const v = r.fields[sch.byKey.status?.id];
      const name = Array.isArray(v) ? v[0]?.name || v[0] : (typeof v === 'object' ? v?.name : v);
      if (name !== status) return false;
    }
    if (propId) {
      const v = r.fields[sch.byKey.property?.id];
      if (!Array.isArray(v) || !v.includes(propId)) return false;

  });
  rows = applySort(rows, 'units', sch);
  document.getElementById('metaUnits').textContent = `${rows.length} of ${DATA.units.length}`;
