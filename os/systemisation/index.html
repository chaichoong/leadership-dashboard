const PIPELINE_STEPS = [
    'Importing steps from Loom',
    'Generating SOP',
    'Uploading to Google Drive',
    'Creating AI skill',
];

function showPipelineProgress(wfName, stepIndex) {
    let el = document.getElementById('pipelineProgress');
    if (!el) {
        el = document.createElement('div');
        el.id = 'pipelineProgress';
        el.style.cssText = 'position:fixed;bottom:24px;right:24px;background:var(--bg-surface,#fff);border:1px solid var(--border-default,#DDE1D9);border-radius:var(--radius-lg,12px);padding:16px 20px;box-shadow:var(--shadow-lg,0 8px 32px rgba(0,0,0,0.15));z-index:9999;min-width:280px;max-width:360px;font-family:inherit';
        document.body.appendChild(el);
    }
    const total = PIPELINE_STEPS.length;
    const pct = Math.round(((stepIndex + 1) / total) * 100);
    const stepsHtml = PIPELINE_STEPS.map((s, i) => {
        let icon = '&#9675;'; // empty circle
        let col = 'var(--text-muted,#8A928C)';
        let fw = 'normal';
        if (i < stepIndex) { icon = '&#10003;'; col = 'var(--success,#2C6E49)'; }
        else if (i === stepIndex) { icon = '&#9654;'; col = 'var(--accent,#2C6E49)'; fw = '600'; }
        return `<div style="display:flex;align-items:center;gap:8px;padding:3px 0;color:${col};font-weight:${fw};font-size:13px"><span>${icon}</span>${esc(s)}</div>`;
    }).join('');
    el.innerHTML = `
        <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-secondary,#5A6660);font-weight:600;margin-bottom:6px">Pipeline: ${esc(wfName)}</div>
        <div style="background:var(--bg-subtle,#E5E8E1);border-radius:4px;height:6px;margin-bottom:10px;overflow:hidden">
            <div style="background:var(--accent,#2C6E49);height:100%;width:${pct}%;transition:width 0.4s ease;border-radius:4px"></div>
        </div>
        ${stepsHtml}
        <div style="font-size:11px;color:var(--text-muted,#8A928C);margin-top:6px">Step ${stepIndex + 1} of ${total}</div>
    `;
}

function hidePipelineProgress() {
    const el = document.getElementById('pipelineProgress');
    if (el) {
        el.style.transition = 'opacity 0.3s ease';
        el.style.opacity = '0';
        setTimeout(() => el.remove(), 350);
    }
}

let _lastSyncAt = null;
function updateSyncStatus(state, msg){
    const el = document.getElementById('syncStatus');
    if(!el) return;
    if(state==='ok'){
        _lastSyncAt = new Date();
        const t = _lastSyncAt.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
        el.innerHTML = `<span class="sync-dot ok"></span>Synced ${t}`;
        el.title = 'Last synced ' + _lastSyncAt.toLocaleString('en-GB');
    } else if(state==='syncing'){
        el.innerHTML = `<span class="sync-dot syncing"></span>Syncing…`;
        el.title = 'Refreshing from Airtable';
    } else {
        el.innerHTML = `<span class="sync-dot error"></span>Sync failed`;
        el.title = msg || 'Sync failed';
    }
}
// Manual refresh: reload data from Airtable and re-render the current view.
async function refreshData(){
    const btn = document.getElementById('refreshBtn');
    if(btn){ btn.disabled = true; btn.classList.add('spinning'); }
    updateSyncStatus('syncing');
    try {
        await loadData();
        render();
        updateSyncStatus('ok');
    } catch(e){
        if(e.message==='auth') return;
        updateSyncStatus('error', e.message);
        toast('Refresh failed: ' + e.message);
    } finally {
        if(btn){ btn.disabled = false; btn.classList.remove('spinning'); }
    }
}
window.refreshData = refreshData;

async function start(){
    document.getElementById('loader').style.display='block';
    document.getElementById('authBar').style.display='none';
    try {
        await loadData();
        document.getElementById('topbar').style.display='flex';
        document.getElementById('viewTabs').style.display='flex';
        document.getElementById('main').style.display='block';
        document.getElementById('loader').style.display='none';
        populateBizFilter();
        render();
        updateSyncStatus('ok');
    } catch(e){
        if(e.message==='auth') return;
        document.getElementById('loader').textContent='Error loading data: '+e.message;
        updateSyncStatus('error', e.message);
    }
}

if(bootAuth()) start();
else {
    document.getElementById('authBar').style.display='flex';
    document.getElementById('loader').style.display='none';
}
</script>
</body>
</html>
