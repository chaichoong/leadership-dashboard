<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Systemisation — Business Process Framework</title>
<link rel="stylesheet" href="../../css/tokens.css?v=1">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{line-height:1.5;min-height:100vh;background:var(--bg-app);color:var(--text-primary)}
a{color:var(--accent);text-decoration:none}a:hover{text-decoration:underline}

.auth-bar{background:var(--bg-surface);border-bottom:1px solid var(--border-default);padding:14px 24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.auth-bar input{background:var(--bg-surface-2);border:1px solid var(--border-default);color:var(--text-primary);padding:6px 12px;border-radius:6px;font-size:var(--fs-base);width:340px}
.auth-bar button{background:var(--accent);color:#fff;border:none;padding:6px 16px;border-radius:6px;cursor:pointer;font-size:var(--fs-base);font-weight:var(--fw-semibold)}
.auth-bar button:hover{background:var(--accent-hover)}

.topbar{background:var(--bg-surface);border-bottom:1px solid var(--border-default);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;position:sticky;top:0;z-index:50;box-shadow:0 1px 0 var(--border-subtle)}
.topbar h1{font-size:20px;font-weight:var(--fw-bold);display:flex;align-items:center;gap:8px}
.topbar .subtitle{font-size:var(--fs-sm);color:var(--text-secondary)}
.topbar-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}

.btn{padding:6px 14px;border-radius:6px;border:1px solid var(--border-default);background:var(--bg-surface);color:var(--text-primary);cursor:pointer;font-size:var(--fs-sm);font-weight:var(--fw-semibold);display:inline-flex;align-items:center;gap:6px}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-hover);color:#fff}
.btn-sm{padding:4px 10px;font-size:var(--fs-xs)}
.btn-danger{border-color:var(--danger);color:var(--danger)}
.btn-danger:hover{background:var(--danger);color:#fff}
.btn-ai{border-color:var(--info);color:var(--info);background:var(--info-bg);font-weight:var(--fw-semibold)}
.btn-ai:hover{background:var(--info);color:#fff}
.btn-ai-inline{flex-shrink:0;margin-top:1px;font-size:13px;padding:2px 4px;border-radius:var(--radius-sm);border:none;background:none;color:var(--text-muted);cursor:pointer;opacity:.5;transition:opacity .15s,color .15s}
.btn-ai-inline:hover{opacity:1;color:var(--accent);background:none;border:none;box-shadow:none}
.btn-ai-inline:disabled{opacity:.3}
.btn:disabled{opacity:.5;cursor:not-allowed;pointer-events:none}

.pipeline-tabs{display:flex;gap:0;overflow-x:auto;background:var(--bg-surface);border-bottom:1px solid var(--border-default);padding:0 24px}
.pipeline-tab{position:relative;padding:12px 20px 12px 32px;border:none;background:var(--bg-surface);color:var(--text-secondary);cursor:pointer;font-size:var(--fs-sm);font-weight:var(--fw-semibold);white-space:nowrap;display:flex;align-items:center;gap:6px;clip-path:polygon(0 0,calc(100% - 14px) 0,100% 50%,calc(100% - 14px) 100%,0 100%,14px 50%)}
.pipeline-tab:first-child{padding-left:20px;clip-path:polygon(0 0,calc(100% - 14px) 0,100% 50%,calc(100% - 14px) 100%,0 100%)}
.pipeline-tab:hover{background:var(--bg-surface-2)}
.pipeline-tab.active{background:var(--accent);color:#fff}
.pipeline-tab .step-num-badge{width:20px;height:20px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:var(--fs-xs);font-weight:var(--fw-bold);background:var(--bg-subtle);color:var(--text-secondary);flex-shrink:0}
.pipeline-tab.active .step-num-badge{background:rgba(255,255,255,.25);color:#fff}
.pipeline-tab .count{background:var(--bg-subtle);color:var(--text-secondary);padding:1px 8px;border-radius:10px;font-size:var(--fs-xs);font-weight:var(--fw-bold)}
.pipeline-tab.active .count{background:rgba(255,255,255,.25);color:#fff}

.steps-layout{display:flex;gap:0;min-height:500px;border:1px solid var(--border-default);border-radius:var(--radius-md);overflow:hidden}
.steps-sidebar{width:260px;flex-shrink:0;background:var(--bg-surface);border-right:1px solid var(--border-default);overflow-y:auto}
.steps-sidebar-title{padding:12px 16px;font-size:var(--fs-sm);font-weight:var(--fw-bold);color:var(--text-secondary);border-bottom:1px solid var(--border-subtle);text-transform:uppercase;letter-spacing:.5px}
.steps-wf-item{padding:10px 16px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:8px;border-bottom:1px solid var(--border-subtle);transition:background .15s}
.steps-wf-item:hover{background:var(--bg-surface-2)}
.steps-wf-item.active{background:var(--accent-soft);border-left:3px solid var(--accent)}
.steps-wf-name{font-size:var(--fs-sm);color:var(--text-primary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.steps-wf-count{font-size:var(--fs-xs);color:var(--text-muted);background:var(--bg-subtle);padding:1px 7px;border-radius:10px;flex-shrink:0}
.steps-main{flex:1;padding:20px;overflow-y:auto}
.steps-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:12px}

.auto-wf-group{margin-bottom:24px}
.auto-wf-header{font-size:var(--fs-base);font-weight:var(--fw-semibold);padding:8px 0;margin-bottom:8px;border-bottom:1px solid var(--border-subtle)}
.wf-grid-group-header td{background:var(--bg-subtle);font-weight:var(--fw-bold);font-size:var(--fs-sm);color:var(--text-secondary);padding:8px 12px;letter-spacing:.3px;border-bottom:1px solid var(--border-default)}

.main{padding:20px 24px;max-width:1400px;margin:0 auto}
.tab-pane{display:none}
.tab-pane.active{display:block}

.controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
.filter-select{background:var(--bg-surface);border:1px solid var(--border-default);color:var(--text-primary);padding:7px 10px;border-radius:6px;font-size:var(--fs-base);cursor:pointer}

.progress-bar{height:6px;background:var(--bg-subtle);border-radius:3px;overflow:hidden;flex:1;min-width:80px}
.progress-bar-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .3s}

.stage-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;margin-bottom:24px}
.stage-card{background:var(--bg-surface);border:1px solid var(--border-default);border-radius:var(--radius-lg);padding:20px;cursor:pointer;transition:border-color .15s,box-shadow .15s}
.stage-card:hover{border-color:var(--accent);box-shadow:var(--shadow-sm)}
.stage-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.stage-card-letter{width:36px;height:36px;border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;font-weight:var(--fw-bold);font-size:var(--fs-lg);color:#fff}
.stage-card-title{font-weight:var(--fw-semibold);font-size:var(--fs-base);flex:1;margin-left:12px}
.stage-card-count{font-size:var(--fs-xs);color:var(--text-muted);white-space:nowrap}
.stage-card-progress{margin-top:12px;display:flex;align-items:center;gap:8px}
.stage-card-progress-label{font-size:var(--fs-xs);color:var(--text-secondary);white-space:nowrap}

.breadcrumb{display:flex;align-items:center;gap:6px;margin-bottom:16px;font-size:var(--fs-sm);color:var(--text-secondary)}
.breadcrumb a{color:var(--accent);cursor:pointer}
.breadcrumb span{color:var(--text-muted)}

.wf-list{display:flex;flex-direction:column;gap:12px}
.wf-card{background:var(--bg-surface);border:1px solid var(--border-default);border-radius:var(--radius-md);overflow:hidden}
.wf-card-header{padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer}
.wf-card-header:hover{background:var(--bg-surface-2)}
.wf-chevron{font-size:10px;color:var(--text-muted);transition:transform .15s;flex-shrink:0}
.wf-card.expanded .wf-chevron{transform:rotate(90deg)}
.wf-card-title{font-weight:var(--fw-semibold);flex:1}
.wf-card-meta{display:flex;gap:8px;align-items:center}
.wf-status{font-size:var(--fs-xs);padding:2px 8px;border-radius:10px;font-weight:var(--fw-semibold)}
.wf-status-not-started{background:var(--bg-subtle);color:var(--text-muted)}
.wf-status-in-progress{background:var(--warning-bg);color:var(--warning)}
.wf-status-complete{background:var(--success-bg);color:var(--success)}
.wf-step-count{font-size:var(--fs-xs);color:var(--text-muted)}
.wf-card-body{display:none;border-top:1px solid var(--border-subtle);padding:16px}
.wf-card.expanded .wf-card-body{display:block}
.wf-desc{font-size:var(--fs-sm);color:var(--text-secondary);margin-bottom:12px}
.wf-actions{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}

.step-table{width:100%;border-collapse:collapse;font-size:var(--fs-sm)}
.step-table th{text-align:left;padding:8px 10px;font-size:var(--fs-xs);text-transform:uppercase;letter-spacing:.4px;color:var(--text-secondary);background:var(--bg-surface-2);border-bottom:1px solid var(--border-default);font-weight:var(--fw-bold)}
.step-table td{padding:8px 10px;border-bottom:1px solid var(--border-subtle);vertical-align:top}
.step-table tr:hover{background:var(--bg-surface-2)}
.step-table .step-num{width:36px;text-align:center;color:var(--text-muted);font-weight:var(--fw-bold)}
.step-table .step-name{font-weight:var(--fw-semibold)}
.step-table .step-desc{color:var(--text-secondary);font-size:var(--fs-xs);margin-top:2px}
.step-type-badge{font-size:var(--fs-xs);padding:1px 6px;border-radius:8px;font-weight:var(--fw-semibold)}
.step-type-ai{background:var(--info-bg);color:var(--info)}
.step-type-staff{background:var(--success-bg);color:var(--success)}
.step-type-both{background:var(--info-bg);color:var(--info)}
.sop-badge{font-size:var(--fs-xs);padding:1px 6px;border-radius:8px;font-weight:var(--fw-semibold)}
.sop-not-created{background:var(--bg-subtle);color:var(--text-muted)}
.sop-draft{background:var(--warning-bg);color:var(--warning)}
.sop-complete{background:var(--success-bg);color:var(--success)}
.step-actions{display:flex;gap:4px}
.pipeline-badge{font-size:var(--fs-xs);padding:1px 6px;border-radius:8px;font-weight:var(--fw-semibold);white-space:nowrap}
.pipeline-none{background:var(--bg-subtle);color:var(--text-muted)}
.pipeline-sop{background:var(--warning-bg);color:var(--warning)}
.pipeline-skill{background:var(--info-bg);color:var(--info)}
.pipeline-task{background:var(--accent-soft);color:var(--accent)}
.stage-hint{text-align:center;padding:8px 20px;color:var(--text-muted);font-size:var(--fs-sm)}
.demo-banner{background:var(--info-bg);border:1px solid var(--info);border-radius:var(--radius-md);padding:10px 16px;margin-bottom:16px;font-size:var(--fs-sm);color:var(--info);display:flex;align-items:center;gap:8px}
.demo-banner strong{font-weight:var(--fw-bold)}

.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:200}
.modal{background:var(--bg-surface);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);width:90%;max-width:560px;max-height:90vh;overflow-y:auto;padding:24px}
.modal-title{font-size:var(--fs-lg);font-weight:var(--fw-bold);margin-bottom:16px}
.field-row{display:flex;flex-direction:column;gap:4px;margin-bottom:14px}
.field-row label{font-size:var(--fs-xs);font-weight:var(--fw-semibold);text-transform:uppercase;letter-spacing:.4px;color:var(--text-secondary)}
.field-row input,.field-row select,.field-row textarea{background:var(--bg-surface-2);border:1px solid var(--border-default);color:var(--text-primary);padding:8px 12px;border-radius:6px;font-size:var(--fs-base);font-family:inherit}
.field-row textarea{min-height:80px;resize:vertical}
.field-row input:focus,.field-row select:focus,.field-row textarea:focus{outline:none;border-color:var(--accent)}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:20px}

.sop-viewer{background:var(--bg-surface-2);border:1px solid var(--border-default);border-radius:var(--radius-md);padding:16px;margin-top:12px;font-size:var(--fs-sm);line-height:1.7;white-space:pre-wrap;max-height:400px;overflow-y:auto}

.sop-document{background:var(--bg-surface);border:1px solid var(--border-default);border-radius:var(--radius-lg);margin-top:16px;overflow:hidden}
.sop-doc-header{background:var(--accent);color:#fff;padding:20px 24px}
.sop-doc-header h2{margin:0 0 4px 0;font-size:var(--fs-xl);font-weight:var(--fw-bold)}
.sop-doc-header p{margin:0;opacity:.85;font-size:var(--fs-sm)}
.sop-doc-body{padding:24px}
.sop-doc-video{margin-bottom:24px;border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--border-default)}
.sop-doc-video iframe{width:100%;aspect-ratio:16/9;border:none;display:block}
.sop-doc-steps{counter-reset:sop-step}
.sop-doc-step{padding:16px 0;border-bottom:1px solid var(--border-subtle)}
.sop-doc-step:last-child{border-bottom:none}
.sop-doc-step-header{display:flex;align-items:flex-start;gap:12px}
.sop-doc-step-num{counter-increment:sop-step;width:32px;height:32px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:var(--fw-bold);font-size:var(--fs-sm);flex-shrink:0}
.sop-doc-step-num::after{content:counter(sop-step)}
.sop-doc-step-content{flex:1}
.sop-doc-step-name{font-weight:var(--fw-semibold);font-size:var(--fs-base);margin-bottom:4px}
.sop-doc-step-desc{font-size:var(--fs-sm);color:var(--text-secondary);line-height:1.6}
.sop-doc-ai-detail{margin-top:8px;padding:12px;background:var(--bg-surface-2);border-radius:var(--radius-md);font-size:var(--fs-sm);line-height:1.6;color:var(--text-primary)}
.sop-doc-cautions{margin-top:24px;padding:16px;background:var(--warning-bg);border-radius:var(--radius-md);border-left:4px solid var(--warning)}
.sop-doc-cautions h3{font-size:var(--fs-sm);font-weight:var(--fw-bold);margin:0 0 8px 0;color:var(--warning)}
.sop-doc-cautions ul{margin:0;padding:0 0 0 20px;font-size:var(--fs-sm);line-height:1.8;color:var(--text-primary)}
.sop-doc-tips{margin-top:16px;padding:16px;background:var(--info-bg);border-radius:var(--radius-md);border-left:4px solid var(--info)}
.sop-doc-tips h3{font-size:var(--fs-sm);font-weight:var(--fw-bold);margin:0 0 8px 0;color:var(--info)}
.sop-doc-tips ul{margin:0;padding:0 0 0 20px;font-size:var(--fs-sm);line-height:1.8;color:var(--text-primary)}
.sop-doc-footer{padding:16px 24px;border-top:1px solid var(--border-default);font-size:var(--fs-xs);color:var(--text-muted);display:flex;justify-content:space-between}
@media print{.sop-doc-header{-webkit-print-color-adjust:exact;print-color-adjust:exact}.sop-document{border:none;box-shadow:none}}
.sop-spinner{width:32px;height:32px;border:3px solid var(--border-default);border-top-color:var(--accent);border-radius:50%;animation:sop-spin .8s linear infinite;margin:0 auto}
@keyframes sop-spin{to{transform:rotate(360deg)}}
.sop-doc-ai-detail ul{margin:0;padding:0 0 0 18px;list-style:disc}.sop-doc-ai-detail li{margin-bottom:4px}
.sop-fb{margin-top:8px}
.sop-fb-toggle{background:none;border:none;color:var(--accent);font-size:var(--fs-xs);cursor:pointer;padding:2px 0;font-weight:var(--fw-medium)}
.sop-fb-toggle:hover{text-decoration:underline}
.sop-fb-box{margin-top:8px}
.sop-fb-text{width:100%;box-sizing:border-box;border:1px solid var(--border-default);background:var(--bg-surface);border-radius:var(--radius-md);padding:8px 10px;font-size:var(--fs-sm);color:var(--text-primary);font-family:var(--font-family-base);resize:vertical}
.sop-fb-actions{display:flex;gap:8px;margin-top:6px}

.empty-state{text-align:center;padding:40px 20px;color:var(--text-muted)}
.empty-state p{margin-bottom:12px}

.loading{text-align:center;padding:60px 20px;color:var(--text-muted);font-size:var(--fs-sm)}

.dept-group{margin-bottom:24px}
.dept-group-header{font-size:var(--fs-base);font-weight:var(--fw-bold);color:var(--text-primary);margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--border-default);display:flex;align-items:center;gap:8px}
.dept-group-count{font-size:var(--fs-xs);color:var(--text-muted);font-weight:var(--fw-semibold)}

.acronym-strip{display:flex;align-items:center;gap:6px;margin-bottom:16px;padding:10px 16px;background:var(--bg-surface);border:1px solid var(--border-default);border-radius:var(--radius-md)}
.acronym-strip-label{font-size:var(--fs-xs);font-weight:var(--fw-bold);text-transform:uppercase;letter-spacing:.5px;color:var(--text-secondary);margin-right:8px}
.acronym-letter{width:32px;height:32px;border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;font-weight:var(--fw-bold);font-size:var(--fs-base);color:#fff}
.acronym-dot{width:4px;height:4px;border-radius:50%;background:var(--border-default)}

.stage-card-desc{font-size:var(--fs-xs);color:var(--text-secondary);margin-top:4px;line-height:1.4}

.drawer-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.35);z-index:150;opacity:0;transition:opacity .2s;pointer-events:none}
.drawer-overlay.open{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:0;width:min(560px,90vw);height:100vh;background:var(--bg-surface);box-shadow:var(--shadow-lg);z-index:160;transform:translateX(100%);transition:transform .25s ease;overflow-y:auto;display:flex;flex-direction:column}
.drawer.open{transform:translateX(0)}
.drawer-header{display:flex;align-items:center;gap:12px;padding:16px 20px;border-bottom:1px solid var(--border-default);position:sticky;top:0;background:var(--bg-surface);z-index:1}
.drawer-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--text-muted);padding:4px 8px;border-radius:var(--radius-sm)}
.drawer-close:hover{background:var(--bg-surface-2);color:var(--text-primary)}
.drawer-title{font-size:var(--fs-lg);font-weight:var(--fw-bold);flex:1}
.drawer-body{padding:20px;flex:1}

.wf-grid{width:100%;border-collapse:collapse;font-size:var(--fs-sm);margin-bottom:16px}
.wf-grid th{text-align:left;padding:8px 10px;font-size:var(--fs-xs);text-transform:uppercase;letter-spacing:.4px;color:var(--text-secondary);background:var(--bg-surface-2);border-bottom:1px solid var(--border-default);font-weight:var(--fw-bold)}
.wf-grid td{padding:4px 6px;border-bottom:1px solid var(--border-subtle);vertical-align:top}
.wf-grid tr:hover{background:var(--bg-surface-2)}
.wf-grid tr.wf-grid-new td{border-bottom:none}
.wf-grid-input{width:100%;border:1px solid transparent;background:transparent;padding:6px 8px;border-radius:4px;font-size:var(--fs-sm);font-family:inherit;color:var(--text-primary);resize:none;overflow:hidden}
.wf-grid-input:focus{outline:none;border-color:var(--accent);background:var(--bg-surface)}
.wf-grid-input:hover:not(:focus){border-color:var(--border-default)}
.wf-grid-input::placeholder{color:var(--text-muted)}
.wf-grid-actions{display:flex;gap:4px;align-items:center;white-space:nowrap}
.wf-grid-status{font-size:var(--fs-xs);padding:2px 8px;border-radius:10px;font-weight:var(--fw-semibold);border:none;cursor:pointer;background:var(--bg-subtle);color:var(--text-muted)}
.wf-grid-expand{background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:12px;padding:4px;border-radius:4px}
.wf-grid-expand:hover{background:var(--bg-surface-2);color:var(--text-primary)}
.wf-grid-saving{opacity:.5;pointer-events:none}

.move-menu{position:absolute;right:0;top:100%;background:var(--bg-surface);border:1px solid var(--border-default);border-radius:var(--radius-md);box-shadow:var(--shadow-md);z-index:200;min-width:200px;max-height:260px;overflow-y:auto;padding:4px 0}
.move-menu-item{display:block;width:100%;text-align:left;padding:8px 14px;font-size:var(--fs-sm);border:none;background:none;cursor:pointer;color:var(--text-primary);font-family:inherit}
.move-menu-item:hover{background:var(--bg-surface-2)}
.move-menu-item.current{color:var(--text-muted);font-style:italic;cursor:default;pointer-events:none}

.searchable-select{position:relative;width:100%}
.searchable-select input{width:100%;font-size:var(--fs-xs);padding:2px 24px 2px 8px;border-radius:10px;border:1px solid var(--border-default);background:var(--bg-surface);color:var(--text-primary);font-family:inherit;cursor:pointer}
.searchable-select::after{content:'\25BE';position:absolute;right:8px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:10px;pointer-events:none;transition:transform .15s}
.searchable-select.open::after{transform:translateY(-50%) rotate(180deg)}
.searchable-select input:focus{outline:none;border-color:var(--accent);cursor:text}

.bulk-toolbar-label{font-size:var(--fs-xs);color:var(--text-secondary);font-weight:var(--fw-semibold)}
.bulk-toolbar .btn-danger{font-size:var(--fs-sm);padding:4px 12px}

.bulk-toolbar-clear:hover{color:var(--text-primary)}

.bulk-toolbar-field-label{font-size:var(--fs-xs);color:var(--accent-hover);font-weight:var(--fw-semibold);white-space:nowrap}

.wf-grid .bulk-check{width:18px;height:18px;cursor:pointer;accent-color:var(--accent)}

.resources-panel.open .resources-chevron{transform:rotate(90deg)}
.resources-body{display:none;padding:16px;border-top:1px solid var(--border-subtle)}
.resources-panel.open .resources-body{display:block}
.resources-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.resources-item{display:flex;flex-direction:column;gap:4px}
.resources-item label{font-size:var(--fs-xs);font-weight:var(--fw-semibold);text-transform:uppercase;letter-spacing:.4px;color:var(--text-secondary)}

.settings-icon{background:none;border:none;font-size:18px;cursor:pointer;color:var(--text-muted);padding:4px}

.settings-panel{background:var(--bg-surface);border:1px solid var(--border-default);border-radius:var(--radius-md);padding:16px;margin-bottom:16px}

.task-pending{background:var(--warning-bg);color:var(--warning)}
.task-complete{background:var(--success-bg);color:var(--success)}

.unassigned-panel{border-top:2px solid var(--border-default);margin-top:8px;padding-top:0}

.unassigned-item-meta{font-size:var(--fs-xs);color:var(--text-muted)}

/* AGENTIC extraction — script guide + readiness scorecard */

.agentic-guide-head .resources-chevron{transition:transform .2s;font-size:11px;color:var(--text-muted)}
.agentic-guide.open .resources-chevron{transform:rotate(90deg)}
.agentic-guide-body{display:none;padding:4px 14px 14px}
.agentic-guide.open .agentic-guide-body{display:block}

.agentic-guide-item>div{display:flex;flex-direction:column;gap:1px}
.agentic-guide-item strong{font-size:var(--fs-sm)}
.agentic-guide-item span{font-size:var(--fs-xs);color:var(--text-secondary);line-height:1.45}

.agentic-card{border:1px solid var(--border-default);border-radius:var(--radius-md);background:var(--bg-surface);margin:14px 0;padding:14px 16px}
.agentic-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:10px}
.agentic-title{font-weight:var(--fw-semibold);font-size:var(--fs-sm)}
.agentic-sub{font-size:var(--fs-xs);color:var(--text-muted)}
.agentic-state{flex-shrink:0;padding:3px 12px;border-radius:var(--radius-full);font-size:var(--fs-xs);font-weight:var(--fw-semibold)}
.agentic-rows{display:flex;flex-direction:column;gap:1px}
.agentic-row{display:grid;grid-template-columns:24px 150px 74px 1fr;gap:10px;align-items:center;padding:7px 0;border-top:1px solid var(--border-subtle);font-size:var(--fs-sm)}
.agentic-row .agentic-letter{width:20px;height:20px;font-size:11px}
.agentic-name{font-weight:var(--fw-medium)}
.agentic-pill{justify-self:start;padding:2px 9px;border-radius:var(--radius-full);font-size:11px;font-weight:var(--fw-semibold);white-space:nowrap}
.agentic-reason{font-size:var(--fs-xs);color:var(--text-secondary);overflow:hidden;text-overflow:ellipsis}
.agentic-questions{margin-top:14px;padding-top:12px;border-top:1px solid var(--border-subtle)}
.agentic-q-title{font-size:var(--fs-sm);font-weight:var(--fw-medium);color:var(--accent);margin-bottom:10px}
.agentic-q{margin-bottom:10px}
.agentic-q label{display:block;font-size:var(--fs-xs);color:var(--text-secondary);margin-bottom:4px}
/* Make the answer box unmistakably an input field (was transparent until focus). */
.agentic-answer{display:block;width:100%;box-sizing:border-box;border:1px solid var(--border-default);background:var(--bg-surface);border-radius:var(--radius-md);padding:8px 10px;min-height:46px;font-size:var(--fs-sm);color:var(--text-primary);resize:vertical}
.agentic-answer::placeholder{color:var(--text-muted)}

.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--text-muted);flex-shrink:0}

.sync-dot.syncing{background:var(--warning,#C6A15B)}
.sync-dot.error{background:var(--danger,#C0392B)}
.settings-icon.spinning{animation:sys-spin .8s linear infinite}
@keyframes sys-spin{to{transform:rotate(360deg)}}
.agentic-loading{display:flex;align-items:center;gap:10px;padding:16px;color:var(--text-muted);font-size:var(--fs-sm)}
@media(max-width:760px){.agentic-row{grid-template-columns:20px 1fr;row-gap:2px}.agentic-pill,.agentic-reason{grid-column:2}}

.disp-opt:hover{border-color:var(--accent);color:var(--accent)}
.disp-opt.sel{background:var(--accent);border-color:var(--accent);color:var(--bg-surface);font-weight:var(--fw-semibold)}
.disp-hint{font-size:var(--fs-xs);color:var(--text-muted);margin-top:8px}
.disp-tag{flex-shrink:0;font-size:10px;font-weight:var(--fw-semibold);padding:1px 6px;border-radius:var(--radius-full)}
.disp-tag-agent{background:var(--accent-soft);color:var(--accent)}
.disp-tag-recurring{background:var(--warning-bg);color:var(--warning)}
.disp-tag-adhoc{background:var(--info-bg);color:var(--info)}
</style>

<div id="authBar" class="auth-bar" style="display:none">
    <span>Airtable API Key:</span>
    <input type="password" id="patInput" placeholder="pat..." onkeydown="if(event.key==='Enter')saveAuth()">

</div>

<div id="topbar" class="topbar" style="display:none">

        <h1>Systemisation</h1>

    </div>
    <div class="topbar-right">
        <span id="syncStatus" class="sync-status" title="Not synced yet"><span class="sync-dot"></span>Loading…</span>
        <button class="settings-icon" id="refreshBtn" onclick="refreshData()" title="Refresh data">&#x21BB;</button>

</div>

    <button class="pipeline-tab" data-tab="steps" onclick="switchView('steps')">SOPs <span class="count" id="stepsCount">0</span></button>
    <button class="pipeline-tab" data-tab="automation" onclick="switchView('automation')">Automation <span class="count" id="autoCount">0</span></button>
</div>

<div id="main" class="main" style="display:none">

    <div class="tab-pane" id="pane-dept"></div>
    <div class="tab-pane" id="pane-all"></div>
    <div class="tab-pane" id="pane-steps"></div>
    <div class="tab-pane" id="pane-automation"></div>
</div>

<div class="loading" id="loader">Loading...</div>
<div class="toast" id="toast"></div>
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer" role="dialog" aria-modal="true" aria-label="Stage details">
    <div class="drawer-header">
        <button class="drawer-close" onclick="closeDrawer()" aria-label="Close">&times;</button>
        <div class="drawer-title" id="drawerTitle"></div>
    </div>
    <div class="drawer-body" id="drawerBody"></div>
</div>

async function atFetch(tableId, fields){
    let all=[], offset='';
    const params = new URLSearchParams({ returnFieldsByFieldId:'true', pageSize:'100' });
    if(fields) fields.forEach(f=>params.append('fields[]',f));
    do {
        if(offset) params.set('offset',offset);
        const res = await fetch(`https://api.airtable.com/v0/${BASE_ID}/${tableId}?${params}`,{
            headers:{'Authorization':`Bearer ${PAT}`}
        });
        if(res.status===401||res.status===403){ showAuthBar(); throw new Error('auth'); }
        if(res.status===429){ await new Promise(r=>setTimeout(r,1100)); continue; }
        const data = await res.json();
        all = all.concat(data.records||[]);
        offset = data.offset||'';
    } while(offset);
    return all;
}

async function atCreate(tableId, fields){
    const res = await fetch(`https://api.airtable.com/v0/${BASE_ID}/${tableId}`,{
        method:'POST',
        headers:{'Authorization':`Bearer ${PAT}`,'Content-Type':'application/json'},
        body: JSON.stringify({ records:[{fields}], typecast:true, returnFieldsByFieldId:true })
    });
    if(!res.ok) throw new Error(await res.text());
    const data = await res.json();
    return data.records[0];
}

async function atUpdate(tableId, recId, fields){
    const res = await fetch(`https://api.airtable.com/v0/${BASE_ID}/${tableId}/${recId}`,{
        method:'PATCH',
        headers:{'Authorization':`Bearer ${PAT}`,'Content-Type':'application/json'},
        body: JSON.stringify({ fields, typecast:true, returnFieldsByFieldId:true })
    });
    if(!res.ok) throw new Error(await res.text());
    return (await res.json());
}

async function atDelete(tableId, recId){
    const res = await fetch(`https://api.airtable.com/v0/${BASE_ID}/${tableId}/${recId}`,{
        method:'DELETE',
        headers:{'Authorization':`Bearer ${PAT}`}
    });
    if(!res.ok) throw new Error(await res.text());
}

// The task↔workflow link used to live ONLY in this browser's localStorage, so the
// pipeline automation never fired on another device or after a cache clear. The
// workflow id is stamped in every video task's Notes ("[Systemisation] Workflow
// ID: recX") — rebuild the local tracking from Airtable on every load.
async function rebuildVideoTaskTracking(){
    try {
        const records = [];
        let offset = null;
        do {
            const params = new URLSearchParams({
                returnFieldsByFieldId:'true', pageSize:'100',
                filterByFormula: "AND({Task Category}='Systemisation', FIND('[Systemisation] Workflow ID:', {Notes}&''))"
            });
            params.append('fields[]', TF.notes);
            if(offset) params.set('offset', offset);
            const res = await fetch(`https://api.airtable.com/v0/${BASE_ID}/${TASKS_TBL}?${params}`,{
                headers:{'Authorization':`Bearer ${PAT}`}
            });
            if(!res.ok) return;
            const data = await res.json();
            records.push(...(data.records||[]));
            offset = data.offset || null;
        } while(offset);
        for(const t of records){
            const m = String(gf(t,TF.notes)||'').match(/\[Systemisation\] Workflow ID:\s*(rec\w+)/);
            if(!m) continue;
            const wfId = m[1];
            if(!allWorkflows.some(w=>w.id===wfId)) continue;   // workflow deleted
            if(!getWfVideoTaskId(wfId)) setWfVideoTaskId(wfId, t.id);
        }
    } catch(e){ console.warn('Video task tracking rebuild failed:', e); }
}

async function checkVideoTasks(){
    const wfIds = allWorkflows.map(w=>w.id);
    // Check ALL workflows with a linked video task (not just pending)
    const trackedIds = wfIds.filter(id=>getWfVideoTaskId(id));
    if(!trackedIds.length) return;
    const newlyCompleted = [];
    try {
        const taskIds = trackedIds.map(id=>getWfVideoTaskId(id)).filter(Boolean);
        const formula = taskIds.length===1
            ? `RECORD_ID()='${taskIds[0]}'`
            : `OR(${taskIds.map(id=>`RECORD_ID()='${id}'`).join(',')})`;
        const params = new URLSearchParams({
            returnFieldsByFieldId:'true', pageSize:'100',
            filterByFormula: formula
        });
        [TF.status,TF.notes,TF.description].forEach(f=>params.append('fields[]',f));
        const res = await fetch(`https://api.airtable.com/v0/${BASE_ID}/${TASKS_TBL}?${params}`,{
            headers:{'Authorization':`Bearer ${PAT}`}
        });
        if(!res.ok) return;
        const data = await res.json();
        allVideoTasks = data.records||[];
        for(const wfId of trackedIds){
            const taskId = getWfVideoTaskId(wfId);
            const task = allVideoTasks.find(t=>t.id===taskId);
            // Task was deleted from Airtable: clear localStorage
            if(!task){
                setWfVideoTaskId(wfId, '');
                setWfVideoTaskStatus(wfId, '');
                continue;
            }
            const status = selName(gf(task,TF.status))||'';
            if(status==='Complete'||status==='Completed'||status==='Done'){
                if(getWfVideoTaskStatus(wfId)!=='complete'){
                    setWfVideoTaskStatus(wfId, 'complete');
                    const notes = gf(task,TF.notes)||'';
                    const desc = gf(task,TF.description)||'';
                    const combined = notes + ' ' + desc;
                    const bracketMatch = combined.match(/\[loom:(https:\/\/www\.loom\.com\/share\/[a-zA-Z0-9]+)\]/);
                    const plainMatch = combined.match(/https:\/\/www\.loom\.com\/share\/[a-zA-Z0-9]+/);
                    const loomUrl = bracketMatch ? bracketMatch[1] : (plainMatch ? plainMatch[0] : null);
                    if(loomUrl){
                        const existingUrl = getWfLoomUrl(wfId);
                        const isUpdate = !!existingUrl && existingUrl !== loomUrl;
                        await setWfLoomUrl(wfId, loomUrl);
                        const wName = (allWorkflows.find(w=>w.id===wfId)&&gf(allWorkflows.find(w=>w.id===wfId),WF.name))||'workflow';
                        toast(isUpdate ? 'Loom URL updated for "'+wName+'" — regenerating SOP...' : 'Loom URL auto-imported for "'+wName+'"');
                        newlyCompleted.push(wfId);
                    }
                }
            } else {
                // Sync current status from Airtable
                setWfVideoTaskStatus(wfId, 'pending');
            }
        }
    } catch(e){ console.error('Video task check failed:', e); }
    for(const wfId of newlyCompleted){
        try { await autoGenerateSOPPipeline(wfId); } catch(e){ console.error('Auto-pipeline failed for '+wfId, e); }
    }
}

async function autoGenerateSOPPipeline(wfId){
    const w = allWorkflows.find(w=>w.id===wfId);
    if(!w) return;
    const wName = gf(w,WF.name)||'Untitled';

    // Step 0: Import steps from Loom
    showPipelineProgress(wName, 0);
    const hasSteps = stepsForWorkflow(wfId).length > 0;
    if(!hasSteps){
        try { await importFromLoom(wfId, true); } catch(e){ console.error('Step import failed for '+wfId, e); }
    }
    if(stepsForWorkflow(wfId).length > 0){
        // Step 1: Generate SOP
        showPipelineProgress(wName, 1);
        try {
            await generateWorkflowSOP(wfId);
            // generateWorkflowSOP chains into autoUploadToDrive automatically.
            // Step 2 (Uploading to Drive) is shown inside generateWorkflowSOP via autoUploadToDrive.

            // Step 3: Create AI skill
            showPipelineProgress(wName, 3);
            try {
                await autoConvertToSkill(wfId);
            } catch(e){ console.error('Auto skill creation failed for '+wfId, e); }
        } catch(e){ console.error('SOP generation failed for '+wfId, e); }
    }
    hidePipelineProgress();
}

async function autoConvertToSkill(wfId){
    const w = allWorkflows.find(w=>w.id===wfId);
    if(!w) return;
    const wName = gf(w,WF.name)||'Untitled';
    const sopDoc = gf(w,WF.sopDocument);
    if(!sopDoc) return;
    toast('Auto-generating skill for "'+wName+'"...');
    await doConvertWorkflowToSkill(wfId);
}

function buildMethodBizMap(){
    methodBizMap = {};
    bizMethodOrder = {};
    allObjStrat.forEach(o=>{
        const bizIds = linkIds(gf(o,OBJSTRAT_BIZ));
        if(!bizIds.length) return;
        const bizId = bizIds[0];
        const orderedIds = [];
        OBJSTRAT_METHOD_LINKS.forEach(fid=>{
            const ids = linkIds(gf(o,fid));
            ids.forEach(mid=>{
                if(!orderedIds.includes(mid)) orderedIds.push(mid);
            });
        });
        orderedIds.forEach(mid=>{ methodBizMap[mid] = bizId; });
        if(!bizMethodOrder[bizId]) bizMethodOrder[bizId] = [];
        orderedIds.forEach(mid=>{
            if(!bizMethodOrder[bizId].includes(mid)) bizMethodOrder[bizId].push(mid);
        });
    });
}

function filteredWorkflows(){
    if(!bizFilterId) return allWorkflows;
    return allWorkflows.filter(w=>{
        const links = linkIds(gf(w,WF.business));
        return links.length===0 || links.includes(bizFilterId);
    });
}

function filteredMethods(){
    if(!bizFilterId) return allMethods;
    const ordered = bizMethodOrder[bizFilterId] || [];
    const result = ordered.map(mid=>allMethods.find(m=>m.id===mid)).filter(Boolean);
    const remaining = allMethods.filter(m=>methodBizMap[m.id]===bizFilterId && !ordered.includes(m.id));
    return result.concat(remaining);
}

function stepsForWorkflow(wfId){
    return allSteps
        .filter(s=> linkIds(gf(s,ST.workflow)).includes(wfId))
        .sort((a,b)=>(gf(a,ST.sortOrder)||0)-(gf(b,ST.sortOrder)||0));
}

function updateCounts(){
    const wfs = filteredWorkflows();
    let fc=0,mc=0,dc=0;
    wfs.forEach(w=>{
        if(gf(w,WF.fulfillStage)) fc++;
        if(linkIds(gf(w,WF.mainMethodStage)).length) mc++;
        if(gf(w,WF.department)) dc++;
    });
    document.getElementById('fulfillCount').textContent=fc;
    document.getElementById('methodCount').textContent=mc;
    document.getElementById('deptCount').textContent=dc;
    document.getElementById('allCount').textContent=wfs.length;
    const sopCount = wfs.filter(w=>!!gf(w,WF.sopDocument)).length;
    document.getElementById('stepsCount').textContent=sopCount;
    const skillsBuilt = wfs.filter(w=>!!gf(w,WF.skillDefinition) || !!localStorage.getItem('sys_wfskill_'+w.id)).length;
    document.getElementById('autoCount').textContent=skillsBuilt;
}

        const initial = mName.charAt(0).toUpperCase();
        const desc = gf(m,MM.description)||'';
        html += `<div class="stage-card" onclick="drillInto('method','${m.id}')">
            <div class="stage-card-header">
                <div class="stage-card-letter" style="background:${colours[i%5]}">${esc(initial)}</div>
                <div class="stage-card-title">${esc(mName)}</div>
                <div class="stage-card-count">${methodWfs.length} workflow${methodWfs.length!==1?'s':''}</div>
            </div>
            ${desc ? `<div class="stage-card-desc">${esc(desc)}</div>` : ''}
            <div class="stage-card-progress">
                <div class="progress-bar"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
                <div class="stage-card-progress-label">${pct}%</div>
            </div>
        </div>`;
    });
    return html;
}

function orderedMethodsForBiz(bizId){
    const ordered = (bizMethodOrder[bizId] || []).map(mid=>allMethods.find(m=>m.id===mid)).filter(Boolean);
    const extras = allMethods.filter(m=>methodBizMap[m.id]===bizId && !(bizMethodOrder[bizId]||[]).includes(m.id));
    return ordered.concat(extras);
}

function buildAcronymStrip(methods, label){
    const colours = ['var(--tone-sage)','var(--tone-olive)','var(--tone-gold)','var(--tone-blue)','var(--tone-plum)'];
    const acronym = methods.map(m=>(gf(m,MM.name)||'?').charAt(0).toUpperCase()).join('');
    let html = `<div class="acronym-strip"><span class="acronym-strip-label">${esc(label)}</span>`;
    methods.forEach((m,i)=>{
        if(i>0) html += '<span class="acronym-dot"></span>';
        html += `<span class="acronym-letter" style="background:${colours[i%colours.length]}" title="${esc(gf(m,MM.name)||'')}">${esc((gf(m,MM.name)||'?').charAt(0).toUpperCase())}</span>`;
    });
    if(acronym) html += `<span style="margin-left:8px;font-weight:var(--fw-bold);font-size:var(--fs-sm);color:var(--text-secondary)">${esc(acronym)}</span>`;
    html += '</div>';
    return html;
}

function renderMethod(){
    const pane = document.getElementById('pane-method');
    const wfs = filteredWorkflows();

    if(bizFilterId){
        const methods = orderedMethodsForBiz(bizFilterId);
        if(!methods.length){
            pane.innerHTML = '<div class="empty-state"><p>No Main Method stages found for this business.</p><p>Link Main Method stages in Objective &amp; Strategy.</p></div>';
            return;
        }
        const biz = allBusinesses.find(b=>b.id===bizFilterId);
        const bizName = biz ? (gf(biz,BIZ_NAME)||'Unnamed') : 'Selected Business';
        let html = buildAcronymStrip(methods, bizName);
        html += '<div class="stage-grid">' + renderMethodCards(methods, wfs) + '</div>';
        pane.innerHTML = html;
    } else {
        let html = '';
        let hasAny = false;
        allBusinesses.forEach(b=>{
            const group = orderedMethodsForBiz(b.id);
            if(!group.length) return;
            hasAny = true;
            const bizName = gf(b,BIZ_NAME)||'Unnamed';
            html += '<div class="biz-group">';
            html += `<div class="biz-group-header"><span class="biz-group-name">${esc(bizName)}</span>`;
            const colours = ['var(--tone-sage)','var(--tone-olive)','var(--tone-gold)','var(--tone-blue)','var(--tone-plum)'];
            const acronym = group.map(m=>(gf(m,MM.name)||'?').charAt(0).toUpperCase()).join('');
            html += '<span class="biz-acronym">';
            group.forEach((m,i)=>{
                html += `<span class="biz-acronym-letter" style="background:${colours[i%colours.length]}">${esc((gf(m,MM.name)||'?').charAt(0).toUpperCase())}</span>`;
            });
            html += `<span style="margin-left:4px;font-weight:var(--fw-bold);font-size:var(--fs-sm);color:var(--text-secondary)">${esc(acronym)}</span>`;
            html += '</span></div>';
            html += '<div class="stage-grid">' + renderMethodCards(group, wfs) + '</div>';
            html += '</div>';
        });
        const unassigned = allMethods.filter(m=>!methodBizMap[m.id]);
        if(unassigned.length){
            hasAny = true;
            html += '<div class="biz-group"><div class="biz-group-header"><span class="biz-group-name">Unassigned</span></div>';
            html += '<div class="stage-grid">' + renderMethodCards(unassigned, wfs) + '</div></div>';
        }
        if(!hasAny){
            html = '<div class="empty-state"><p>No Main Method stages found.</p><p>Add Main Method stages in Objective &amp; Strategy first.</p></div>';
        } else {
            const totalMethod = wfs.filter(w=>linkIds(gf(w,WF.mainMethodStage)).length).length;
            if(!totalMethod) html += '<div class="stage-hint">Click a stage card to view and add workflows for that method.</div>';
        }
        pane.innerHTML = html;
    }
}

// ── All Workflows ──
let _allSortMode = 'alpha';
let _autoSortMode = 'alpha';
function renderAll(){
    const pane = document.getElementById('pane-all');
    const methodOrder = [];
    allBusinesses.forEach(b=>{ orderedMethodsForBiz(b.id).forEach(m=>{ if(!methodOrder.includes(m.id)) methodOrder.push(m.id); }); });
    allMethods.forEach(m=>{ if(!methodOrder.includes(m.id)) methodOrder.push(m.id); });
    const nameCmp = (a,b)=>{ const na=(gf(a,WF.name)||'').toLowerCase(), nb=(gf(b,WF.name)||'').toLowerCase(); return na<nb?-1:na>nb?1:0; };
    const wfs = filteredWorkflows().filter(w=>wfMatchesQuery(w,_allSearch)).slice().sort((a,b)=>{
        if(_allSortMode==='alpha') return nameCmp(a,b);
        if(_allSortMode==='department'){
            const da=selName(gf(a,WF.department))||'', db=selName(gf(b,WF.department))||'';
            const ai=DEPARTMENTS.indexOf(da), bi=DEPARTMENTS.indexOf(db);
            const aIdx=ai>=0?ai:DEPARTMENTS.length, bIdx=bi>=0?bi:DEPARTMENTS.length;
            if(aIdx!==bIdx) return aIdx-bIdx;
            return nameCmp(a,b);
        }
        if(_allSortMode==='journey'){
            const fa=selName(gf(a,WF.fulfillStage))||'', fb=selName(gf(b,WF.fulfillStage))||'';
            const fsKeys=FULFILL_STAGES.map(s=>s.key), fsLabels=FULFILL_STAGES.map(s=>s.label);
            let ai=fsKeys.indexOf(fa); if(ai<0)ai=fsLabels.indexOf(fa); if(ai<0)ai=FULFILL_STAGES.length;
            let bi=fsKeys.indexOf(fb); if(bi<0)bi=fsLabels.indexOf(fb); if(bi<0)bi=FULFILL_STAGES.length;
            if(ai!==bi) return ai-bi;
            return nameCmp(a,b);
        }
        // default: method
        const aMethodIds = linkIds(gf(a,WF.mainMethodStage));
        const bMethodIds = linkIds(gf(b,WF.mainMethodStage));
        const aIdx = aMethodIds.length ? methodOrder.indexOf(aMethodIds[0]) : methodOrder.length;
        const bIdx = bMethodIds.length ? methodOrder.indexOf(bMethodIds[0]) : methodOrder.length;
        if(aIdx !== bIdx) return aIdx - bIdx;
        return nameCmp(a,b);
    });

    if(!wfs.length && !allWorkflows.length){
        pane.innerHTML = '<div class="empty-state"><p>No workflows yet.</p><p>Click a stage card on the other tabs to add workflows, or add one here.</p></div>';
        return;
    }

    const paneEl = document.createElement('div');

    const topBar = document.createElement('div');
    topBar.style.cssText = 'display:flex;justify-content:space-between;align-items:center;margin-bottom:12px';
    const hint = document.createElement('p');
    hint.style.cssText = 'font-size:var(--fs-sm);color:var(--text-secondary);margin:0';
    hint.textContent = 'All workflows in one place. Edit inline or use the other tabs to organise by stage.';
    topBar.appendChild(hint);
    const sortWrap = document.createElement('div');
    sortWrap.style.cssText = 'display:flex;align-items:center;gap:8px';
    sortWrap.innerHTML = `${sysSearchInput('allSearchInput', _allSearch, "_allSearch=this.value;_refocusSearchId='allSearchInput';renderAll()")}
        <label style="font-size:var(--fs-xs);color:var(--text-secondary);white-space:nowrap">Sort by</label>
        <select style="font-size:var(--fs-xs);padding:4px 8px;border:1px solid var(--border-default);border-radius:var(--radius-sm);background:var(--bg-surface);color:var(--text-primary)" onchange="_allSortMode=this.value;renderAll()">
            <option value="method"${_allSortMode==='method'?' selected':''}>Main Method</option>
            <option value="department"${_allSortMode==='department'?' selected':''}>Department</option>
            <option value="journey"${_allSortMode==='journey'?' selected':''}>Customer Journey</option>
            <option value="alpha"${_allSortMode==='alpha'?' selected':''}>Alphabetical (A-Z)</option>
        </select>`;
    topBar.appendChild(sortWrap);
    paneEl.appendChild(topBar);

    const toolbar = document.createElement('div');
    toolbar.className = 'bulk-toolbar';
    toolbar.id = 'bulkToolbar';
    toolbar.innerHTML = `<span class="bulk-toolbar-count" id="bulkCount">0 selected</span>
        <div class="bulk-toolbar-actions">
            <div class="bulk-toolbar-field"><span class="bulk-toolbar-field-label">Department:</span><div id="bulkDept"></div></div>
            <div class="bulk-toolbar-field"><span class="bulk-toolbar-field-label">Customer Journey:</span><div id="bulkFulfill"></div></div>
            <div class="bulk-toolbar-field"><span class="bulk-toolbar-field-label">Main Method:</span><div id="bulkMethod"></div></div>
            <button class="btn-apply" id="bulkApplyBtn" onclick="bulkApplyAll()" disabled>Apply to selected</button>
            <button class="btn btn-sm btn-danger" onclick="bulkDelete()">Delete selected</button>
        </div>
        <button class="bulk-toolbar-clear" onclick="bulkClearAll()">Clear selection</button>`;
    paneEl.appendChild(toolbar);

    _bulkPendingAssigns = {};
    const deptOpts = DEPARTMENTS.map(d=>({value:d, label:d}));
    toolbar.querySelector('#bulkDept').appendChild(createSearchableSelect(deptOpts, '', (v)=> { _bulkPendingAssigns.department=v; updateBulkApplyBtn(); }));
    const fulfillOpts = FULFILL_STAGES.map(s=>({value:s.key, label:s.label}));
    toolbar.querySelector('#bulkFulfill').appendChild(createSearchableSelect(fulfillOpts, '', (v)=> { _bulkPendingAssigns.fulfill=v; updateBulkApplyBtn(); }));
    const orderedMethods = [];
    allBusinesses.forEach(b=>{ orderedMethodsForBiz(b.id).forEach(m=>{ if(!orderedMethods.includes(m)) orderedMethods.push(m); }); });
    allMethods.forEach(m=>{ if(!orderedMethods.includes(m)) orderedMethods.push(m); });
    const methodOpts = orderedMethods.map(m=>({value:m.id, label:gf(m,MM.name)||'Unnamed'}));
    toolbar.querySelector('#bulkMethod').appendChild(createSearchableSelect(methodOpts, '', (v)=> { _bulkPendingAssigns.method=v; updateBulkApplyBtn(); }));

    const table = document.createElement('table');
    table.className = 'wf-grid';
    table.innerHTML = `<thead><tr>
        <th style="width:36px"><input type="checkbox" class="bulk-check" id="bulkSelectAll" onchange="bulkToggleAll(this.checked)"></th>
        <th style="width:18%">Name</th>
        <th style="width:20%">Description</th>
        <th style="width:13%">Department</th>
        <th style="width:15%">Customer Journey</th>
        <th style="width:13%">Main Method</th>
        <th style="width:80px">Status</th>
        <th style="width:40px"></th>
    </tr></thead>`;
    const tbody = document.createElement('tbody');
    tbody.id = 'allGridBody';

    const UNASSIGNED = '__unassigned__';
    if(_allSortMode==='alpha'){
        wfs.forEach(w => tbody.appendChild(buildAllGridRow(w)));
    } else {
        const grouped = new Map();
        if(_allSortMode==='method'){
            methodOrder.forEach(mid => grouped.set(mid, []));
        } else if(_allSortMode==='department'){
            DEPARTMENTS.forEach(d => grouped.set(d, []));
        } else if(_allSortMode==='journey'){
            FULFILL_STAGES.forEach(s => grouped.set(s.key, []));
        }
        grouped.set(UNASSIGNED, []);
        wfs.forEach(w => {
            let key = UNASSIGNED;
            if(_allSortMode==='method'){
                const mIds = linkIds(gf(w,WF.mainMethodStage));
                key = mIds.length ? mIds[0] : UNASSIGNED;
            } else if(_allSortMode==='department'){
                key = selName(gf(w,WF.department)) || UNASSIGNED;
            } else if(_allSortMode==='journey'){
                key = selName(gf(w,WF.fulfillStage)) || UNASSIGNED;
            }
            if(!grouped.has(key)) grouped.set(key, []);
            grouped.get(key).push(w);
        });
        grouped.forEach((groupWfs, key) => {
            if(!groupWfs.length) return;
            const headerTr = document.createElement('tr');
            headerTr.className = 'wf-grid-group-header';
            let label = 'Unassigned';
            if(key !== UNASSIGNED){
                if(_allSortMode==='method'){
                    const method = allMethods.find(m=>m.id===key);
                    label = method ? (gf(method,MM.name)||'Unnamed') : 'Unnamed';
                } else if(_allSortMode==='journey'){
                    const stage = FULFILL_STAGES.find(s=>s.key===key);
                    label = stage ? stage.label : key;
                } else {
                    label = key;
                }
            }
            headerTr.innerHTML = `<td colspan="8">${esc(label)} (${groupWfs.length})</td>`;
            tbody.appendChild(headerTr);
            groupWfs.forEach(w => tbody.appendChild(buildAllGridRow(w)));
        });
    }

    tbody.appendChild(buildAllNewRow());

    table.appendChild(tbody);
    paneEl.appendChild(table);
    pane.innerHTML = '';
    pane.appendChild(paneEl);
    restoreSearchFocus();
}

function buildAllGridRow(w){
    const tr = document.createElement('tr');
    tr.dataset.id = w.id;
    const name = gf(w,WF.name)||'';
    const desc = gf(w,WF.description)||'';
    const status = selName(gf(w,WF.status))||'Not Started';
    const dept = selName(gf(w,WF.department))||'';
    const fulfill = selName(gf(w,WF.fulfillStage))||'';
    const methodIds = linkIds(gf(w,WF.mainMethodStage));

    const orderedMethods = [];
    allBusinesses.forEach(b=>{ orderedMethodsForBiz(b.id).forEach(m=>{ if(!orderedMethods.includes(m)) orderedMethods.push(m); }); });
    allMethods.forEach(m=>{ if(!orderedMethods.includes(m)) orderedMethods.push(m); });

    tr.innerHTML = `
        <td><input type="checkbox" class="bulk-check" data-wf-id="${w.id}" onchange="bulkUpdateCount()"></td>
        <td><input class="wf-grid-input" value="${esc(name)}" placeholder="Workflow name" data-field="name"></td>
        <td><div style="display:flex;gap:4px;align-items:start">
            <textarea class="wf-grid-input" rows="1" placeholder="Description (optional)" data-field="desc">${esc(desc)}</textarea>
            <button class="btn-ai-inline" title="Generate description with AI" onclick="aiDescRow(this)">&#x2728;</button>
        </div></td>
        <td class="ss-dept"></td>
        <td class="ss-fulfill"></td>
        <td class="ss-method"></td>
        <td><select class="wf-grid-status" data-field="status">
            <option${status==='Not Started'?' selected':''}>Not Started</option>
            <option${status==='In Progress'?' selected':''}>In Progress</option>
            <option${status==='Complete'?' selected':''}>Complete</option>
        </select></td>
        <td style="white-space:nowrap">
            <button class="btn btn-sm btn-danger" style="padding:2px 6px;font-size:11px" title="Delete" onclick="deleteWorkflowRow(this,'${w.id}')">&#x2715;</button>
        </td>`;

    const deptOpts = DEPARTMENTS.map(d=>({value:d, label:d}));
    tr.querySelector('.ss-dept').appendChild(createSearchableSelect(deptOpts, dept, (v)=> gridSave(w.id, {[WF.department]: v||null}, tr)));

    const fulfillOpts = FULFILL_STAGES.map(s=>({value:s.key, label:s.label}));
    tr.querySelector('.ss-fulfill').appendChild(createSearchableSelect(fulfillOpts, fulfill, (v)=> gridSave(w.id, {[WF.fulfillStage]: v||null}, tr)));

    const methodOpts = orderedMethods.map(m=>({value:m.id, label:gf(m,MM.name)||'Unnamed'}));
    const currentMethodId = methodIds.length ? methodIds[0] : '';
    tr.querySelector('.ss-method').appendChild(createSearchableSelect(methodOpts, currentMethodId, (v)=> gridSave(w.id, {[WF.mainMethodStage]: v ? [v] : []}, tr)));

    const nameInput = tr.querySelector('[data-field="name"]');
    const descInput = tr.querySelector('[data-field="desc"]');
    const statusSel = tr.querySelector('[data-field="status"]');

    nameInput.addEventListener('blur', ()=> gridSave(w.id, {[WF.name]: nameInput.value.trim()}, tr));
    descInput.addEventListener('blur', ()=> gridSave(w.id, {[WF.description]: descInput.value.trim()}, tr));
    statusSel.addEventListener('change', ()=> gridSave(w.id, {[WF.status]: statusSel.value}, tr));

    autoGrowTextarea(descInput);
    return tr;
}

function buildAllNewRow(){
    const tr = document.createElement('tr');
    tr.className = 'wf-grid-new';
    tr.innerHTML = `
        <td></td>
        <td><input class="wf-grid-input" placeholder="Type name and press Enter" data-field="name"></td>
        <td><textarea class="wf-grid-input" rows="1" placeholder="Description (optional)" data-field="desc"></textarea></td>
        <td></td><td></td><td></td><td></td>
        <td></td>`;

    const nameInput = tr.querySelector('[data-field="name"]');
    const descInput = tr.querySelector('[data-field="desc"]');

    nameInput.addEventListener('keydown', async(e)=>{
        if(e.key==='Enter'){
            e.preventDefault();
            const name = nameInput.value.trim();
            if(!name) return;
            nameInput.disabled = true;
            const fields = { [WF.name]: name, [WF.status]: 'Not Started' };
            const desc = descInput.value.trim();
            if(desc) fields[WF.description] = desc;
            if(bizFilterId) fields[WF.business] = [bizFilterId];
            try {
                const rec = await atCreate(TBL.workflows, fields);
                allWorkflows.push(rec);
                const tbody = tr.parentElement;
                const newDataRow = buildAllGridRow(rec);
                tbody.insertBefore(newDataRow, tr);
                nameInput.value = ''; descInput.value = '';
                nameInput.disabled = false;
                nameInput.focus();
                updateTabCounts();
                toast('Workflow added');
            } catch(err){ toast('Error: '+err.message); nameInput.disabled = false; }
        }
    });

    descInput.addEventListener('keydown', (e)=>{
        if(e.key==='Enter'){ e.preventDefault(); nameInput.focus(); nameInput.dispatchEvent(new KeyboardEvent('keydown',{key:'Enter'})); }
    });

    autoGrowTextarea(descInput);
    return tr;
}

// ── Drawer ──
function drillInto(view, key){
    drillStage = key;
    _drawerKey = key;
    _drawerView = view;
    openDrawer(key, view);
}

function closeDrawer(){
    document.getElementById('drawerOverlay').classList.remove('open');
    document.getElementById('drawer').classList.remove('open');
    drillStage = null;
    _drawerKey = null;
    _drawerView = null;
    render();
}

let _gridSaveTimers = {};

function openDrawer(key, view){
    const wfs = filteredWorkflows();
    let stageWfs, stageLabel;
    if(view==='fulfill'){
        const s = FULFILL_STAGES.find(s=>s.key===key);
        stageLabel = s ? s.label : key;
        stageWfs = wfs.filter(w=>selName(gf(w,WF.fulfillStage))===key);
    } else if(view==='method'){
        const m = allMethods.find(m=>m.id===key);
        stageLabel = m ? (gf(m,MM.name)||'Unnamed') : key;
        stageWfs = wfs.filter(w=>linkIds(gf(w,WF.mainMethodStage)).includes(key));
    } else {
        stageLabel = key;
        stageWfs = wfs.filter(w=>selName(gf(w,WF.department))===key);
    }
    stageWfs.sort((a,b)=>(gf(a,WF.sortOrder)||0)-(gf(b,WF.sortOrder)||0));

    document.getElementById('drawerTitle').textContent = stageLabel;
    const body = document.getElementById('drawerBody');
    body.innerHTML = '';

    const controls = document.createElement('div');
    controls.className = 'controls';
    controls.innerHTML = `<button class="btn btn-ai btn-sm" onclick="suggestWorkflows('${esc(key)}','${view}')">Suggest Workflows (AI)</button>`;
    body.appendChild(controls);

    const table = document.createElement('table');
    table.className = 'wf-grid';
    table.innerHTML = `<thead><tr>
        <th style="width:35%">Name</th>
        <th>Description</th>
        <th style="width:40px"></th>
    </tr></thead>`;
    const tbody = document.createElement('tbody');
    tbody.id = 'gridBody';

    stageWfs.forEach(w => tbody.appendChild(buildGridRow(w, key, view)));
    tbody.appendChild(buildNewRow(key, view));

    table.appendChild(tbody);
    body.appendChild(table);

    document.getElementById('drawerOverlay').classList.add('open');
    document.getElementById('drawer').classList.add('open');
}

function buildNewRow(stageKey, view){
    const tr = document.createElement('tr');
    tr.className = 'wf-grid-new';
    tr.innerHTML = `
        <td><input class="wf-grid-input" placeholder="Type workflow name (saves automatically)" data-field="name"></td>
        <td><textarea class="wf-grid-input" rows="1" placeholder="Description (optional)" data-field="desc"></textarea></td>
        <td></td>`;

    const nameInput = tr.querySelector('[data-field="name"]');
    const descInput = tr.querySelector('[data-field="desc"]');
    let committing = false;

    async function commitNew(){
        const name = nameInput.value.trim();
        if(!name || committing || nameInput.disabled) return;
        committing = true;
        nameInput.disabled = true;
        const fields = { [WF.name]: name, [WF.status]: 'Not Started' };
        const desc = descInput.value.trim();
        if(desc) fields[WF.description] = desc;
        if(view==='fulfill') fields[WF.fulfillStage] = stageKey;
        else if(view==='method') fields[WF.mainMethodStage] = [stageKey];
        else if(view==='dept') fields[WF.department] = stageKey;
        if(bizFilterId) fields[WF.business] = [bizFilterId];
        try {
            const rec = await atCreate(TBL.workflows, fields);
            allWorkflows.push(rec);
            const tbody = tr.parentElement;
            if(tbody){ const newDataRow = buildGridRow(rec, stageKey, view); tbody.insertBefore(newDataRow, tr); }
            nameInput.value = ''; descInput.value = '';
            nameInput.disabled = false;
            updateTabCounts();
            if(currentView==='fulfill') renderFulfill();
            else if(currentView==='method') renderMethod();
            else if(currentView==='dept') renderDept();
            toast('Workflow added');
        } catch(err){ toast('Error: '+err.message); nameInput.disabled = false; }
        committing = false;
    }

    // Commit on Enter, OR when focus leaves the whole new row (no Enter needed).
    // Skip when focus just moves between the name and description of the same row.
    const commitOnLeave = (e)=>{ const to = e.relatedTarget; if(to && tr.contains(to)) return; commitNew(); };
    nameInput.addEventListener('keydown', (e)=>{ if(e.key==='Enter'){ e.preventDefault(); commitNew(); } });
    descInput.addEventListener('keydown', (e)=>{ if(e.key==='Enter'){ e.preventDefault(); commitNew(); } });
    nameInput.addEventListener('blur', commitOnLeave);
    descInput.addEventListener('blur', commitOnLeave);

    autoGrowTextarea(descInput);

    return tr;
}

function autoGrowTextarea(el){
    const grow = ()=>{ el.style.height='auto'; el.style.height=el.scrollHeight+'px'; };
    el.addEventListener('input', grow);
    requestAnimationFrame(grow);
}

async function gridSave(recId, fields, tr){
    clearTimeout(_gridSaveTimers[recId]);
    _gridSaveTimers[recId] = setTimeout(async()=>{
        tr.classList.add('wf-grid-saving');
        try {

function createSearchableSelect(options, currentValue, onChange){
    const wrapper = document.createElement('div');
    wrapper.className = 'searchable-select';
    const currentLabel = (options.find(o=>o.value===currentValue)||{}).label || 'None';
    const input = document.createElement('input');
    input.type = 'text';
    input.value = currentLabel;
    input.placeholder = 'Search...';
    wrapper.appendChild(input);

    const list = document.createElement('div');
    list.className = 'searchable-select-list';
    wrapper.appendChild(list);

    function renderOptions(filter){
        list.innerHTML = '';
        const term = (filter||'').toLowerCase();
        const allOpts = [{value:'', label:'None'}, ...options];
        const filtered = term ? allOpts.filter(o=>o.label.toLowerCase().includes(term)) : allOpts;
        filtered.forEach(opt=>{
            const btn = document.createElement('button');
            btn.className = 'searchable-select-opt' + (opt.value===currentValue?' selected':'');
            btn.textContent = opt.label;
            btn.addEventListener('mousedown', (e)=>{
                e.preventDefault();
                currentValue = opt.value;
                input.value = opt.label;
                wrapper.classList.remove('open');
                onChange(opt.value);
            });
            list.appendChild(btn);
        });
    }

    input.addEventListener('focus', ()=>{ input.select(); renderOptions(''); wrapper.classList.add('open'); });
    input.addEventListener('input', ()=>{ renderOptions(input.value); wrapper.classList.add('open'); });
    input.addEventListener('blur', ()=>{
        setTimeout(()=>{
            wrapper.classList.remove('open');
            const cur = options.find(o=>o.value===currentValue);
            input.value = cur ? cur.label : 'None';
        }, 150);
    });
    input.addEventListener('keydown', (e)=>{
        if(e.key==='Escape'){ input.blur(); }
        if(e.key==='Enter'){
            const first = list.querySelector('.searchable-select-opt');
            if(first) first.dispatchEvent(new MouseEvent('mousedown'));
        }
    });

    return wrapper;
}

function showMoveMenu(btn, wfId, currentKey, view){
    document.querySelectorAll('.move-menu').forEach(m=>m.remove());
    const container = btn.parentElement;
    const menu = document.createElement('div');
    menu.className = 'move-menu';

    let options = [];
    if(view==='fulfill'){
        options = FULFILL_STAGES.map(s=>({key:s.key, label:s.label}));
    } else if(view==='method'){
        const ordered = [];
        allBusinesses.forEach(b=>{ orderedMethodsForBiz(b.id).forEach(m=>{ if(!ordered.includes(m)) ordered.push(m); }); });
        allMethods.forEach(m=>{ if(!ordered.includes(m)) ordered.push(m); });
        options = ordered.map(m=>({key:m.id, label:gf(m,MM.name)||'Unnamed'}));
    } else {
        options = DEPARTMENTS.map(d=>({key:d, label:d}));
    }

    options.forEach(opt=>{
        const item = document.createElement('button');
        item.className = 'move-menu-item' + (opt.key===currentKey?' current':'');
        item.textContent = opt.key===currentKey ? opt.label + ' (current)' : opt.label;
        if(opt.key!==currentKey){
            item.addEventListener('click', ()=>{ menu.remove(); moveWorkflow(wfId, opt.key, view); });
        }
        menu.appendChild(item);
    });

    container.appendChild(menu);
    const closeMenu = (e)=>{ if(!menu.contains(e.target) && e.target!==btn){ menu.remove(); document.removeEventListener('click', closeMenu); } };
    setTimeout(()=> document.addEventListener('click', closeMenu), 0);
}

async function moveWorkflow(wfId, newKey, view){

    if(!w) return;
    const fields = {};
    if(view==='fulfill') fields[WF.fulfillStage] = newKey;
    else if(view==='method') fields[WF.mainMethodStage] = [newKey];
    else fields[WF.department] = newKey;

    try {
        const updated = await atUpdate(TBL.workflows, wfId, fields);

        if(idx>=0) allWorkflows[idx] = updated;

        else if(view==='dept') renderDept();

async function bulkApplyAll(){
    const ids = getSelectedWfIds();
    if(!ids.length){ toast('No workflows selected'); return; }
    const hasAny = _bulkPendingAssigns.department || _bulkPendingAssigns.fulfill || _bulkPendingAssigns.method;
    if(!hasAny){ toast('Select at least one field to assign'); return; }

    const fields = {};
    if(_bulkPendingAssigns.department) fields[WF.department] = _bulkPendingAssigns.department;
    if(_bulkPendingAssigns.fulfill) fields[WF.fulfillStage] = _bulkPendingAssigns.fulfill;
    if(_bulkPendingAssigns.method) fields[WF.mainMethodStage] = [_bulkPendingAssigns.method];

    const toolbar = document.getElementById('bulkToolbar');
    toolbar.style.opacity = '0.5';
    toolbar.style.pointerEvents = 'none';
    let done = 0;
    try {
        for(const id of ids){
            const updated = await atUpdate(TBL.workflows, id, fields);
            const idx = allWorkflows.findIndex(w=>w.id===id);
            if(idx>=0) allWorkflows[idx] = updated;
            done++;
            if(done < ids.length) await new Promise(r=>setTimeout(r, 500));
        }
        _bulkPendingAssigns = {};
        updateTabCounts();
        renderAll();
        toast(done + ' workflow' + (done!==1?'s':'') + ' updated');
    } catch(e){
        toast('Error after ' + done + ' updates: ' + e.message);
        renderAll();
    }
}

async function bulkDelete(){
    const ids = getSelectedWfIds();
    if(!ids.length){ toast('No workflows selected'); return; }
    if(!confirm('Delete ' + ids.length + ' workflow' + (ids.length!==1?'s':'') + ' and all their steps? This cannot be undone.')) return;

    const toolbar = document.getElementById('bulkToolbar');
    toolbar.style.opacity = '0.5';
    toolbar.style.pointerEvents = 'none';
    let done = 0;
    try {
        for(const id of ids){
            const steps = stepsForWorkflow(id);
            for(const s of steps) await atDelete(TBL.steps, s.id);
            await atDelete(TBL.workflows, id);
            allWorkflows = allWorkflows.filter(w=>w.id!==id);
            allSteps = allSteps.filter(s=>!linkIds(gf(s,ST.workflow)).includes(id));
            done++;
            if(done < ids.length) await new Promise(r=>setTimeout(r, 500));
        }
        updateTabCounts();
        renderAll();
        renderFulfill();
        renderMethod();
        renderDept();
        toast(done + ' workflow' + (done!==1?'s':'') + ' deleted');
    } catch(e){
        toast('Error after ' + done + ' deletions: ' + e.message);
        renderAll();
    }
}

async function aiDescRow(btn){
    const tr = btn.closest('tr');
    const nameInput = tr.querySelector('[data-field="name"]');
    const descInput = tr.querySelector('[data-field="desc"]');
    const name = nameInput.value.trim();
    if(!name){ toast('Enter a workflow name first'); return; }

    btn.disabled = true; btn.textContent = '⏳';
    const prompt = `Write a concise 1-2 sentence description for a business workflow called "${name}". The description should explain what this workflow achieves and its purpose. Return ONLY the description text, nothing else.`;
    try {
        const res = await fetch('https://claude-proxy.kevinbrittain.workers.dev', {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ model:'claude-sonnet-4-6', max_tokens:200, messages:[{role:'user',content:prompt}] })
        });
        if(!res.ok) throw new Error('AI request failed');
        const data = await res.json();
        const text = (data.content?.[0]?.text||'').trim();
        descInput.value = text;
        descInput.style.height='auto'; descInput.style.height=descInput.scrollHeight+'px';
        const recId = tr.dataset.id;
        if(recId) gridSave(recId, {[WF.description]: text}, tr);
        toast('Description generated');
    } catch(e){ toast('AI error: '+e.message); }
    btn.disabled = false; btn.textContent = '✨';
}

function renderWorkflowCard(w){
    const name = gf(w,WF.name)||'Untitled';
    const desc = gf(w,WF.description)||'';
    const status = selName(gf(w,WF.status))||'Not Started';
    const statusClass = status==='Complete'?'wf-status-complete':status==='In Progress'?'wf-status-in-progress':'wf-status-not-started';
    const steps = stepsForWorkflow(w.id);
    const sopDone = steps.filter(s=>selName(gf(s,ST.sopStatus))==='Complete').length;

    const stepsHtml = buildStepTableHtml(steps);

    return `<div class="wf-card" id="wf-${w.id}">
        <div class="wf-card-header" onclick="toggleWf('${w.id}')" role="button" tabindex="0" aria-expanded="false" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();toggleWf('${w.id}')}">
            <span class="wf-chevron">&#x25B6;</span>
            <div class="wf-card-title">${esc(name)}</div>
            <div class="wf-card-meta">
                <span class="wf-step-count">${steps.length} step${steps.length!==1?'s':''} (${sopDone} SOPs)</span>
                <span class="wf-status ${statusClass}">${esc(status)}</span>
            </div>
        </div>
        <div class="wf-card-body">
            ${desc?`<div class="wf-desc">${esc(desc)}</div>`:''}
            <div class="wf-actions">
                <button class="btn btn-sm btn-primary" onclick="openAddStep('${w.id}')">+ Add Step</button>
                <button class="btn btn-sm btn-ai" onclick="suggestSteps('${w.id}')">Suggest Steps (AI)</button>
                <button class="btn btn-sm" onclick="editWorkflow('${w.id}')">Edit Workflow</button>
                <button class="btn btn-sm btn-danger" onclick="deleteWorkflow('${w.id}')">Delete</button>
            </div>
            <div id="sop-viewer-${w.id}" style="display:none"></div>
            ${stepsHtml}
        </div>
    </div>`;
}

function buildStepRow(s, i){
    const sName = gf(s,ST.name)||'Untitled';
    const sDesc = gf(s,ST.description)||'';
    const sType = selName(gf(s,ST.stepType))||'Staff Task';
    const sTypeClass = sType==='AI Skill'?'step-type-ai':sType==='Both'?'step-type-both':'step-type-staff';
    const sopSt = selName(gf(s,ST.sopStatus))||'Not Created';
    const sopClass = sopSt==='Complete'?'sop-complete':sopSt==='Draft'?'sop-draft':'sop-not-created';
    const hasSop = gf(s,ST.sopContent);
    const ps = pipelineStatus(s);
    const canConvertSkill = sopSt==='Complete' && (sType==='AI Skill'||sType==='Both') && !isSkillCreated(s.id);
    const canConvertTask = sopSt==='Complete' && (sType==='Staff Task'||sType==='Both') && !isTaskCreated(s.id);
    return `<tr>
        <td class="step-num">${i+1}</td>
        <td><div class="step-name">${esc(sName)}</div>${sDesc?`<div class="step-desc">${esc(sDesc)}</div>`:''}</td>
        <td><span class="step-type-badge ${sTypeClass}">${esc(sType)}</span></td>
        <td><span class="sop-badge ${sopClass}">${esc(sopSt)}</span></td>
        <td><span class="pipeline-badge ${ps.cls}">${esc(ps.label)}</span></td>
        <td class="step-actions">
            ${hasSop?`<button class="btn btn-sm" onclick="event.stopPropagation();viewSOP('${s.id}')">View SOP</button>`:''}
            <button class="btn btn-sm btn-ai" onclick="event.stopPropagation();generateSOP('${s.id}')">AI SOP</button>
            ${canConvertSkill?`<button class="btn btn-sm" style="border-color:var(--info);color:var(--info)" onclick="event.stopPropagation();convertToSkill('${s.id}')">To Skill</button>`:''}
            ${canConvertTask?`<button class="btn btn-sm" style="border-color:var(--accent);color:var(--accent)" onclick="event.stopPropagation();convertToTask('${s.id}')">To Task</button>`:''}
            <button class="btn btn-sm" onclick="event.stopPropagation();editStep('${s.id}')">Edit</button>
            <button class="btn btn-sm btn-danger" onclick="event.stopPropagation();deleteStep('${s.id}')">Del</button>
        </td>
    </tr>`;
}

function buildStepTableHtml(steps){
    if(!steps.length) return '<div style="color:var(--text-muted);font-size:var(--fs-sm);padding:8px 0">No steps yet. Add steps to define this workflow.</div>';
    return `<table class="step-table"><thead><tr><th class="step-num">#</th><th>Step</th><th>Type</th><th>SOP</th><th>Pipeline</th><th style="width:180px">Actions</th></tr></thead><tbody>`
        + steps.map((s,i)=>buildStepRow(s,i)).join('')
        + '</tbody></table>';
}

async function saveNewWorkflow(){
    const name = document.getElementById('mWfName').value.trim();

    if(saveBtn){ saveBtn.disabled=true; saveBtn.textContent='Saving...'; }

    const fulfill = document.getElementById('mWfFulfill').value;

    const method = document.getElementById('mWfMethod').value;

    const dept = document.getElementById('mWfDept').value;

function editWorkflow(id){
    const w = allWorkflows.find(w=>w.id===id);
    if(!w) return;
    const fulfillOpts = FULFILL_STAGES.map(s=>`<option value="${esc(s.key)}"${selName(gf(w,WF.fulfillStage))===s.key?' selected':''}>${esc(s.key)}</option>`).join('');
    const methodLinks = linkIds(gf(w,WF.mainMethodStage));
    const methodOpts = allMethods.map(m=>`<option value="${m.id}"${methodLinks.includes(m.id)?' selected':''}>${esc(gf(m,MM.name)||'Unnamed')}</option>`).join('');
    const curDept = selName(gf(w,WF.department));
    const deptOpts = DEPARTMENTS.map(d=>`<option value="${d}"${curDept===d?' selected':''}>${d}</option>`).join('');
    const bizLinks = linkIds(gf(w,WF.business));
    const bizOpts = allBusinesses.map(b=>`<option value="${b.id}"${bizLinks.includes(b.id)?' selected':''}>${esc(gf(b,BIZ_NAME)||'Unnamed')}</option>`).join('');
