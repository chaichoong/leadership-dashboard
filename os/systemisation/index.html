// AI — SOP Generation
// ═══════════════════════════════════════════════════════════════════════
async function generateSOP(stepId){
    const s = allSteps.find(s=>s.id===stepId);
    if(!s) return;
    const wfId = linkIds(gf(s,ST.workflow))[0];
    const w = allWorkflows.find(w=>w.id===wfId);
    const stepName = gf(s,ST.name)||'';
    const stepDesc = gf(s,ST.description)||'';
    const wfName = w ? (gf(w,WF.name)||'') : '';
    const wfDesc = w ? (gf(w,WF.description)||'') : '';
    const stageName = w ? (selName(gf(w,WF.fulfillStage))||selName(gf(w,WF.department))||'') : '';

    if(!confirm(`Generate an SOP for "${stepName}"? This will overwrite any existing SOP content.`)) return;

    const viewer = document.getElementById('sop-viewer-'+wfId);
    if(viewer){
        viewer.style.display='block';
        viewer.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-muted)">Generating SOP... This may take a moment.</div>';
    }

    const taskPrompt = `Write a Standard Operating Procedure (SOP) for the following workflow step.

Workflow: ${wfName}
Workflow description: ${wfDesc}
Stage: ${stageName}
Step name: ${stepName}
Step description: ${stepDesc}

The SOP must be:
- Written in plain English, suitable for a team member with no prior knowledge of this process
- Structured with numbered steps
- Each step should be a single clear action
- Include any important notes, warnings, or quality checks
- Include expected outcomes and how to verify the step was completed correctly
- Keep it concise but thorough

Output the SOP text only, no additional commentary.`;

    try {
        const systemPrompt = typeof buildCachedWizardSystem === 'function'
            ? buildCachedWizardSystem('Systemisation Module', taskPrompt)
            : [{type:'text', text: taskPrompt}];

        const res = await fetch('https://claude-proxy.kevinbrittain.workers.dev', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({
                model: 'claude-sonnet-4-6',
                max_tokens: 2000,
                system: systemPrompt,
                messages: [{ role:'user', content: taskPrompt }],
            })
        });
        if(!res.ok) throw new Error('AI request failed: '+res.status);
        const data = await res.json();
        const sopText = data.content?.[0]?.text || 'Failed to generate SOP.';

        await atUpdate(TBL.steps, stepId, {
            [ST.sopContent]: sopText,
            [ST.sopStatus]: 'Draft',
        });
        const idx = allSteps.findIndex(st=>st.id===stepId);
        if(idx>=0){
            allSteps[idx].fields[ST.sopContent] = sopText;
            allSteps[idx].fields[ST.sopStatus] = {name:'Draft'};
        }
        render();
        if(viewer){
            viewer.style.display='block';
            viewer.dataset.stepId = stepId;
            viewer.innerHTML = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
                <strong>SOP: ${esc(stepName)} (Draft)</strong>
                <button class="btn btn-sm" onclick="this.parentElement.parentElement.style.display='none'">Close</button>
            </div><div class="sop-viewer">${esc(sopText)}</div>`;
        }
        toast('SOP generated (saved as Draft)');
    } catch(e){
        toast('AI error: '+e.message);
        if(viewer) viewer.innerHTML = `<div style="padding:20px;color:var(--danger)">Error generating SOP: ${esc(e.message)}</div>`;
    }
}

// ═══════════════════════════════════════════════════════════════════════
// AI — Workflow SOP Generation (full document with embedded video)
// ═══════════════════════════════════════════════════════════════════════
async function generateWorkflowSOP(wfId){
    const w = allWorkflows.find(w=>w.id===wfId);
    if(!w) return;
    const wName = gf(w,WF.name)||'Untitled';
    const wDesc = gf(w,WF.description)||'';
    const steps = stepsForWorkflow(wfId);
    const loomUrl = getWfLoomUrl(wfId);
    const dept = selName(gf(w,WF.department))||'';
    const fulfill = selName(gf(w,WF.fulfillStage))||'';

    if(!steps.length){ toast('Add steps to this workflow first'); return; }

    let container = document.getElementById('sopDoc-'+wfId);
    let tempContainer = false;
    if(!container){
        // Auto-pipeline: create a hidden temporary container so the SOP generation
        // can proceed even when the workflow detail row is not expanded/visible.
        container = document.createElement('div');
        container.id = 'sopDoc-'+wfId;
        container.style.display = 'none';
        document.body.appendChild(container);
        tempContainer = true;
    }

    container.innerHTML = `<div style="padding:32px;text-align:center;color:var(--text-muted)">
        <div class="sop-spinner"></div>
        <div style="margin-top:12px;font-weight:var(--fw-medium)">Generating SOP</div>
        <div style="font-size:var(--fs-xs);margin-top:4px">Fetching video transcript and creating detailed instructions</div>
    </div>`;
    container.scrollIntoView({behavior:'smooth',block:'nearest'});

    let transcript = '';
    let videoTitle = '';
    if(loomUrl){
        try {
            transcript = await fetchLoomTranscript(loomUrl);
            const oembedRes = await fetch(`https://www.loom.com/v1/oembed?url=${encodeURIComponent(loomUrl)}`);
            if(oembedRes.ok){ const od = await oembedRes.json(); videoTitle = od.title||''; }
        } catch(e){ console.warn('[skill-gen] Loom transcript fetch failed', e); }
    }

    const stepsText = steps.map((s,i)=>`Step ${i+1}: ${gf(s,ST.name)||'Untitled'}\nDescription: ${gf(s,ST.description)||'None'}`).join('\n\n');

    const prompt = `Write a comprehensive Standard Operating Procedure (SOP) for the following workflow.

Workflow name: ${wName}
${videoTitle ? `Video title: ${videoTitle}` : ''}
${wDesc ? `Workflow description: ${wDesc}` : ''}
${dept ? `Department: ${dept}` : ''}
${fulfill ? `Customer journey stage: ${fulfill}` : ''}

The workflow has the following steps:
${stepsText}

${transcript ? `IMPORTANT: Below is the transcript from the actual video walkthrough of this process. Use the specific details, system names, screen locations, and actions mentioned in the transcript to write accurate, context-specific instructions. Do NOT write generic software help. Write instructions that match exactly what happens in the video.

CRITICAL — examples are not rules: when the narrator walks through specific cases (a tenant's name, one bank account, a particular amount or date), treat them as worked examples ONLY. Write every instruction generically so it applies to EVERY case of this process. Never hard-code an example case, name, or date into a step.

VIDEO TRANSCRIPT:
${transcript}` : ''}

For EACH step, write instructions as a list of short, actionable bullet points (not paragraphs). Each bullet should be one clear action or piece of information. Use 4-8 bullets per step.

Then add two extra sections:
- "cautions": an array of 3-5 warning strings about things that could go wrong or important rules to follow
- "tips": an array of 3-5 efficiency tips for completing this process faster or avoiding common mistakes

Write for a team member with no prior knowledge of this process. A 13-year-old should be able to follow these instructions.
Keep language plain and direct. Short sentences. Active voice.
Do not use markdown formatting. Use plain text only.
Output ONLY a JSON object with:
- "title": a descriptive SOP title based on what the process actually does (not just the workflow name)
- "steps": an array where each element has "name" (use the exact step names provided) and "detail" (an array of bullet-point strings, each one a single instruction or note)
- "cautions": an array of warning strings
- "tips": an array of efficiency tip strings

No other text outside the JSON object.`;

    try {
        const systemPrompt = [{type:'text', text:'You are a business process documentation expert. You write SOPs that are specific, actionable, and easy for anyone to follow. When a video transcript is provided, you use the exact details from the video rather than writing generic instructions.'}];

        const res = await fetch('https://claude-proxy.kevinbrittain.workers.dev', {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({
                model:'claude-sonnet-4-6',
                max_tokens:6000,
                system: systemPrompt,
                messages:[{role:'user',content:prompt}],
            })
        });
        if(!res.ok) throw new Error('AI request failed: '+res.status);
        const data = await res.json();
        const text = data.content?.[0]?.text||'{}';
        const jsonMatch = text.match(/\{[\s\S]*\}/);
        if(!jsonMatch) throw new Error('Invalid AI response');
        const sopData = JSON.parse(jsonMatch[0]);
        const sopSteps = sopData.steps || [];
        const sopTitle = sopData.title || wName;
        const cautions = sopData.cautions || [];
        const tips = sopData.tips || [];

        renderSOPDocument(wfId, wName, wDesc, dept, fulfill, loomUrl, steps, sopSteps, container, sopTitle, cautions, tips, videoTitle);
        // Regenerating must NOT wipe how the workflow runs: keep the disposition and
        // the agent config. Readiness is deliberately reset — new content, new score.
        const prevSop = getWfSopData(wfId) || {};
        const sopJson = JSON.stringify(Object.assign(
            { sopTitle, sopSteps, cautions, tips, videoTitle, generatedDate: new Date().toISOString() },
            prevSop.disposition ? { disposition: prevSop.disposition } : {},
            prevSop.agent ? { agent: prevSop.agent } : {}
        ));
        try {
            await atUpdate(TBL.workflows, wfId, { [WF.sopDocument]: sopJson });
            const wi = allWorkflows.findIndex(w2=>w2.id===wfId);
            if(wi>=0) allWorkflows[wi].fields[WF.sopDocument] = sopJson;
        } catch(e){ console.error('SOP save error:', e); }
        toast('SOP generated');
        await autoUploadToDrive(wfId);
        runAgenticCheck(wfId); // auto-score readiness once the SOP exists
    } catch(e){
        toast('SOP generation error: '+e.message);
        container.innerHTML = `<div style="padding:20px;color:var(--danger)">Error generating SOP: ${esc(e.message)}</div>`;
    } finally {
        // Clean up temporary container created for auto-pipeline
        if(tempContainer && container.parentNode) container.remove();
    }
}

function renderSOPDocument(wfId, wName, wDesc, dept, fulfill, loomUrl, steps, sopSteps, container, sopTitle, cautions, tips, videoTitle){
    const loomEmbed = renderLoomEmbed(loomUrl);
    const now = new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});
    sopTitle = sopTitle || wName;
    cautions = cautions || [];
    tips = tips || [];

    let html = '<div class="sop-document">';
    html += `<div class="sop-doc-header">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
            <div>
                <h2>${esc(sopTitle)}</h2>
                <p>Standard Operating Procedure${dept?' &middot; '+esc(dept):''}${fulfill?' &middot; '+esc(fulfill):''}</p>
            </div>
            <button class="btn btn-sm" style="border-color:var(--danger);color:var(--danger);flex-shrink:0" onclick="deleteSOPDocument('${wfId}')">Clear</button>
        </div>
    </div>`;
    html += '<div class="sop-doc-body">';

    if(wDesc){
        html += `<p style="margin:0 0 20px 0;font-size:var(--fs-sm);color:var(--text-secondary);line-height:1.6">${esc(wDesc)}</p>`;
    }

    if(loomEmbed){
        html += `<div class="sop-doc-video">
            <div style="padding:12px 16px;background:var(--bg-surface-2);font-size:var(--fs-xs);font-weight:var(--fw-semibold);color:var(--text-secondary);text-transform:uppercase;letter-spacing:.4px">Video Walkthrough${videoTitle?' &mdash; '+esc(videoTitle):''}</div>
            ${loomEmbed}
        </div>`;
    }

    html += '<div class="sop-doc-steps">';
    steps.forEach((s,i)=>{
        const sName = gf(s,ST.name)||'Untitled';
        const sDesc = gf(s,ST.description)||'';
        const sopDetail = sopSteps.find(ss=>ss.name===sName);
        const detail = sopDetail ? sopDetail.detail : '';
        const detailHtml = Array.isArray(detail)
            ? '<ul>'+detail.map(b=>`<li>${esc(b)}</li>`).join('')+'</ul>'
            : (detail ? esc(detail) : '');

        html += `<div class="sop-doc-step">
            <div class="sop-doc-step-header">
                <div class="sop-doc-step-num"></div>
                <div class="sop-doc-step-content">
                    <div class="sop-doc-step-name">${esc(sName)}</div>
                    ${sDesc?`<div class="sop-doc-step-desc">${esc(sDesc)}</div>`:''}
                    ${detailHtml?`<div class="sop-doc-ai-detail">${detailHtml}</div>`:''}
                    <div class="sop-fb">
                        <button class="sop-fb-toggle" onclick="toggleSopFb('${s.id}')">&#x270E; Improve this step</button>
                        <div class="sop-fb-box" id="sopfbbox-${s.id}" style="display:none">
                            <textarea id="sopfbtext-${s.id}" class="sop-fb-text" rows="2" placeholder="Say what to change. For example: remove the specific example and keep it general."></textarea>
                            <div class="sop-fb-actions">
                                <button class="btn btn-sm btn-ai" onclick="submitSopStepFeedback('${wfId}','${s.id}')">Submit &amp; revise</button>
                                <button class="btn btn-sm" onclick="toggleSopFb('${s.id}')">Cancel</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>`;
    });
    html += '</div>';

    if(cautions.length){
        html += '<div class="sop-doc-cautions"><h3>Cautionary Notes</h3><ul>';
        cautions.forEach(c=>{ html += `<li>${esc(c)}</li>`; });
        html += '</ul></div>';
    }
    if(tips.length){
        html += '<div class="sop-doc-tips"><h3>Tips for Efficiency</h3><ul>';
        tips.forEach(t=>{ html += `<li>${esc(t)}</li>`; });
        html += '</ul></div>';
    }

    html += '</div>';

    const driveDoc = getWfDriveDocUrl(wfId);
    const driveBtns = driveDoc
        ? `<a class="btn btn-sm" href="${esc(driveDoc)}" target="_blank" rel="noopener">View in Drive</a>
           <button class="btn btn-sm btn-drive-upload" onclick="uploadSOPToDrive('${wfId}')">Re-upload to Drive</button>`
        : `<button class="btn btn-sm btn-drive-upload" onclick="uploadSOPToDrive('${wfId}')">Upload to Drive</button>`;
    html += `<div class="sop-doc-footer">
        <span>Generated ${now}</span>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
            ${driveBtns}
            <button class="btn btn-sm btn-primary" onclick="exportSOPAsHTML('${wfId}')">Export</button>
            <button class="btn btn-sm btn-danger" onclick="deleteSOPDocument('${wfId}')">Clear</button>
        </div>
    </div>`;
    html += '</div>';

    container.innerHTML = html;
    container.scrollIntoView({behavior:'smooth',block:'start'});

    container._sopData = { wfId, sopTitle, wName, wDesc, dept, fulfill, loomUrl, steps, sopSteps, cautions, tips, videoTitle, generatedDate: now };
}

function buildSOPExportHTML(d){
    const loomVideoId = d.loomUrl ? (d.loomUrl.match(/loom\.com\/share\/([a-zA-Z0-9]+)/)||[])[1] : '';

    let stepsHtml = '';

        const sDesc = gf(s,ST.description)||'';

        const detailHtml = Array.isArray(sopDetail)
            ? '<ul>'+sopDetail.map(b=>`<li>${esc(b)}</li>`).join('')+'</ul>'
            : (sopDetail ? esc(sopDetail) : '');
        stepsHtml += `
        <div class="step">
            <div class="step-header">
                <div class="step-num">${i+1}</div>
                <div class="step-content">
                    <h3>${esc(sName)}</h3>
                    ${sDesc?`<p class="step-desc">${esc(sDesc)}</p>`:''}
                    ${detailHtml?`<div class="step-detail">${detailHtml}</div>`:''}
                </div>
            </div>
        </div>`;
    });

    let cautionsHtml = '';

function exportSOPAsHTML(wfId){
    const container = document.getElementById('sopDoc-'+wfId);
    if(!container || !container._sopData){ toast('Generate the SOP first'); return; }
    const html = buildSOPExportHTML(container._sopData);

    const blob = new Blob([html], {type:'text/html'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = (container._sopData.sopTitle||'SOP').replace(/[^a-zA-Z0-9 _-]/g,'').replace(/\s+/g,'-') + '.html';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(()=> URL.revokeObjectURL(url), 1000);

    container._exportedHTML = html;
    toast('SOP downloaded');
}

// Turn a Drive-worker failure into a clear, actionable message. The Google OAuth token
// on the drive-upload worker periodically expires (invalid_grant); the fix then is to
// reconnect Drive, not to retry.
function driveErrMsg(e){
    const m = (e && e.message) ? e.message : String(e);
    if(/invalid_grant|expired|revoked|unauthor|auth failed|\b401\b|\b403\b/i.test(m)){
        return 'Google Drive needs reconnecting (token expired). Reconnect Drive, then use "Upload to Drive" on the SOP.';
    }
    return 'Drive upload failed: ' + m;
}

async function autoUploadToDrive(wfId){
    const w = allWorkflows.find(w=>w.id===wfId);
    const wName = w ? (gf(w,WF.name)||'Untitled') : 'Untitled';
    showPipelineProgress(wName, 2);
    try {
        await uploadSOPToDrive(wfId);
    } catch(e){
        toast(driveErrMsg(e), 'warning');
    }
}

async function uploadSOPToDrive(wfId){
    const container = document.getElementById('sopDoc-'+wfId);
    if(!container || !container._sopData){ toast('Generate the SOP first'); return; }
    const d = container._sopData;
    const htmlContent = container._exportedHTML || buildSOPExportHTML(d);
    container._exportedHTML = htmlContent;
    const btn = container.querySelector('.btn-drive-upload');
    if(btn){ btn.disabled = true; btn.textContent = 'Uploading...'; }

    try {
        const res = await fetch(DRIVE_UPLOAD_ENDPOINT, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                workflowName: d.wName,
                htmlContent,
                fileName: (d.sopTitle||d.wName||'SOP'),
            }),
        });
        if(!res.ok) throw new Error('Upload failed: '+res.status);
        const result = await res.json();
        if(result.error) throw new Error(result.error);

        await setWfDriveUrl(wfId, result.folderUrl);
        // Prefer the HTML file preview (cleaner formatting) over the Google Doc conversion
        const sopLink = result.fileUrl || result.docUrl;
        if(sopLink) {
            await setWfDriveDocUrl(wfId, sopLink);
            toast('SOP uploaded to Google Drive');
        } else {
            toast('SOP uploaded to Google Drive (folder only, no file link)', 'warning');
        }
        render();
    } catch(e){
        toast(driveErrMsg(e), 'warning');
    } finally {
        if(btn){ btn.disabled = false; btn.textContent = 'Upload to Drive'; }
    }
}

// AI — Suggest Workflows

async function suggestWorkflows(stageKey, view){
    let stageName = stageKey;
    if(view==='fulfill'){
        const s = FULFILL_STAGES.find(s=>s.key===stageKey);
        if(s) stageName = s.label;
    } else {
        const m = allMethods.find(m=>m.id===stageKey);
        if(m) stageName = gf(m,MM.name)||stageKey;
    }

    const existing = filteredWorkflows().filter(w=>{
        if(view==='fulfill') return selName(gf(w,WF.fulfillStage))===stageKey;
        return linkIds(gf(w,WF.mainMethodStage)).includes(stageKey);
    }).map(w=>gf(w,WF.name)).filter(Boolean);

    const bizName = bizFilterId ? (gf(allBusinesses.find(b=>b.id===bizFilterId),BIZ_NAME)||'') : 'a general business';

    const prompt = `Suggest 5-8 workflow names for the "${stageName}" stage of ${view==='fulfill'?'the FULFILL customer journey':'the Main Method business process'} for ${bizName}.
${existing.length ? `These workflows already exist, do not duplicate them: ${existing.join(', ')}` : ''}
Return ONLY a JSON array of objects with "name" and "description" keys. No other text.`;

    toast('AI is thinking...');
    try {
        const res = await fetch('https://claude-proxy.kevinbrittain.workers.dev', {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({
                model:'claude-sonnet-4-6',
                max_tokens:1500,
                messages:[{role:'user',content:prompt}],
            })
        });
        if(!res.ok) throw new Error('AI request failed');
        const data = await res.json();
        const text = data.content?.[0]?.text||'[]';
        const match = text.match(/\[[\s\S]*\]/);
        if(!match) throw new Error('Invalid AI response');
        const suggestions = JSON.parse(match[0]);
        showSuggestionPicker(suggestions, stageKey, view);
    } catch(e){ toast('AI error: '+e.message); }
}

function showSuggestionPicker(suggestions, stageKey, view){
    let body = '<p style="font-size:var(--fs-sm);color:var(--text-secondary);margin-bottom:12px">Tick the workflows you want to add:</p>';
    suggestions.forEach((s,i)=>{
        body += `<div style="display:flex;gap:8px;align-items:flex-start;margin-bottom:10px;padding:8px;background:var(--bg-surface-2);border-radius:6px">
            <input type="checkbox" id="sug${i}" checked style="margin-top:3px">
            <div><strong>${esc(s.name)}</strong><div style="font-size:var(--fs-xs);color:var(--text-secondary)">${esc(s.description||'')}</div></div>
        </div>`;
    });
    const footer = `<button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="addSuggestedWorkflows(${JSON.stringify(suggestions).replace(/"/g,'&quot;')},'${esc(stageKey)}','${view}')">Add Selected</button>`;
    showModal('AI Suggested Workflows', body, footer);
}

async function addSuggestedWorkflows(suggestions, stageKey, view){
    const selected = suggestions.filter((_,i)=>document.getElementById('sug'+i)?.checked);
    if(!selected.length){ closeModal(); return; }
    closeModal();
    toast(`Adding ${selected.length} workflows...`);

    for(const s of selected){
        const fields = { [WF.name]: s.name, [WF.description]: s.description||'', [WF.status]: 'Not Started' };
        if(view==='fulfill') fields[WF.fulfillStage] = stageKey;
        else fields[WF.mainMethodStage] = [stageKey];
        if(bizFilterId) fields[WF.business] = [bizFilterId];
        try {
            const rec = await atCreate(TBL.workflows, fields);
            allWorkflows.push(rec);
        } catch(e){ console.error(e); }
    }
    render();
    toast(`${selected.length} workflows added`);
}

            body: JSON.stringify({

async function addSuggestedSteps(suggestions, wfId){

            html += '<th style="width:40px">#</th>';
            html += '<th style="width:35%">Step Name</th>';
            html += '<th>Description</th>';
            html += '<th style="width:40px"></th>';
            html += '</tr></thead><tbody id="stepsGridBody">';

            steps.forEach((s,i)=>{

                const sDesc = gf(s,ST.description)||'';
                html += `<tr data-step-id="${s.id}">
                    <td class="step-num">${i+1}</td>
                    <td><input class="wf-grid-input" value="${esc(sName)}" data-field="name" onblur="stepGridSave('${s.id}','${ST.name}',this.value)"></td>
                    <td><textarea class="wf-grid-input" rows="1" data-field="desc" onblur="stepGridSave('${s.id}','${ST.description}',this.value)">${esc(sDesc)}</textarea></td>

            html += `<tr class="wf-grid-new">
                <td class="step-num">${steps.length+1}</td>
                <td><input class="wf-grid-input" placeholder="New step name" id="newStepName" onkeydown="if(event.key==='Enter'){event.preventDefault();addStepInline('${w.id}')}"></td>

            html += `<div id="agentic-${w.id}"></div>`;

        }
    }
    html += '</div></div>';
    pane.innerHTML = html;
    restoreSavedSOPs();
    restoreSearchFocus();
}

function restoreSavedSOPs(){
    allWorkflows.forEach(w=>{
        const raw = gf(w, WF.sopDocument);
        if(!raw) return;
        try {
            const saved = JSON.parse(raw);
            const container = document.getElementById('sopDoc-'+w.id);
            if(!container) return;
            const wName = gf(w,WF.name)||'Untitled';
            const wDesc = gf(w,WF.description)||'';
            const dept = selName(gf(w,WF.department))||'';
            const fulfill = selName(gf(w,WF.fulfillStage))||'';
            const loomUrl = getWfLoomUrl(w.id);
            const steps = stepsForWorkflow(w.id);
            renderSOPDocument(w.id, wName, wDesc, dept, fulfill, loomUrl, steps, saved.sopSteps||[], container, saved.sopTitle||wName, saved.cautions||[], saved.tips||[], saved.videoTitle||'');

        } catch(e){ console.error('SOP restore error for '+w.id, e); }
    });

function getWfSopData(wfId){

function toggleSopFb(stepId){
    const box = document.getElementById('sopfbbox-'+stepId);
    if(!box) return;
    const showing = box.style.display !== 'none';
    box.style.display = showing ? 'none' : 'block';
    if(!showing){ const t = document.getElementById('sopfbtext-'+stepId); if(t) t.focus(); }
}
async function submitSopStepFeedback(wfId, stepId){
    const t = document.getElementById('sopfbtext-'+stepId);
    const feedback = t ? t.value.trim() : '';
    if(!feedback){ toast('Type what to change first'); return; }
    const step = allSteps.find(s=>s.id===stepId);
    if(!step){ toast('Step not found'); return; }
    const sName = gf(step,ST.name)||'';
    const sDesc = gf(step,ST.description)||'';
    const sop = getWfSopData(wfId) || {};
    const entry = (sop.sopSteps||[]).find(ss=>ss.name===sName);
    const curDetail = entry ? entry.detail : '';
    const detailText = Array.isArray(curDetail) ? curDetail.map(b=>'- '+b).join('\n') : (curDetail||'');

    const btn = document.querySelector('#sopfbbox-'+stepId+' .btn-ai');
    if(btn){ btn.disabled = true; btn.textContent = 'Revising…'; }
    try {
        const prompt = `You are revising ONE step of a written SOP based on the owner's feedback.

Step name: ${sName}
Current description: ${sDesc || '(none)'}
Current detailed instructions:
${detailText || '(none)'}

The owner's requested change: ${feedback}

Rules:
- Apply the change. If they ask to remove a specific one-off example, rewrite it so the wording is general and applies to EVERY case, not just that example.
- Keep it a clear, followable SOP step. British English. No preamble.
- Keep the step name unchanged.
Return ONLY JSON: {"description": "a one-line brief description", "detail": ["bullet 1", "bullet 2", ...]}`;
        const res = await fetch(CLAUDE_PROXY, {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ model:'claude-sonnet-4-6', max_tokens:1200, messages:[{role:'user',content:prompt}] })
        });
        if(!res.ok) throw new Error('AI request failed: '+res.status);
        const data = await res.json();
        const text = data.content?.[0]?.text || '{}';
        const m = text.match(/\{[\s\S]*\}/);
        if(!m) throw new Error('Invalid AI response');
        const revised = JSON.parse(m[0]);
        const newDesc = String(revised.description || sDesc).slice(0,500);
        let newDetail = revised.detail;
        if(!Array.isArray(newDetail)) newDetail = newDetail ? [String(newDetail)] : [];
        newDetail = newDetail.map(b=>String(b).slice(0,400)).filter(Boolean).slice(0,12);

        // 1) step record description
        await atUpdate(TBL.steps, stepId, { [ST.description]: newDesc });
        step.fields[ST.description] = newDesc;
        // 2) SOP JSON elaborated detail for this step
        let e = (sop.sopSteps || (sop.sopSteps = [])).find(ss=>ss.name===sName);
        if(!e){ e = { name:sName }; sop.sopSteps.push(e); }
        e.detail = newDetail;
        const w = allWorkflows.find(x=>x.id===wfId);
        const json = JSON.stringify(sop);
        if(w) w.fields[WF.sopDocument] = json;
        await atUpdate(TBL.workflows, wfId, { [WF.sopDocument]: json });

        toast('Step revised');
        renderSteps();
    } catch(err){
        toast('Revise failed: '+err.message);
        if(btn){ btn.disabled = false; btn.textContent = 'Submit & revise'; }
    }
}
window.toggleSopFb = toggleSopFb;
window.submitSopStepFeedback = submitSopStepFeedback;

function agenticSopText(wfId){
    const sop = getWfSopData(wfId);
    const steps = stepsForWorkflow(wfId).map((s,i)=>`Step ${i+1}: ${gf(s,ST.name)||''} — ${gf(s,ST.description)||''}`).join('\n');
    if(!sop) return steps;
    const body = (sop.sopSteps||[]).map(s=>`${s.name}:\n- ${(s.detail||[]).join('\n- ')}`).join('\n\n');
    const cautions = (sop.cautions||[]).join('\n- ');
    const tips = (sop.tips||[]).join('\n- ');
    return `SOP TITLE: ${sop.sopTitle||''}\n\nSTEPS (raw):\n${steps}\n\nSOP BODY:\n${body}\n\nCAUTIONS:\n- ${cautions}\n\nTIPS:\n- ${tips}`;
}

async function runAgenticCheck(wfId, extraAnswers){
    const w = allWorkflows.find(x=>x.id===wfId);
    if(!w) return;
    if(!getWfSopData(wfId)){ toast('Generate the SOP first'); return; }
    // A plain Re-check must NOT throw away the owner's saved answers — fold them
    // back in so the score never regresses and answered questions never resurface.
    if(!extraAnswers){ extraAnswers = ((getWfSopData(wfId)||{}).readiness||{}).answers || {}; }
    const container = document.getElementById('agentic-'+wfId);
    const disp = getWfDisposition(wfId);
    const human = !!(disp && (disp.type==='recurring' || disp.type==='adhoc'));
    if(container){ container.innerHTML = `<div class="agentic-loading"><div class="sop-spinner"></div><span>${human?'Checking this SOP is ready to follow…':'Checking your agent is ready…'}</span></div>`; container.scrollIntoView({block:'center'}); }

    const wName = gf(w,WF.name)||'Untitled';
    const stageList = AGENTIC_STAGES.map(s=>`${s.letter} — ${s.name}${s.naAllowed?' (N/A allowed)':''}`).join('\n');
    let answersBlock = '';
    if(extraAnswers && Object.keys(extraAnswers).length){
        answersBlock = '\n\nThe owner has since answered these follow-up questions. Treat the answers as part of the process description. Re-score the stages with these folded in. Do NOT ask any further questions — return an empty "questions" array.\n' +
            Object.entries(extraAnswers).map(([k,v])=>`${k}: ${v}`).join('\n');
    }

    const intro = human
        ? 'You are checking whether a documented business process is clear enough for a PERSON to follow reliably as a recurring or ad-hoc task. Score it against the seven AGENTIC stages from a human-task point of view.'
        : 'You are checking whether a documented business process contains enough to build a reliable autonomous AI agent. Score it against the seven AGENTIC stages.';
    const passRules = human
        ? `- "Clear": clear enough for a person to follow.
- "Thin": mentioned but a person might get stuck.
- "Missing": not covered.
- "NA": genuinely not applicable. Only allowed for Inspections and Caveats. Never for A, E, N.
- This is for a HUMAN to do, not an AI agent. Navigate needs clear, followable steps; the person supplies their own judgement, so do NOT require written decision-reasoning. Go Signal and Tools help but a person can infer them, so mark Thin (not Missing) when vague.
- Aim should still say what a good result looks like.`
        : `- "Clear": the stage is fully covered.
- "Thin": mentioned but incomplete.
- "Missing": not covered.
- "NA": genuinely not applicable. Only allowed for Inspections and Caveats. Never for A, G, E, N, T.
- Navigate must contain the DECISION REASONING (how the person decides at each choice), not just a list of clicks or steps. If it is only steps with no "how I decide", mark it Thin at best.
- Aim must include a concrete way to tell a result is wrong, not just a vague purpose.`;

    const prompt = `${intro}

Process name: ${wName}

The seven stages:
${stageList}

Pass rules:
${passRules}

Here is the documented process:
${agenticSopText(wfId)}${answersBlock}

Return ONLY a JSON object:
{
  "stages": [ { "letter": "A", "status": "Clear|Thin|Missing|NA", "reason": "one short line" }, ... seven entries for A,G,E,N,T,I,C ],
  "questions": [ { "letter": "N", "question": "a specific question to fill the gap" } ]
}
Include at most 3 questions, only for Thin or Missing stages, most important first. No text outside the JSON.`;

    try {
        const res = await fetch(CLAUDE_PROXY, {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ model:'claude-sonnet-4-6', max_tokens:1500, messages:[{role:'user',content:prompt}] })
        });
        if(!res.ok) throw new Error('AI request failed: '+res.status);
        const data = await res.json();
        const text = data.content?.[0]?.text || '{}';
        const m = text.match(/\{[\s\S]*\}/);
        if(!m) throw new Error('Invalid AI response');
        const readiness = normaliseReadiness(JSON.parse(m[0]), extraAnswers);
        await saveAgenticReadiness(wfId, readiness);
        renderAgenticScorecard(wfId, readiness);
        const _ac = document.getElementById('agentic-'+wfId);
        if(_ac) _ac.scrollIntoView({block:'start'}); // bring the finished scorecard into view
        toast('Readiness check complete');
    } catch(e){
        toast('Readiness check error: '+e.message);
        if(container) container.innerHTML = `<div style="padding:12px;color:var(--danger)">Could not run the readiness check: ${esc(e.message)}</div>`;
    }
}

function normaliseReadiness(parsed, extraAnswers){
    const byLetter = {};
    (parsed.stages||[]).forEach(s=>{ if(s && s.letter) byLetter[s.letter] = s; });
    const stages = AGENTIC_STAGES.map(def=>{
        const got = byLetter[def.letter] || {};
        let status = got.status || 'Missing';
        if(status==='NA' && !def.naAllowed) status='Missing'; // never allow N/A where forbidden
        if(['Clear','Thin','Missing','NA'].indexOf(status)<0) status='Missing';
        return { letter:def.letter, name:def.name, status, reason:String(got.reason||'').slice(0,180) };
    });
    const blocking = stages.filter(s=>s.status==='Missing' || s.status==='Thin');
    const state = blocking.length===0 ? 'Ready' : 'Needs input';
    let questions = (parsed.questions||[])
        .filter(q=>q && q.question)
        .slice(0,3)
        .map(q=>({ letter:String(q.letter||'').slice(0,1), question:String(q.question).slice(0,240) }));
    // ONE BATCH ONLY. Once the owner has answered the follow-up questions we never
    // surface a fresh batch — the re-check just re-scores the badges with the answers
    // folded in. Prevents the "endless questions" loop.
    if(extraAnswers && Object.keys(extraAnswers).length) questions = [];
    return { state, stages, questions, answers:(extraAnswers||{}), checkedAt:new Date().toISOString() };
}

async function saveAgenticReadiness(wfId, readiness){
    const w = allWorkflows.find(x=>x.id===wfId);
    if(!w) return;
    const sop = getWfSopData(wfId) || {};
    sop.readiness = readiness;
    const json = JSON.stringify(sop);
    w.fields[WF.sopDocument] = json;
    try { await atUpdate(TBL.workflows, wfId, { [WF.sopDocument]: json }); }
    catch(e){ console.error('readiness save error', e); }
}

const AGENTIC_STATUS = {
    Clear:   { bg:'var(--success-bg)', fg:'var(--success)', label:'Clear' },
    Thin:    { bg:'var(--warning-bg)', fg:'var(--warning)', label:'Thin' },
    Missing: { bg:'var(--danger-bg)',  fg:'var(--danger)',  label:'Missing' },
    NA:      { bg:'var(--bg-subtle)',  fg:'var(--text-muted)', label:'N/A' },
};

function renderAgenticScorecard(wfId, readiness){
    const container = document.getElementById('agentic-'+wfId);
    if(!container || !readiness) return;
    const disp = getWfDisposition(wfId);
    const human = !!(disp && (disp.type==='recurring' || disp.type==='adhoc'));
    const ready = readiness.state==='Ready';
    const stateMeta = ready
        ? { bg:'var(--success-bg)', fg:'var(--success)', text:'Ready', sub: human?'This SOP has everything a person needs to follow it.':'This process has everything an agent needs.' }
        : { bg:'var(--warning-bg)', fg:'var(--warning)', text:'Needs input', sub: human?'Great start. A few quick answers will finish this SOP.':'Great start. A few quick answers will finish your agent.' };

    const rows = (readiness.stages||[]).map(s=>{
        const meta = AGENTIC_STATUS[s.status] || AGENTIC_STATUS.Missing;
        return `<div class="agentic-row">
            <span class="agentic-letter">${esc(s.letter)}</span>
            <span class="agentic-name">${esc(s.name)}</span>
            <span class="agentic-pill" style="background:${meta.bg};color:${meta.fg}">${esc(meta.label)}</span>
            <span class="agentic-reason" title="${esc(s.reason||'')}">${esc(s.reason||'')}</span>
        </div>`;
    }).join('');

    let questions = '';
    if(!ready && (!readiness.questions || !readiness.questions.length) && Object.keys(readiness.answers||{}).length){
        // Answered but still short somewhere: no dead-end — point at the fix routes.
        const thin = (readiness.stages||[]).filter(s=>s.status==='Thin'||s.status==='Missing').map(s=>s.name).join(', ');
        questions = `<div class="agentic-questions">
            <div class="agentic-q-title">Nearly there. ${esc(thin)} still need${thin.includes(',')?'':'s'} more detail — use the "Improve this step" boxes on the SOP below to add it, or re-record that part of the video, then hit Re-check.</div>
        </div>`;
    }
    else if(readiness.questions && readiness.questions.length){
        questions = `<div class="agentic-questions">
            <div class="agentic-q-title">${esc(stateMeta.sub)}</div>
            ${readiness.questions.map((q,i)=>`<div class="agentic-q">
                <label><strong>${esc(q.letter)}</strong> &middot; ${esc(q.question)}</label>
                <textarea class="wf-grid-input agentic-answer" rows="2" data-q="${i}" placeholder="Type your answer, or re-record this stage in a new video">${esc((readiness.answers&&readiness.answers[q.letter])||'')}</textarea>
            </div>`).join('')}
            <button class="btn btn-sm btn-ai" onclick="submitAgenticAnswers('${wfId}')">Submit answers &amp; re-check</button>
        </div>`;
    }

    container.innerHTML = `<div class="agentic-card" aria-live="polite">
        <div class="agentic-head">
            <div>
                <div class="agentic-title">AGENTIC readiness</div>
                <div class="agentic-sub">${human?'How ready this SOP is for a person to follow':'How ready this process is to become an autonomous agent'}</div>
            </div>
            <span class="agentic-state" style="background:${stateMeta.bg};color:${stateMeta.fg}">${esc(stateMeta.text)}</span>
        </div>
        <div class="agentic-rows">${rows}</div>
        ${questions}
        <div class="agentic-foot">
            <button class="btn btn-sm" onclick="runAgenticCheck('${wfId}')">Re-check</button>
        </div>
    </div>`;
}

function submitAgenticAnswers(wfId){
    const container = document.getElementById('agentic-'+wfId);
    if(!container) return;
    const readiness = (getWfSopData(wfId)||{}).readiness || {};
    const answers = Object.assign({}, readiness.answers||{});
    container.querySelectorAll('.agentic-answer').forEach(el=>{
        const i = parseInt(el.dataset.q,10);
        const q = (readiness.questions||[])[i];
        const v = el.value.trim();
        if(q && v) answers[q.letter] = v;
    });
    if(!Object.keys(answers).length){ toast('Type an answer first'); return; }
    runAgenticCheck(wfId, answers);
}

// ── Disposition: agent vs recurring human task vs ad-hoc human task ──
function getWfDisposition(wfId){
    const sop = getWfSopData(wfId);
    return (sop && sop.disposition) ? sop.disposition : null;
}

function dispositionBarHtml(wfId){
    const cur = getWfDisposition(wfId);
    const opts = DISPOSITIONS.map(d=>{
        const sel = cur && cur.type===d.key;
        return `<button class="disp-opt${sel?' sel':''}" onclick="setWfDisposition('${wfId}','${d.key}')">${esc(d.label)}</button>`;
    }).join('');
    const cd = cur ? DISPOSITIONS.find(d=>d.key===cur.type) : null;
    const hint = cd ? cd.hint : 'Once the SOP is ready, choose how this process runs.';
    return `<div class="disp-bar">
        <div class="disp-q">How will this run?</div>
        <div class="disp-opts">${opts}</div>
        <div class="disp-hint">${esc(hint)}</div>
    </div>`;
}

async function setWfDisposition(wfId, type){
    const def = DISPOSITIONS.find(d=>d.key===type);
    if(!def) return;
    const w = allWorkflows.find(x=>x.id===wfId);
    if(!w) return;
    const sop = getWfSopData(wfId);
    if(!sop){ toast('Generate the SOP first'); return; }
    sop.disposition = { type, setAt:new Date().toISOString() };
    const json = JSON.stringify(sop);
    w.fields[WF.sopDocument] = json;
    try { await atUpdate(TBL.workflows, wfId, { [WF.sopDocument]: json }); }
    catch(e){ console.error('disposition save error', e); }
    // route based on the choice
    if(type==='recurring'){ assignRecurringTask(wfId); }
    else if(type==='adhoc'){ toast('Marked ad-hoc. Staff follow the SOP when needed.'); }
    else {
        // Autonomous agent → create the Skills Library entry (if not already there) so it is logged and runnable
        if(gf(w, WF.skillDefinition)){ toast('Marked to run as an AI agent.'); }
        else { toast('Marked as an AI agent — adding it to the Skills Library…'); doConvertWorkflowToSkill(wfId); }
    }
    renderSteps();
    // Re-render the existing scorecard under the new human/agent framing WITHOUT firing a
    // fresh AI interrogation. Selecting a disposition must never pop a new batch of
    // questions. If the owner wants a fresh score under the new bar, the Re-check button does it.
    if(sop.readiness) renderAgenticScorecard(wfId, sop.readiness);
}

let _stepSaveTimers = {};
function stepGridSave(stepId, field, value){
    clearTimeout(_stepSaveTimers[stepId+field]);
    _stepSaveTimers[stepId+field] = setTimeout(async()=>{
        try {
            const fields = { [field]: value.trim() };
            const updated = await atUpdate(TBL.steps, stepId, fields);
            const idx = allSteps.findIndex(s=>s.id===stepId);
            if(idx>=0) allSteps[idx] = updated;
            updateCounts();
        } catch(e){ toast('Save error: '+e.message); }
    }, 300);
}

async function addStepInline(wfId){
    const nameEl = document.getElementById('newStepName');
    const descEl = document.getElementById('newStepDesc');
    const name = nameEl.value.trim();
    if(!name){ toast('Step name required'); return; }
    nameEl.disabled = true;
    const existing = stepsForWorkflow(wfId);
    const fields = {
        [ST.name]: name,
        [ST.description]: descEl.value.trim(),
        [ST.workflow]: [wfId],
        [ST.stepType]: 'Staff Task',
        [ST.sopStatus]: 'Not Created',
        [ST.sortOrder]: existing.length + 1,
    };
    try {
        const rec = await atCreate(TBL.steps, fields);
        allSteps.push(rec);
        nameEl.disabled = false;
        renderSteps();
        updateCounts();
        toast('Step added');
    } catch(e){ toast('Error: '+e.message); nameEl.disabled = false; }
}

async function deleteStepInline(stepId){
    if(!confirm('Delete this step?')) return;
    try {
        await atDelete(TBL.steps, stepId);
        allSteps = allSteps.filter(s=>s.id!==stepId);
        renderSteps();
        updateCounts();
        toast('Step deleted');
    } catch(e){ toast('Error: '+e.message); }
}

// Automation (Tab 6)
// ═══════════════════════════════════════════════════════════════════════
function renderAutomation(){
    const pane = document.getElementById('pane-automation');
    const wfs = filteredWorkflows().filter(w=>wfMatchesQuery(w,_autoSearch)).slice().sort((a,b)=>{
        if(_autoSortMode==='alpha') return (gf(a,WF.name)||'').toLowerCase()<(gf(b,WF.name)||'').toLowerCase()?-1:1;
        if(_autoSortMode==='department'){
            const da = selName(gf(a,WF.department))||'zzz', db = selName(gf(b,WF.department))||'zzz';
            return da<db?-1:da>db?1:(gf(a,WF.name)||'').toLowerCase()<(gf(b,WF.name)||'').toLowerCase()?-1:1;
        }
        if(_autoSortMode==='journey'){
            const fa = selName(gf(a,WF.fulfillStage))||'zzz', fb = selName(gf(b,WF.fulfillStage))||'zzz';
            return fa<fb?-1:fa>fb?1:(gf(a,WF.name)||'').toLowerCase()<(gf(b,WF.name)||'').toLowerCase()?-1:1;
        }
        // method
        const mA = linkIds(gf(a,WF.mainMethodStage)), mB = linkIds(gf(b,WF.mainMethodStage));
        const mAn = mA.length ? (gf(allMethods.find(m=>m.id===mA[0]),MM.name)||'zzz') : 'zzz';
        const mBn = mB.length ? (gf(allMethods.find(m=>m.id===mB[0]),MM.name)||'zzz') : 'zzz';
        return mAn<mBn?-1:mAn>mBn?1:(gf(a,WF.name)||'').toLowerCase()<(gf(b,WF.name)||'').toLowerCase()?-1:1;
    });
    const stepsWithSop = allSteps.filter(s=>selName(gf(s,ST.sopStatus))==='Complete');

    const wfsWithTasks = wfs.filter(w=>getWfVideoTaskId(w.id));

        html += '<div class="auto-wf-header">Video Recording Tasks <span style="color:var(--text-muted);font-weight:var(--fw-regular)">(' + wfsWithTasks.length + ' assigned)</span></div>';

            <th style="width:100px">Task Status</th>
            <th style="width:100px">Loom URL</th>
            <th style="width:100px">Steps Extracted</th>
            <th style="width:120px">Actions</th>
        </tr></thead><tbody>`;

        wfsWithTasks.forEach(w=>{
            const wName = gf(w,WF.name)||'Untitled';
            const vtaskStatus = getWfVideoTaskStatus(w.id);
            const loomUrl = getWfLoomUrl(w.id);
            const steps = stepsForWorkflow(w.id);
            const statusCls = vtaskStatus==='complete'?'task-complete':'task-pending';
            const statusLabel = vtaskStatus==='complete'?'Complete':'Pending';
            const hasSteps = steps.length > 0;

            html += `<tr>
                <td style="font-weight:var(--fw-semibold)">${esc(wName)}</td>
                <td><span class="task-status-badge ${statusCls}">${statusLabel}</span></td>
                <td>${loomUrl?'<span style="color:var(--success);font-size:var(--fs-xs)">Linked</span>':'<span style="color:var(--text-muted);font-size:var(--fs-xs)">None</span>'}</td>
                <td>${hasSteps?'<span style="color:var(--success);font-size:var(--fs-xs)">'+steps.length+' steps</span>':'<span style="color:var(--text-muted);font-size:var(--fs-xs)">Not yet</span>'}</td>
                <td style="display:flex;gap:4px;flex-wrap:wrap">

                    <button class="btn btn-sm" onclick="selectedStepsWf='${w.id}';switchView('steps')">View</button>
                </td>
            </tr>`;

        html += '</tbody></table></div>';
    }

    // Completed SOPs section — workflows with generated SOP documents
    const wfsWithSop = wfs.filter(w=>!!gf(w,WF.sopDocument));

        html += '<p style="font-size:var(--fs-xs);color:var(--text-secondary);margin:0 0 8px 0">Workflows with generated SOP documents. Assign as a recurring task or convert to an AI skill.</p>';
        html += `<table class="wf-grid"><thead><tr>
            <th style="width:22%">Workflow</th>
            <th style="width:15%">Department</th>
            <th style="width:12%">SOP</th>
            <th style="width:12%">Drive</th>
            <th style="width:12%">Skill Status</th>
            <th style="width:15%">Skill Name</th>
            <th>Actions</th>
        </tr></thead><tbody>`;

        wfsWithSop.forEach(w=>{
            const wName = gf(w,WF.name)||'Untitled';
            const dept = selName(gf(w,WF.department))||'';
            const driveDocUrl = getWfDriveDocUrl(w.id);
            const driveUrl = getWfDriveUrl(w.id);
            const hasWfSkill = !!gf(w,WF.skillDefinition);
            const stepsWithSkills = stepsForWorkflow(w.id).filter(s=>isSkillCreated(s.id));
            const lsSkill = localStorage.getItem('sys_wfskill_'+w.id);
            let lsSkillData = null;
            if(lsSkill){ try { lsSkillData = JSON.parse(lsSkill); } catch(e){/* best-effort: safe fallback */} }
            const hasSkill = hasWfSkill || stepsWithSkills.length > 0 || !!lsSkillData;
            let skillName = '';
            if(hasWfSkill){
                try { const sk = JSON.parse(gf(w,WF.skillDefinition)); skillName = Array.isArray(sk) ? (sk[0]||{}).name||'' : sk.name||''; } catch(e){/* best-effort: safe fallback */}
            } else if(lsSkillData){
                skillName = lsSkillData.name||'';
            } else if(stepsWithSkills.length){
                const sid = gf(stepsWithSkills[0],ST.skillId);

            html += `<tr>

                <td style="font-size:var(--fs-xs);color:var(--text-secondary)">${esc(dept)}</td>
                <td>${driveDocUrl?`<a href="${esc(driveDocUrl)}" target="_blank" rel="noopener" style="color:var(--accent);font-size:var(--fs-xs)">Open SOP &#x2197;</a>`:'<span style="font-size:var(--fs-xs);color:var(--text-muted)">Local only</span>'}</td>
                <td>${driveUrl?`<a href="${esc(driveUrl)}" target="_blank" rel="noopener" style="color:var(--accent);font-size:var(--fs-xs)">Folder &#x2197;</a>`:'<span style="font-size:var(--fs-xs);color:var(--text-muted)">Not uploaded</span>'}</td>
                <td>${hasSkill?'<span style="font-size:var(--fs-xs);color:var(--success)">Skill Created</span>':'<button class="btn btn-sm" style="border-color:var(--info);color:var(--info)" onclick="convertWorkflowToSkill(\''+w.id+'\')">Convert to Skill</button>'}</td>

                    <button class="btn btn-sm" style="border-color:var(--accent-gold);color:var(--accent-gold)" onclick="assignRecurringTask('${w.id}')">Assign Task</button>
                    ${hasWfSkill?`<button class="btn btn-sm" style="border-color:var(--success);color:var(--success)" onclick="runWorkflowSkill('${w.id}')">Run Skill</button>`:''}
                </td>
            </tr>`;
        });

        html += '</tbody></table></div>';
    }

    if(!stepsWithSop.length && !wfsWithTasks.length && !wfsWithSop.length){
        pane.innerHTML = '<div class="empty-state"><p>No automation activity yet.</p><p>Assign video tasks in the SOPs tab, or complete SOPs to convert them to Skills or Tasks.</p></div>';
        return;
    }

    if(stepsWithSop.length){
        html += '<p style="font-size:var(--fs-sm);color:var(--text-secondary);margin-bottom:16px;margin-top:16px">Steps with completed SOPs, ready for automation. Convert to an AI Skill (automated) or a recurring Task (manual).</p>';

        wfs.forEach(w=>{
            const steps = stepsForWorkflow(w.id).filter(s=>selName(gf(s,ST.sopStatus))==='Complete');
            if(!steps.length) return;
            const wName = gf(w,WF.name)||'Untitled';

            html += `<div class="auto-wf-group">
                <div class="auto-wf-header">${esc(wName)} <span style="color:var(--text-muted);font-weight:var(--fw-regular)">(${steps.length} ready)</span></div>
                <table class="wf-grid"><thead><tr>
                    <th style="width:25%">Step</th>
                    <th style="width:30%">Description</th>
                    <th style="width:90px">Type</th>
                    <th style="width:100px">Pipeline</th>
                    <th style="width:120px">Actions</th>
                </tr></thead><tbody>`;

            steps.forEach(s=>{
                const sName = gf(s,ST.name)||'Untitled';
                const sDesc = gf(s,ST.description)||'';
                const sType = selName(gf(s,ST.stepType))||'Staff Task';
                const sTypeClass = sType==='AI Skill'?'step-type-ai':sType==='Both'?'step-type-both':'step-type-staff';
                const ps = pipelineStatus(s);
                const canSkill = (sType==='AI Skill'||sType==='Both') && !isSkillCreated(s.id);
                const canTask = (sType==='Staff Task'||sType==='Both') && !isTaskCreated(s.id);

                html += `<tr>
                    <td>${esc(sName)}</td>
                    <td style="font-size:var(--fs-xs);color:var(--text-secondary)">${esc(sDesc)}</td>
                    <td><span class="step-type-badge ${sTypeClass}">${esc(sType)}</span></td>
                    <td><span class="pipeline-badge ${ps.cls}">${esc(ps.label)}</span></td>

                        ${canTask?`<button class="btn btn-sm" style="border-color:var(--accent-gold);color:var(--accent-gold)" onclick="convertToTask('${s.id}')">To Task</button>`:''}
                        ${!canSkill&&!canTask?'<span style="font-size:var(--fs-xs);color:var(--text-muted)">Converted</span>':''}
                    </td>
                </tr>`;
            });

            html += '</tbody></table></div>';
        });
    }

    pane.innerHTML = html;
    updateCounts();
    restoreSearchFocus();
}

async function convertToSkill(stepId){
    const s = allSteps.find(s=>s.id===stepId);
    if(!s) return;
    const name = gf(s,ST.name)||'Untitled';
    const wfLinks = gf(s,ST.workflow);
    const wfId = Array.isArray(wfLinks) ? wfLinks[0] : wfLinks;
    const w = wfId ? allWorkflows.find(w=>w.id===wfId) : null;
    const wName = w ? (gf(w,WF.name)||'Untitled') : 'Workflow';

    const body = `<p style="font-size:var(--fs-sm);color:var(--text-secondary);margin-bottom:4px">This will use AI to generate a Claude Code skill definition from the "${esc(name)}" SOP and save it to the Skills Library.</p>`;
    const footer = `<button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="closeModal();doConvertToSkill('${stepId}')">Generate Skill</button>`;
    showModal('Convert to AI Skill', body, footer);
}

async function doConvertToSkill(stepId){
    const s = allSteps.find(s=>s.id===stepId);
    if(!s) return;
    const name = gf(s,ST.name)||'Untitled';
    const desc = gf(s,ST.description)||'';
    const sopContent = gf(s,ST.sopContent)||'';
    const wfLinks = gf(s,ST.workflow);
    const wfId = Array.isArray(wfLinks) ? wfLinks[0] : wfLinks;
    const w = wfId ? allWorkflows.find(w=>w.id===wfId) : null;
    const wName = w ? (gf(w,WF.name)||'Untitled') : 'Workflow';
    const dept = w ? (selName(gf(w,WF.department))||'') : '';

    toast('Generating skill definition...');

    try {
        const prompt = `You are generating a Claude Code skill definition. Given the following SOP step, create a JSON skill definition that can be used by Claude Code to automate this task.

Step name: ${name}
Step description: ${desc}
Workflow: ${wName}
${dept ? `Department: ${dept}` : ''}
${sopContent ? `SOP Content:\n${sopContent}` : ''}

Generate a JSON object with these exact fields:
- "id": a kebab-case identifier derived from the step name (e.g. "process-tenant-invoice")
- "name": a clean human-readable name for the skill
- "command": a command string in format "anthropic-skills:<id>" using the id above
- "description": a clear 1-2 sentence description of what this skill automates
- "category": one of: "Property Management", "Finance", "Operations", "Legal", "Data & Analytics", "Customer Support", "Productivity", "Documents & Media", "Automation", "Development"
- "tags": an array of 3-6 relevant lowercase keyword tags

Return ONLY the JSON object, no markdown fences, no explanation.`;

        const res = await fetch(CLAUDE_PROXY, {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({
                model: 'claude-sonnet-4-6',
                max_tokens: 1024,
                messages: [{role:'user', content: prompt}]
            }),
        });
        if(!res.ok) throw new Error('AI request failed: '+res.status);
        const data = await res.json();
        const text = data.content?.[0]?.text||'{}';
        const jsonMatch = text.match(/\{[\s\S]*\}/);
        if(!jsonMatch) throw new Error('Invalid AI response');
        const skillDef = JSON.parse(jsonMatch[0]);

        skillDef.source = 'sop';
        skillDef.workflowId = wfId;
        skillDef.stepId = stepId;

        localStorage.setItem('sys_skill_'+stepId, '1');
        await atUpdate(TBL.steps, stepId, {[ST.skillId]: skillDef.id});

        if(w){
            const existing = gf(w,WF.skillDefinition);
            let skills = [];
            try { skills = existing ? JSON.parse(existing) : []; } catch(e){ skills = []; }
            if(!Array.isArray(skills)) skills = [skills];
            skills = skills.filter(sk => sk.stepId !== stepId);
            skills.push(skillDef);
            const json = JSON.stringify(skills);
            w.fields[WF.skillDefinition] = json;
            await atUpdate(TBL.workflows, wfId, {[WF.skillDefinition]: json});
        }

        toast(`Skill "${skillDef.name}" created and saved`);
        render();
    } catch(e){
        toast('Skill generation error: '+e.message);
    }
}

function convertToTask(stepId){

    if(!s) return;
    const name = gf(s,ST.name)||'Untitled';

function assignRecurringTask(wfId){
    const w = allWorkflows.find(w=>w.id===wfId);
    if(!w) return;
    const wName = gf(w,WF.name)||'Untitled';
    const driveDocUrl = getWfDriveDocUrl(wfId);
    const driveUrl = getWfDriveUrl(wfId);
    const sopPageUrl = window.location.origin + window.location.pathname + '?wf=' + wfId;

    let descLines = ['Recurring task for: ' + wName, ''];
    if(driveDocUrl) descLines.push('SOP Document: ' + driveDocUrl);
    if(driveUrl) descLines.push('Drive Folder: ' + driveUrl);
    descLines.push('Web App SOP: ' + sopPageUrl);

    const description = descLines.join('\n');

    try {
        window.parent.postMessage({
            type: 'qt:open-new-task-drawer',
            opts: {
                name: wName + ' (Recurring)',
                description: description,
            }
        }, '*');
        toast('Task drawer opened with SOP links');
    } catch(e){
        const body = `<div style="font-size:var(--fs-sm);color:var(--text-secondary)">
            <p style="margin:0 0 8px 0">Copy the following into your task description:</p>
            <textarea readonly style="width:100%;height:120px;font-size:var(--fs-xs);font-family:var(--font-family-base);padding:8px;border:1px solid var(--border-default);border-radius:var(--radius-sm);resize:none" onclick="this.select()">${esc(description)}</textarea>
        </div>`;
        const footer = `<button class="btn btn-primary" onclick="closeModal()">Done</button>`;
        showModal('Assign Recurring Task: ' + esc(wName), body, footer);
    }
}

async function doConvertWorkflowToSkill(wfId){
    const w = allWorkflows.find(w=>w.id===wfId);
    if(!w) return;
    const wName = gf(w,WF.name)||'Untitled';
    const dept = selName(gf(w,WF.department))||'';
    const driveDocUrl = getWfDriveDocUrl(wfId);
    const driveUrl = getWfDriveUrl(wfId);
    const steps = stepsForWorkflow(wfId);
    const stepSummary = steps.map(s => '- ' + (gf(s,ST.name)||'')).join('\n');

    let sopContent = '';
    const raw = gf(w,WF.sopDocument);
    if(raw){
        try {
            const sopData = JSON.parse(raw);
            sopContent = (sopData.sopSteps||[]).map(s=>s.title+': '+(s.body||'')).join('\n');
        } catch(e){ /* best-effort: safe fallback */ }
    }

    toast('Generating skill definition...');

    try {
        const prompt = `You are generating a Claude Cowork skill definition for an entire workflow SOP. Create a JSON skill definition that automates or guides execution of this workflow.

Workflow: ${wName}
${dept ? `Department: ${dept}` : ''}
${driveDocUrl ? `SOP Document URL: ${driveDocUrl}` : ''}
${driveUrl ? `Drive Folder URL: ${driveUrl}` : ''}

Steps:
${stepSummary}

${sopContent ? `SOP Content:\n${sopContent}` : ''}

Generate a JSON object with these exact fields:
- "id": a kebab-case identifier (e.g. "process-new-tenant-onboarding")
- "name": a clean human-readable name
- "command": a command string in format "anthropic-skills:<id>"
- "description": a clear 1-2 sentence description of what this skill does
- "category": one of: "Property Management", "Finance", "Operations", "Legal", "Data & Analytics", "Customer Support", "Productivity", "Documents & Media", "Automation", "Development"
- "tags": an array of 3-6 relevant lowercase keyword tags
- "instructions": the full step-by-step instructions the skill should follow when run (as a single string with numbered steps)

Return ONLY the JSON object, no markdown fences, no explanation.`;

        const res = await fetch(CLAUDE_PROXY, {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({
                model: 'claude-sonnet-4-6',
                max_tokens: 2048,
                messages: [{role:'user', content: prompt}]
            }),
        });
        if(!res.ok) throw new Error('AI request failed: '+res.status);
        const data = await res.json();
        const text = data.content?.[0]?.text||'{}';
        const jsonMatch = text.match(/\{[\s\S]*\}/);
        if(!jsonMatch) throw new Error('Invalid AI response');
        const skillDef = JSON.parse(jsonMatch[0]);

        skillDef.source = 'sop';
        skillDef.workflowId = wfId;
        if (driveUrl) skillDef.driveUrl = driveUrl;
        if (driveDocUrl) skillDef.driveDocUrl = driveDocUrl;

        const existing = gf(w,WF.skillDefinition);
        let skills = [];
        try { skills = existing ? JSON.parse(existing) : []; } catch(e){ skills = []; }
        if(!Array.isArray(skills)) skills = [skills];
        skills = skills.filter(sk => !sk.workflowId || sk.workflowId !== wfId || sk.stepId);
        skills.unshift(skillDef);
        const json = JSON.stringify(skills);
        w.fields[WF.skillDefinition] = json;
        await atUpdate(TBL.workflows, wfId, {[WF.skillDefinition]: json});

        localStorage.setItem('sys_wfskill_'+wfId, JSON.stringify({name:skillDef.name,id:skillDef.id,command:skillDef.command}));
        toast(`Skill "${skillDef.name}" created and saved`);
        render();
    } catch(e){
        toast('Skill generation error: '+e.message);
    }
}

function runSkillFilesChanged(input){
    const list = document.getElementById('runSkillFileList');
    if(!list) return;
    const files = Array.from(input.files||[]);
    list.textContent = files.length ? files.map(f=>f.name).join(', ') : '';
}

function openInCowork(wfId){
    const w = allWorkflows.find(w=>w.id===wfId);
    if(!w) return;
    const wName = gf(w,WF.name)||'Untitled';
    const driveUrl = getWfDriveUrl(wfId);
    const driveDocUrl = getWfDriveDocUrl(wfId);
    let skills = [];
    try { skills = JSON.parse(gf(w,WF.skillDefinition)); if(!Array.isArray(skills)) skills = [skills]; } catch(e){/* best-effort: safe fallback */}
    const wfSkill = skills.find(sk => sk.workflowId === wfId && !sk.stepId) || skills[0] || {};
    const instructions = wfSkill.instructions || wfSkill.description || '';

    // Build a context-rich prompt to pre-fill in Cowork
    let contextParts = [`Run the "${wName}" skill.`];
    if(instructions) contextParts.push(`\nSkill instructions:\n${instructions}`);
    if(driveUrl) contextParts.push(`\nProject Drive folder: ${driveUrl}`);
    if(driveDocUrl) contextParts.push(`SOP document: ${driveDocUrl}`);
    const contextText = contextParts.join('\n');

    // Copy the context to clipboard and open Cowork
    navigator.clipboard.writeText(contextText).then(()=>{
        toast('Skill context copied to clipboard. Paste it into Cowork.');
    }).catch(()=>{});

    // Open Claude Cowork in a new tab
    window.open('https://claude.ai', '_blank');
}

async function executeWorkflowSkill(wfId){
    const w = allWorkflows.find(w=>w.id===wfId);
    if(!w) return;
    const wName = gf(w,WF.name)||'Untitled';
    let skills = [];
    try { skills = JSON.parse(gf(w,WF.skillDefinition)); if(!Array.isArray(skills)) skills = [skills]; } catch(e){ return; }
    const wfSkill = skills.find(sk => sk.workflowId === wfId && !sk.stepId) || skills[0];
    if(!wfSkill) return;

    const chatDiv = document.getElementById('runSkillChat');
    const inputEl = document.getElementById('runSkillInput');
    const runBtn = document.getElementById('runSkillBtn');
    if(!chatDiv || !runBtn) return;

    const userContext = inputEl ? inputEl.value.trim() : '';
    runBtn.disabled = true;
    runBtn.textContent = 'Running...';
    if(inputEl) inputEl.disabled = true;

    // Show user message if they typed context
    if(userContext){
        chatDiv.innerHTML += `<div style="text-align:right;margin-bottom:8px"><span style="display:inline-block;background:var(--accent);color:#fff;padding:6px 12px;border-radius:var(--radius-md);max-width:80%">${esc(userContext)}</span></div>`;
    }

    // Show "thinking" indicator
    chatDiv.innerHTML += `<div id="runSkillThinking" style="margin-bottom:8px;color:var(--text-muted)"><span class="sop-spinner" style="width:14px;height:14px;display:inline-block;vertical-align:middle;margin-right:6px;border-width:2px"></span> AI is executing the skill...</div>`;
    chatDiv.scrollTop = chatDiv.scrollHeight;

    const instructions = wfSkill.instructions || wfSkill.description || '';
    const steps = stepsForWorkflow(wfId);
    const stepsText = steps.map((s,i)=>`Step ${i+1}: ${gf(s,ST.name)||'Untitled'} - ${gf(s,ST.description)||''}`).join('\n');
    const driveUrl = getWfDriveUrl(wfId);
    const driveDocUrl = getWfDriveDocUrl(wfId);

    // Read attached files as text
    const fileInput = document.getElementById('runSkillFiles');
    let attachedContent = '';
    if(fileInput && fileInput.files && fileInput.files.length){
        const fileNames = [];
        for(const file of fileInput.files){
            fileNames.push(file.name);
            try {
                const text = await file.text();
                attachedContent += `\n\n--- Attached file: ${file.name} ---\n${text.slice(0, 8000)}`;
            } catch(e){ attachedContent += `\n\n--- Attached file: ${file.name} (could not read) ---`; }
        }
        chatDiv.innerHTML += `<div style="margin-bottom:8px;font-size:var(--fs-xs);color:var(--text-muted)">📎 ${esc(fileNames.join(', '))}</div>`;
    }

    const systemPrompt = [{type:'text', text:`You are an AI assistant executing a business workflow skill called "${wfSkill.name||wName}".

Your job is to execute this skill by following the instructions precisely. Report what you are doing at each step, what actions you are taking, and the outcome.

Skill instructions:
${instructions}

Workflow steps:
${stepsText}
${driveUrl ? `\nProject folder (Google Drive): ${driveUrl}` : ''}
${driveDocUrl ? `SOP document: ${driveDocUrl}` : ''}
${attachedContent ? `\nAttached files for context:${attachedContent}` : ''}

If you need to interact with external systems (Airtable, email, etc.), describe what action should be taken and the expected outcome. Be specific and actionable.`}];

    const userMessage = userContext
        ? `Execute this skill now. Additional context: ${userContext}`
        : 'Execute this skill now. Follow the instructions step by step and report the outcome.';

    try {
        const res = await fetch('https://claude-proxy.kevinbrittain.workers.dev', {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({
                model:'claude-sonnet-4-6',
                max_tokens:4000,
                system: systemPrompt,
                messages:[{role:'user',content:userMessage}],
            })
        });
        if(!res.ok) throw new Error('AI request failed: '+res.status);
        const data = await res.json();
        const text = data.content?.[0]?.text||'No response from AI';

        // Remove thinking indicator
        const thinking = document.getElementById('runSkillThinking');
        if(thinking) thinking.remove();

        // Format the AI response with basic line breaks
        const formatted = esc(text).replace(/\n/g,'<br>');
        chatDiv.innerHTML += `<div style="margin-bottom:8px;background:var(--bg-surface);border:1px solid var(--border-subtle);padding:10px 14px;border-radius:var(--radius-md);max-width:90%">${formatted}</div>`;
        chatDiv.scrollTop = chatDiv.scrollHeight;
        toast('Skill executed');
    } catch(e){
        const thinking = document.getElementById('runSkillThinking');
        if(thinking) thinking.remove();
        chatDiv.innerHTML += `<div style="margin-bottom:8px;color:var(--danger);padding:8px">Error: ${esc(e.message)}</div>`;
        chatDiv.scrollTop = chatDiv.scrollHeight;
        toast('Skill execution error: '+e.message);
    } finally {
        runBtn.disabled = false;
        runBtn.textContent = 'Run';
        if(inputEl){ inputEl.disabled = false; inputEl.value = ''; inputEl.focus(); }
    }
}

function renderLoomEmbed(url){
    if(!url) return '';
    const match = url.match(/loom\.com\/share\/([a-zA-Z0-9]+)/);
    if(!match) return '';
    return `<iframe src="https://www.loom.com/embed/${match[1]}" allowfullscreen></iframe>`;
}

function renderStepsResourceEmbed(wfId){
    const container = document.getElementById('loomEmbed-'+wfId);
    if(!container) return;
    const url = getWfLoomUrl(wfId);
    container.innerHTML = url ? renderLoomEmbed(url) : '';
}

async function fetchLoomTranscript(loomUrl){
    const match = loomUrl.match(/loom\.com\/share\/([a-zA-Z0-9]+)/);
    if(!match) return '';
    // 1) The loom-transcript worker returns the REAL spoken transcript, extracted
    //    server-side from the share page's signed CDN link. Before this, the only
    //    working path was the oembed fallback below — the video TITLE — so SOPs
    //    were generated from the title, not what was actually said.
    try {
        const wres = await fetch(LOOM_TRANSCRIPT_ENDPOINT + '?id=' + match[1]);
        if(wres.ok){
            const wdata = await wres.json();
            if(wdata.transcript && wdata.transcript.trim().split(/\s+/).length > 15) return wdata.transcript.trim();
        }
    } catch(e){ console.warn('[loom] transcript worker unavailable, falling back', e); }
    const apiKey = getLoomApiKey();
    let transcript = '';
    if(apiKey){
        try {
            const videoId = match[1];
            const res = await fetch(`https://developer.loom.com/v1/videos/${videoId}/transcriptions`, {
                headers: { 'Authorization': `Bearer ${apiKey}`, 'Content-Type': 'application/json' }
            });
            if(res.ok){
                const data = await res.json();
                if(data.transcript) transcript = data.transcript;
                else if(data.data) transcript = typeof data.data === 'string' ? data.data : JSON.stringify(data.data);
            }
        } catch(e){ console.warn('[loom] transcription API fetch failed', e); }
    }
    if(!transcript){
        try {
            const oembedRes = await fetch(`https://www.loom.com/v1/oembed?url=${encodeURIComponent(loomUrl)}`);
            if(oembedRes.ok){
                const odata = await oembedRes.json();
                transcript = odata.title || '';
                if(odata.description) transcript += '. ' + odata.description;
            }
        } catch(e){ console.warn('[loom] oembed fallback failed', e); }
    }
    return transcript;
}

async function aiExtractSteps(wfId, transcript){
    const w = allWorkflows.find(w=>w.id===wfId);
    const wName = w ? (gf(w,WF.name)||'') : '';
    const wDesc = w ? (gf(w,WF.description)||'') : '';
    const existing = stepsForWorkflow(wfId).map(s=>gf(s,ST.name)).filter(Boolean);

    const prompt = transcript
        ? `You are extracting workflow steps from a Loom video transcript for the workflow "${wName}".
${wDesc ? `Workflow description: ${wDesc}` : ''}
${existing.length ? `These steps already exist, do not duplicate them: ${existing.join(', ')}` : ''}

Here is the video transcript:
${transcript}

Extract discrete, actionable workflow steps from this transcript. Each step should be a specific task someone would perform.
Return ONLY a JSON array of objects with "name" and "description" keys. No other text.`
        : `Suggest 5-8 workflow steps for a workflow called "${wName}".
${wDesc ? `Workflow description: ${wDesc}` : ''}
${existing.length ? `These steps already exist, do not duplicate them: ${existing.join(', ')}` : ''}
A Loom video exists for this workflow but the transcript could not be fetched. Suggest logical steps based on the workflow name and description.
Return ONLY a JSON array of objects with "name" and "description" keys. No other text.`;

    const res = await fetch('https://claude-proxy.kevinbrittain.workers.dev', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
            model:'claude-sonnet-4-6',
            max_tokens:2000,
            messages:[{role:'user',content:prompt}],
        })
    });
    if(!res.ok) throw new Error('AI request failed: '+res.status);
    const data = await res.json();
    const text = data.content?.[0]?.text||'[]';
    const jsonMatch = text.match(/\[[\s\S]*\]/);
    if(!jsonMatch) throw new Error('Invalid AI response');
    return JSON.parse(jsonMatch[0]);
}

async function autoAddSteps(suggestions, wfId){
    if(!suggestions.length) return;
    const existingCount = stepsForWorkflow(wfId).length;
    for(let i=0; i<suggestions.length; i++){
        const s = suggestions[i];
        const fields = {
            [ST.name]: s.name,
            [ST.description]: s.description||'',
            [ST.workflow]: [wfId],
            [ST.stepType]: 'Staff Task',
            [ST.sopStatus]: 'Not Created',
            [ST.sortOrder]: existingCount + i + 1,
        };
        try {
            const rec = await atCreate(TBL.steps, fields);
            allSteps.push(rec);
        } catch(e){ console.error(e); }
        if(i < suggestions.length-1) await new Promise(r=>setTimeout(r, 500));
    }
}

async function importFromLoom(wfId, auto){
    let loomUrl = getWfLoomUrl(wfId);
    if(!loomUrl){ if(!auto) toast('No Loom URL found. Add [loom:URL] to the workflow description first.'); return; }

    const match = loomUrl.match(/loom\.com\/share\/([a-zA-Z0-9]+)/);
    if(!match){ if(!auto) toast('Invalid Loom URL. Use format: https://www.loom.com/share/...'); return; }

    await setWfLoomUrl(wfId, loomUrl);

    if(!auto) toast('Fetching transcript from Loom...');
    const transcript = await fetchLoomTranscript(loomUrl);

    if(!auto) toast(transcript ? 'AI extracting steps from transcript...' : 'AI suggesting steps...');
    else toast('Auto-extracting workflow steps from Loom video...');

    try {
        const suggestions = await aiExtractSteps(wfId, transcript);
        if(auto){
            await autoAddSteps(suggestions, wfId);
            const wName = (allWorkflows.find(w=>w.id===wfId)&&gf(allWorkflows.find(w=>w.id===wfId),WF.name))||'workflow';
            toast(`${suggestions.length} steps auto-extracted for "${wName}"`);
            renderSteps();
            updateCounts();
        } else {
            showLoomStepPicker(suggestions, wfId);
        }
    } catch(e){ toast('AI error: '+e.message); }
}

function showLoomStepPicker(suggestions, wfId){
    let body = '<p style="font-size:var(--fs-sm);color:var(--text-secondary);margin-bottom:12px">Steps extracted from the Loom video. Tick the ones to add:</p>';
    suggestions.forEach((s,i)=>{
        body += `<div style="display:flex;gap:8px;align-items:flex-start;margin-bottom:10px;padding:8px;background:var(--bg-surface-2);border-radius:6px">
            <input type="checkbox" id="lsug${i}" checked style="margin-top:3px">
            <div><strong>${esc(s.name)}</strong>
            <div style="font-size:var(--fs-xs);color:var(--text-secondary)">${esc(s.description||'')}</div></div>
        </div>`;
    });
    const footer = `<button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="addLoomSteps(${JSON.stringify(suggestions).replace(/"/g,'&quot;')},'${wfId}')">Add Selected</button>`;
    showModal('Import Steps from Loom', body, footer);
}

async function addLoomSteps(suggestions, wfId){
    const selected = suggestions.filter((_,i)=>document.getElementById('lsug'+i)?.checked);
    if(!selected.length){ closeModal(); return; }
    closeModal();
    toast(`Adding ${selected.length} steps...`);
    await autoAddSteps(selected, wfId);
    renderSteps();
    updateCounts();
    toast(`${selected.length} steps added from Loom`);
}

function assignVideoTask(wfId){
    const w = allWorkflows.find(w=>w.id===wfId);
    if(!w) return;
    const wName = gf(w,WF.name)||'Untitled';

    // The AGENTIC script travels WITH the task so whoever records the video sees
    // the seven prompts in Tasks & Projects — not just on the Systemisation page.
    const agenticScript = AGENTIC_STAGES.map(s=>`${s.letter} — ${s.name}: ${s.prompt}`).join('\n\n');
    const taskName = 'Record video: ' + wName;
    const taskDesc = 'Record a Loom video walkthrough of the "' + wName + '" workflow.\n\n'
        + 'Follow the AGENTIC script — cover all seven while you record:\n\n'
        + agenticScript
        + '\n\nWhen finished, replace the placeholder below with your Loom share URL and mark this task as Done.\n\n[loom:paste your Loom share URL here]';

    const bizIds = linkIds(gf(w,WF.business));
    window.parent.postMessage({
        type: 'qt:open-new-task-drawer',
        opts: {
            name: taskName,
            description: taskDesc,
            business: bizIds[0] || '',
            requireBusiness: true,   // every SOP must belong to a business
            _wfId: wfId,
        }
    }, '*');

    toast('Opening task drawer...');
}

    if(!name){ toast('Task name is required'); return; }

        [TF.assignee]: {email: member.email},

        [TF.dueDate]: today,
        [TF.timeEstimate]: '15 min',
        [TF.collaborators]: [{email: 'kevin@runpreneur.org.uk'}],
