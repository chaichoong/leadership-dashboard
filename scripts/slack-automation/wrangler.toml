name = "contractor-bot"
main = "contractor-bot.js"
compatibility_date = "2024-12-01"

# Bindings already configured in the live worker (Cloudflare dashboard).
# Listing them here so `wrangler deploy` doesn't drop them on push.

[[kv_namespaces]]
binding = "STATE"
id = "1f33ad79aceb4520baec24f31435f9e2"

[[r2_buckets]]
binding = "ATTACHMENTS"
bucket_name = "contractor-bot-attachments"

# Secrets (AIRTABLE_PAT, SLACK_SIGNING_SECRET, SLACK_BOT_TOKEN,
# ANTHROPIC_API_KEY, INTERNAL_BEARER) are NOT listed here — they're
# managed via `wrangler secret put` and persist across deploys.

# ── AI models — the ONE place this deployable names a model ──
# Mirrors js/ai-models.js (the browser single source). Workers cannot read that
# file, so each deployable carries its own [vars]. These are plain vars, NOT
# secrets: they ship with `wrangler deploy`, no `wrangler secret put` needed.
# A retired model ID is an outage — change it here, then redeploy.
[vars]
AI_MODEL_DEFAULT = "claude-sonnet-4-6"
AI_MODEL_LIGHT = "claude-haiku-4-5-20251001"
