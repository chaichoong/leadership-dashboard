name = "apple-inbound"
main = "worker.js"
compatibility_date = "2024-12-01"

[[r2_buckets]]
binding = "ATTACHMENTS"
bucket_name = "apple-inbound-attachments"

# ── AI models — the ONE place this deployable names a model ──
# Mirrors js/ai-models.js (the browser single source). Workers cannot read that
# file, so each deployable carries its own [vars]. These are plain vars, NOT
# secrets: they ship with `wrangler deploy`, no `wrangler secret put` needed.
# A retired model ID is an outage — change it here, then redeploy.
[vars]
AI_MODEL_DEFAULT = "claude-sonnet-4-6"
AI_MODEL_LIGHT = "claude-haiku-4-5-20251001"
