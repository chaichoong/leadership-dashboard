# Google Drive SOP Upload Worker
# Accepts HTML file content + workflow name, creates a Drive folder, uploads the SOP, returns folder URL.

name = "drive-upload"
main = "worker.js"
compatibility_date = "2024-01-01"

# Secrets (set via `wrangler secret put <NAME>`):
#   GOOGLE_SERVICE_ACCOUNT_JSON  - Full JSON key file content for the Google service account
#   DRIVE_PARENT_FOLDER_ID       - ID of the shared Google Drive folder where SOP folders are created
