name: Sync AI Brain feed (Airtable → Supabase)
on:
  schedule:
    - cron: '30 23 * * *'   # after the 23:00 nightly 'tidy' job (GMT)
    - cron: '30 0 * * *'    # covers UK summer time (BST)
    - cron: '0 7 * * *'     # morning refresh so it's fresh when opened
  workflow_dispatch: {}
permissions:
  contents: read
concurrency:
  group: sync-ai-brain
  cancel-in-progress: false
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Mirror the AI Brain feed
        env:
          AIRTABLE_PAT: ${{ secrets.AIRTABLE_PAT }}
          SUPABASE_URL: 'https://ptkyhzlsvijcwyovgrgv.supabase.co'
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python3 scripts/sync-ai-brain.py
