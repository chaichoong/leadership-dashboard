name: Monthly property valuations (AI estimate → Pending)
on:
  schedule:
    - cron: '0 6 1 * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (compute + log, write nothing)'
        type: boolean
        default: false
      limit:
        description: 'Max properties to value (0 = all)'
        default: '0'
permissions:
  contents: read
concurrency:
  group: monthly-valuations
  cancel-in-progress: false
jobs:
  valuations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Refresh property valuations
        env:
          AIRTABLE_PAT: ${{ secrets.AIRTABLE_PAT }}
          PROXY_SERVICE_TOKEN: ${{ secrets.PROXY_SERVICE_TOKEN }}
          DRY_RUN: ${{ github.event.inputs.dry_run == 'true' && '1' || '0' }}
          LIMIT: ${{ github.event.inputs.limit || '0' }}
        run: python3 scripts/monthly-valuations.py
